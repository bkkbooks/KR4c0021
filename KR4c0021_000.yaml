front:
  text: 須溪先生校本唐王右丞集目録
  hash: sha256:396642272b67c7b1806516e7636169f536284a4cab65f3dcbed4330e61841ebe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_000-1a}
body:
  text: 第一卷白鸚鵡賦登樓歌夷門歌䨇黄鵠歌送别新秦郡松樹歌靑雀歌同前盧象諸公賦共四首終南山歌送友人歸山歌二首魚山神女祠迎神曲送神曲扶南曲歌詞五首隴頭吟老將行燕支行從軍行桃源行隴西行早春行洛陽女兒行少年行四首皇甫岳冩眞讃裴右丞冩眞讃白黿渦黄雀癡贈裴迪榆林群歌問冦校書䨇溪寄崇𣑽僧宋進馬哀詞第二卷慶玄元像應制蓬萊留春應制上巳龍池春禊應制望春池觀禊飲應制幸山荘題石壁應制登降聖觀應制臨園亭賦詩應制送朝集使歸應制送不蒙歸江西應制曲江侍宴應制元夕燃燈應制重陽上壽應制賜史供奉宴應制勤政樓侍宴應制大同殿生玉芝勑賜百官櫻桃和前賜宰臣歌應制賜宰臣連珠詞應制勑借𡵨王九成宫避暑應教從岐王過楊氏别業應教從岐王夜宴衞家山池應教和尹諌議史館山池和陳監思從第和晉公扈從温陽和宋中丞和賈舎人早朝瓜園詩同崔傳荅賢弟同崔貟外秋霄寓直十五夜游有懷沈拾遺新生竹不果遊東山别業和使君望逺思歸和韋主簿温湯寓目和楊駙馬秋夜即事詶諸公見過詶蘇貟外過藍田詶楊貟外宿琴䑓贈苑舎人苑咸荅并序重詶苑郎中并序詶郭給事詶嚴徐見過不遇慕容承携素饌見過詶慕容上詶張少府喜祖三至留宿祖詠荅詶黎居士淅川作詶賀四贈葛巾詶故人張諲荅張五弟裴迪憶終南絶句荅裴迪第三卷奉寄韋太守林園即事寄河上段十六寄荆州張丞相山中寄諸弟妺戲贈裴迪宥罪拜官書意贈從弟絿贈薛璩慕容損贈李頎贈劉藍田贈房盧氏琯贈祖三詠輞川閑居贈裴迪春夜竹亭錢起詶贈東岳焦錬師贈韋穆十八戯贈張五弟諲三首贈裴旻將軍贈焦道士贈呉官對雪憶胡居士水至滑州憶丁三秋夜獨坐懷内弟雪中憶季揖胡居士卧病遺米贈裴十迪酌酒與裴迪與胡居士九日憶山東兄弟華岳藍田山石門精舎山居秋瞑青溪崔濮陽前山興終南别業皇甫岳雲溪雜題五詠第四卷輞川集序孟城拗華子崗文杏館斤竹嶺鹿柴木蘭柴茱茰沜宫槐陌臨湖亭南垞欹湖柳浪欒家瀬金屑泉白石灘北垞竹里館辛夷塢􅃮園椒園巳上與裴迪各賦一首歸嵩山作歸輞川作投師蘭若宿韋給事山居輞川别業山中示弟戯題輞川别業李處士山居韋侍郎山居山居即事早秋山中作戯題盤石終南山田園樂六言七首田家丁㝢田家有贈輞川閑居積雨輞川莊作春園即事渭川田家春中田園作淇上即事田園過盧貟外宅過李揖宅過崔處士林亭盧象諸公同賦三首崔興宗荅濟州過趙叟家讌與盧象集朱家過福禪師蘭若飯覆釡山僧謁璿上人并序曇壁上人兄院集并序王縉諸公同賦二首秋夜對雨晚春諸公見過過嵩丘蘭若過曇興上人山院裴迪賦夏日過青龍寺裴迪賦鄭果州相遇訪吕逸人不遇裴迪賦春過賀貟外藥園過香積寺過崔駙馬山池嚴尹宿弊廬訪别第五卷送李太守之任送秘書晁監送徐郎中送李判官赴江東送康太守送陸貟外送封太守送王尊師歸蜀送崔五太守送宇文太守送嚴秀才還蜀送李睢陽送張判官赴河西送岐州源長史歸送綦母校書送張道士歸山送元二使安西送六舅歸陸渾送方尊師歸嵩山送瑗公崔興宗賦送錢少府還藍田留别錢起送丘爲徃唐州留别送元中丞轉運江淮送别送張五歸山齊州送祖三送别送崔九遊蜀送熊九任安陽送崔九送縉雲苗太守送李太守赴上洛送從弟蕃遊湖南送平淡然判官送孫秀才送韋評事送權二送髙道弟耽送劉司直赴安西送别靈雲池送從弟送趙都督赴代州臨髙臺送黎拾遺送方城韋明府送李貟外賢郎送梓州李使君送楊少府貶彬州送張五諲歸宣城送友人南歸送賀遂貟外外甥送楊長史赴果州送張舎人佐江州送韋大夫東京留守送邢桂州送宇文三赴河西送别資聖寺送丼二送孫二送崔三覲省送沈子福江東送丘爲落第歸留别温古上人兄觀别者别弟縉别輞川别業又賦别弟妹别崔九弟裴迪賦留别崔興宗别綦母潜新晴晚望漢江臨汎登辨覺寺凉州郊外遊望觀獵遊感化寺遊悟真寺寒食城東即事春日上方即事遊韋卿城南别業冬日遊覧汎前陂遊李山人所居遊方丈寺登河北城樓登裴迪小臺第六卷曉行巴峽出塞至黄牛嶺𬒳出濟州休假還舊業早入榮陽界寒食汜上宿鄭州千塔主人使至塞上渡河到清河苦熱納凉濟上四賢詠三首偶然作六首西施詠李陵詠燕子龕禪師息夫人班婕妤三首晚春閑思羽林騎閨人戯題冬夜書懷秋夜獨坐不遇詠待儲光羲不至聽宫鸎聽百舌鳥題雲母障賦得清如玉壷冰劇嘲史寰紅牡丹左掖梨花丘為皇甫冉同詠二首早朝二首口號誦示裴迪二首春日早朝愚公谷三首寓言二首雜詩五首獻始興公上張令公崔興宗寫真山茱茰涼州賽神哭殷遥二首哭孟浩然哭禇司馬哭沈居士哭祖六自虚嘆白髮二首過秦皇墓徐公挽歌杜太守挽歌二首夫人樊氏挽歌二首夫人㓂氏挽歌恭懿太子挽歌五首湏溪先生校本唐王右丞集目錄終
