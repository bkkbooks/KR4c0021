front:
  text: 須溪先生校本唐右丞王維集卷第二
  hash: sha256:0e599f37acfa4e5d6aff1cb53b5d0acf1b81e5b8aa7826b732e090303fdbb23e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_002-1a}
body:
  text: 唐尚書右丞贈祕書監王維奉和聖製慶玄元皇帝王像之作應制明君夢帝先寶命上齊天秦后徒聞樂周王耻卜年玉京移大像金籙會羣仙承露調天供臨空敞御筵斗回迎壽酒山近起爐煙願奉無為化齊心學自然奉和聖製從蓬萊向興慶閣道中留春雨中春望之作應制渭水自縈秦塞曲黃山舊繞漢宫斜鑾輿逈出仙門柳閣道回看上苑花雲裏帝城雙鳯闕雨中春樹万人家為乘陽氣行時令不是宸遊重物華奉和聖製與太子諸王三月三日龍池春禊應制故事修春禊新宫展豫遊明君移鳯輦太子出龍樓賦掩陳王作杯如洛水流金人來捧劒畫鷁去回舟苑樹浮宫闕天池照冕旒宸章在雲漢垂象滿皇州奉和聖製上巳於望春亭觀禊飲應制長樂青門外冝春小苑東樓開万户上輦過百花中畫鷁移仙妓金貂列上公清歌邀日落妙舞向春風渭水明秦甸黃山入漢宫君王來祓禊灞滻亦朝宗奉和聖製幸玉宵公主山莊因題石壁十韻之作應制碧落風煙外瑶臺道路賖如何連帝菀别自有仙家北地回鑾駕緣溪轉翠華洞中開日月窗裏發雲霞庭飬沖天鶴溪留上漢查種田生白玉泥竈化丹砂谷靜泉逾響山深日易斜御羹和石髓香飯進胡麻大道今無外長生詎有涯還瞻九霄上來往五雲車奉和聖製登降聖觀與宰臣等同望應制鳯扆朝碧落龍圗耀金鏡維嶽降二臣戴天臨万姓山川八校滿井邑三農竟比屋皆可封誰家不相慶林踈逺村出野曠寒山靜帝城雲裏深渭水天邊映喜氣􅍭風景頌聲溢歌詠端拱能任賢彌彰聖君聖奉和聖製御春明樓臨右相園亭賦樂賢詩應制復道通長樂青門臨上路遙聞鳯吹喧暗識龍輿度褰旒明四目伏檻紆三顧小菀接侯家飛甍映宫樹啇山原上碧滻水林端素銀漢下天章瓊筵承湛露將非冨氏寵信以平戎故從來簡帝心詎得回天步奉和聖製暮春送朝集使歸郡應制萬國仰宗周衣冠拜冕旒玉乘迎大客金莭送諸侯祖席傾三省褰帷向九州楊花飛上路槐色蔭通溝來預鈞天樂歸分漢主憂宸章類河漢垂象滿中州奉和聖製送不蒙都護兼鴻臚卿歸安西應制上卿增命服都護揚歸斾雜虜盡朝周諸胡皆自鄶鳴笳浣海曲按莭陽關外落日下河源寒山靜秋塞万方氛祲息六合乾坤大無戰是天心天心同覆載三月三日曲江侍宴應制万乘親齊祭千官喜豫遊奉迎從上苑祓禊向中流祖席傾三省褰帷向九州楊花飛上路槐色蔭通溝來預鈞天樂歸分漢主憂宸章類河漢垂象滿中州奉和聖製送不蒙都護兼鴻臚卿歸安西應制上卿增命服都護揚歸斾雜虜盡朝周諸胡皆自鄶鳴笳浣海曲按莭陽關外落日下河源寒山靜秋塞万方氛祲息六合乾坤大無戰是天心天心同覆載三月三日曲江侍宴應制万乘親齊祭千官喜豫遊奉迎從上苑祓禊向中流四海方無事三秋大有年百生逢此日万壽願齊天芍藥和金鼎茱茰插玳筵玉堂開右個天樂動宫懸御柳踈秋景城鴉拂曙煙無窮菊花莭長奉柏梁萹奉和聖製賜史供奉曲江宴應制侍從有鄒枚瓊筵就水開言陪柏梁宴新下建章來對酒山河滿移舟草樹回天文同麗日駐景惜行杯三月三日勤政樓侍宴應制綵仗連宵合瓊樓拂曙通年光三月裏宫殿百花中不數秦王日誰將洛水同酒筵嫌落絮舞袖怯春風天保無為德人歡不戰功仍臨九衢宴更逹四門聰大同殿生玉芝龍池上有慶雲百官共覩聖恩便賜宴樂敢書即事欲笑周文歌宴鎬遙輕漢武樂橫汾豈如玉殿生三秀詎有銅池出五雲陌上堯樽傾北斗樓前舜樂動南薰共歡天意同人意萬歲千秋奉聖君勑贈百官櫻桃時為文部郎中美蓉闕下會千官紫禁朱櫻出上蘭總是寢園春薦後非關御苑鳥銜殘歸鞍競帶青絲籠中使頻傾赤玉盤飽食不須愁內熱大官還有䉀漿寒和右輔闕崔興宗未央朝謁正逶迤天上櫻桃錫此時朱實𥘉傳九華殿繁花舊雜萬年枝未勝晏子江南橘莫比潘家大谷梨聞道令人好顔色神農本草自應知奉和聖製天長莭賜宰臣歌應制大陽升兮照萬方開閶闔兮臨玉堂儼冕旒兮垂衣裳金天淨兮麗三光彤庭曙兮延八荒德合天兮禮神遍靈芝生兮慶雲見唐堯后兮稷卨臣匝宇宙兮華胥人盡九服兮皆四鄰乾降瑞兮坤獻珍奉和聖製聖札賜宰臣連珠詞五首應制時為庫部貟外臣聞大明馭宇天地同符間氣佐時君臣協德故千年聖主唐帝撫其寶圗七德諸侯周公為之元老臣聞有其才者效其職重其任者竭其能故樂播大凮乃能調四氣身騎列宿於是運三光臣聞先天不違德合於上事君盡力功濟於下故君臣同體于大道庶人以康億兆宅心于至仁萬邦乃固臣聞形之端者影必隨焉聲之善者響必應焉故偃武修文皇天降之善氣薄賦省役后土報以豐年臣聞宣至理者文懸於日月表聖言者字動之以煙雲故虞舜作歌徒施於典策伏羲畫卦未類於昭回勑借岐王九成宫避暑應教帝子逺辭丹鳯闕天書遙借翠微宫隔窗雲霧生衣上卷慢山泉入鏡中林下水聲喧語笑巖間樹色隱房櫳仙家未必能勝此何事吹笙向碧空從岐王過楊氏别業應教楊子談經所淮王載酒過興闌啼鳥換坐久落花多徑轉廽銀燭林開散玉珂嚴城時未啓前路擁笙歌從岐王夜宴衛家山池應教座客香貂滿宮娃綺幔張澗花輕粉色山月少燈光積翠紗窗暗飛泉繡户涼還將歌舞出歸路莫愁長和尹諌議史館山池雲館接天居霓裳侍玉除春池百子外芳樹萬年餘洞有仙人籙山藏大史書君恩深漢帝且莫上空虛和陳監四郎秋雨中思從弟據嫋嫋秋凬動凄凄煙雨繁聲連鳷鵲觀色暗鳯凰原細柳踈髙閣輕槐落洞門九衢行欲斷萬井寂無喧忽有愁霖唱更陳多露言平原思令弟康樂謝賢昆逸興方三接衰顔強七奔相如今老病歸守茂陵園和僕射晉公扈從溫湯時為右輔闕天子幸新豐旌旗渭水東寒山天仗裏溫谷慢城中奠玉羣仙坐焚香大一宫出遊逢牧馬罷獵有非雄上宰無為化明時大古同靈芝三秀紫陳粟萬箱紅王禮尊儒教天兵小戰功謀猷歸哲匠詞賦屬文宗司諌方無闕陳詩且未工長吟吉甫頌朝夕仰清凮和宋中丞夏日遊福賢觀天長寺即陳左相所施之作巳相殷王國空餘尚父溪釣磯開月殿築道出雲梯積水浮香象深山鳴白雞虛空陳妓樂衣服製虹霓墨點三千界丹飛六一泥桃源勿遽返再訪恐君迷和賈舍人早朝大明宫之作綘幘雞人送曉籌尚衣方進翠雲裘九天閶闔開宫殿萬國衣冠拜冕旒日色才臨仙掌動香煙欲傍衮龍浮朝罷須裁五色詔珮聲歸向鳯池頭瓜園詩并序維瓜園髙齋俯視南山形勝二三時輩同賦是詩兼命詞英數公同用園字為韻住多少時大子司議郎薛璩發此題遂同諸公云余適欲鋤瓜倚鋤聽四門鳴騶導驄馬常從夾朱軒窮巷正傳呼故人儻相存攜手追涼凮放心望乾坤藹藹帝王州宫觀一何繁林端出綺道殿頂搖華幡素懷在青山若值白雲屯廽凮城西雨返景原上村前酌盈樽酒往往間清言黃鸝轉深木朱槿照中園猶羡松下客石上聞清猿同崔傅答賢弟洛陽才子姑蘇客杜宛殊非故鄉陌九江楓樹幾回青一片楊州五湖白楊州時有下江兵蘭陵鎮前吹笛聲夜火人歸冨春郭秋凮鶴唳石頭城周郎陸弟為儔侶對舞前溪歌白紵曲機書留小史家草堂碁賭山隂墅衣冠若話外臺臣先數夫君席上珍更聞臺閣求三語遙想凮流第一人同崔貟外秋宵寓直建禮髙秋夜承明候曉過九門寒漏徹萬井曙鐘多月迥藏珠斗雲消出綘河更慙衰朽質南陌共鳴珂同比部楊貟外十五夜遊有懷靜者季雜言承明少休沐建禮省文書夜漏行人息歸鞍落日餘懸知三五夕萬户千門闢夜出曙翻歸傾城滿南陌陌頭馳騁盡繁華王孫公子五侯家由來月明如白日共道春燈勝百花聊看侍中千餘騎強識小婦七香車香車寶馬共喧闐箇裏多情俠少年競向長楊柳市北肯過精舍竹林前獨有仙郎心寂寞却將宴坐為行樂儻覔忘懷共往來幸霑同舍甘藜藿沈十四拾遺新竹生讀經處同諸公之作間居日清靜修竹自檀欒嫩莭留餘籜新叢出舊闌細枝凮響亂踈影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂仙壇同盧拾遺韋給事東山别業二十韻給事首春休沐維巳陪遊及乎是行亦預聞命會無車馬不果斯諾託身侍雲陛昧早趍華軒遂陪鵷鴻侶霄漢同飛翻君子垂惠顧期我於田園側聞景龍際親降南面尊萬乘駐山外順凮祈一言髙陽多夔龍荆山積璵璠盛德啓前烈大賢鍾後昆侍郎文昌宫給事東掖垣謁帝俱來下冠蓋盈丘樊閨凮首邦族庭訓延鄉村菜地包山河樹共竟川原巖端廽綺檻谷口開朱門階下羣峯首雲中瀑水源鳴玉滿春山列筵先朝暾會舞何颯踏擊鍾彌朝昏是時陽和莭清晝猶未暄藹藹樹色深嚶嚶鳥聲繁顧巳負宿諾延頸慙芳蓀蹇步守窮巷髙駕難攀援素是獨往客脫冠情彌敦和使君五郎西樓望逺思歸髙樓望所思目極情未畢枕上見千里窗中窺萬室悠悠長路人曖曖逺郊日惆悵極浦外迢遞孤煙出能賦屬上才思歸同下秩故鄉不可見雲水空如一和大常韋主簿五郎溫湯寓目漢主離宮接露臺秦川一半夕陽開青山盡是朱旗繞碧澗翻從玉殿來新豐樹裏行人度小苑城邊獵騎廽聞道甘泉能獻賦懸知獨有子雲才奉和楊駙馬六郎秋夜即事髙樓月似霜秋夜鬱金堂對坐彈盧女同看舞鳯凰少兒多送酒小玉更焚香結束平陽騎明朝入建章酬諸公見過四言時官出在輞川莊嗟余末喪哀此孤生屏居藍田薄地躬耕歲晏輸稅以奉粢盛晨往東臯草露未晞暮看煙火負簷來歸我聞有客足掃荆扉簞食伊何副瓜􅎲棗仰厠群賢皤然一老愧無管簟班荆席藁泛泛登陂折彼荷花淨觀素鮪俯映白沙山鳥群飛日隱輕霞登車上馬倐忽雨散雀噪荒村雞鳴空館還復幽獨重欷纍歎酬虞部蘇貟外過藍田别業不見留之作貧居依谷口喬木帶荒村石路枉廽駕山家誰侯門漁舟膠凍浦獵火燒寒原唯有白雲外踈鍾聞夜猿酬比部楊貟外暮宿琴臺朝躋書閣率爾見贈之作舊簡拂塵看鳴琴候月彈桃源迷漢姓松樹有秦官空谷歸人少青山背日寒羡君棲隱處遙望白雲端苑舍人能書𣑽字兼逹𣑽音皆曲盡其妙戲為之贈名儒待詔滿公車才子為郎典石渠蓮花法藏心懸悟貝葉經丈手自書楚詞共許勝楊馬𣑽字何人辨魯魚故舊相望在三事願君莫厭承明廬苑咸答并序王元外兄以豫嘗學天竺書有戲題見贈然王兄當代詩匠又精禪理枉採知音形於雅作輒走筆以酬焉且久未遷因而嘲及蓮花𣑽字本從天華省仙郎早悟禪三點成伊猶有想一觀如妄自忘筌為文巳變當時體入用還推間氣賢應同羅漢無名欲故作馮唐老歲年重酬苑郎中并序時為庫部貟外須輒奉贈忽枉見酬敘末云且久不遷因而嘲及詩落句云應同羅漢無名欲故作馮唐老歲年亦解嘲之類也何幸含香奉至尊多慙未報主人恩草木豈能酬雨露榮枯安敢問乾坤仙郎有意憐同舍丞相無私斷掃門楊子解嘲徒自遣馮唐巳老復何論酬郭給事洞門髙閣靄餘輝桃李隂隂柳絮飛禁裏踈鍾官舍晚省中啼鳥吏人稀晨搖玉珮趍金殿夕奉天書拜瑣闈強欲從君無郍老將因卧病解朝衣酬嚴少尹徐舍人見過不遇公門暇日少窮巷故人稀偶值乘藍輿非關避白衣不知炊黍否誰解掃荆扉君但傾茶碗無妨騎馬歸慕容承携素饌見過紗帽烏皮几間居懶賦詩門看五柳識年算六身知靈壽君王賜雕胡弟子炊空勞酒食饌特底解人頥酬慕容上行行西陌返駐爐問車公挾轂雙官騎應門五尺僮老年如塞北強起離牆東為報壷丘子來人道姓蒙酬張少府晚年唯好靜万事不關心自顧無長䇿空知返舊林松風吹解帶山月照彈琴君問窮通理漁歌入浦深喜祖三至留宿門前洛陽客下馬拂征衣不枉故人駕平生多掩扉行人返深巷積雪帶餘暉早歲同𫀆者髙車何處歸答祖詠四年不相見相見復何為握手言未畢却令傷别離升坣還駐馬酌醴便呼兒語默自相對安用傍人知酬黎居士浙川作曇壁上人院走筆成儂家真箇去公定隨儂否著處是蓮花無心變楊柳松龕藏藥裹石唇安茶􅍫氣味當共知那能不攜手酬賀四贈葛巾之作野巾傳惠好兹貺重兼金嘉此幽栖物能齊隱吏心早朝方暫挂晚沐復來簮坐覺嚻塵逺思君共入林故人張諲工詩善易卜兼能丹青草隸頃以詩見贈聊獲酬之不逐城東遊俠兒隱囊紗帽坐彈碁蜀中夫子時開卦洛下書生解詠詩藥欄花徑衡門裏時復據梧聊隱几屏風誤點惑孫郎團扇草書輕內史故園高枕度三春永日垂帷絶四鄰自想蔡雍今巳老更將書籍與何人答張五弟雜言終南有茅屋前對終南山終年無客長閉關終日無心長自間不妨飲酒復垂釣君但能來相往還輞口遇雨憶終南山因獻絶句裴迪積雨晦空曲平沙滅浮彩輞水去悠悠南山復何在答裴迪渺渺寒流廣蒼蒼秋雨晦君問終南山心知白雲外須溪先生校本唐王右丞集卷第二
