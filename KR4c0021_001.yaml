front:
  text: 須溪先生校本唐王右丞集卷第一
  hash: sha256:ee20391694bdefa512796de2aa22f93d547e2fa20a5de10516702c964de074f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_001-1a}
body:
  text: 唐尚書右丞贈祕書監王維白鸚鵡賦若夫名依西域族本南海同朱喙之清音變緑衣於素彩惟兹鳥之可貴諒其美之斯在爾其入玩於人見珍竒質狎蘭房之妓女去桂林之雲日易喬枝以羅袖代危巢以瓊室慕侣方逺依人永畢託言語而雖通顧形影而非匹經過珠網出入金鋪單鳴無應隻影長孤偶白鷼於池側對皓鶴於庭隅愁混色而難辨願知名而自呼明心有識懷思無極芳樹絶想雕梁撫翼時銜花而不言每投人以方息慧性孤稟雅容非飾含火德之明輝𬒳金方之正色至如海燕呈瑞有玉筐之可依山雞學舞向寶鏡而知歸皆羽毛之偉麗奉日月之光輝豈憐兹鳥地逺形微色凌紈質彩奪繒衣深籠久閉喬木長違儻見借其羽翼與遷鶯而共飛登樓歌聊上君兮髙樓飛甍鱗次兮在下俯十二兮通衢緑槐參差兮車馬却瞻兮龍首前眺兮冝春王畿鬱兮千里山河壯兮咸秦舍人下兮青宫據胡床兮書空執戟疲於下位老夫好隱兮牆東亦幸有張伯英草聖兮龍騰蚪躍擺長雲兮捩廽凬琥珀酒兮雕胡飯君不御兮日將晚秋凬兮吹衣夕鳥兮爭返孤砧發兮東城林薄暮兮蟬聲逺時不可兮再得君何為兮偃蹇夷門歌七雄雄雌猶未分攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子為嬴停駟馬執轡逾恭意愈下亥為屠肆鼓刀人嬴乃夷門抱關者非但慷慨獻良謀意氣兼將身命酬向凬刎頭送公子七十老翁何所求堇許不可易雙黃鵠歌送别時為莭度判官在涼府作天路來兮雙黃鵠雲上飛兮水上宿撫翼和鳴整羽族不得巳忽分飛家在玉京朝紫微主人臨水送將歸悲笳嘹唳垂舞衣賔欲散兮復相依幾往返兮極浦尚徘徊兮落暉岸上火兮相迎將夜入兮邊城鞍馬歸兮佳人散悵離憂兮獨含情新秦郡松樹歌青青山上松數里不見今更逢不見君心相憶此心向君君應識為君顔色髙且間亭亭逈出浮雲間青雀歌青雀翅羽短未能逺食玉山禾猶勝黃雀爭上下唧唧空倉復若何同盧象啾啾青雀兒飛來飛去仰天池逍遙飲啄安涯分何假扶搖九萬餘同王縉林間青雀兒來往翩翩繞一枝莫言不解銜環報但問君恩今若為同崔興宗青扈繞青林翩翾陋體一微禽不應長在藩籬下他日凌雲誰見心同裴迪動息自適性不曽妄與燕雀羣幸忝鴛鸞早相識何時提携致青雲贈徐中書望終南山歌晚下兮紫微悵塵事兮多違駐馬兮雙樹望青山兮不歸送友人歸山歌二首山寂寂兮無人又蒼蒼兮多木群龍兮滿朝君何為兮空谷文寡和兮思深道難知兮行獨恱石上兮流泉與松間兮草屋入雲中兮飬雞上山頭兮抱犢神與棗兮如瓜虎賣杏兮收榖愧不才兮妨賢嫌既老兮貪祿誓解印兮相從何詹尹兮何卜不用楚調自適目前詞少而愈多尚覺盤谷歌意為凡山中人兮欲歸雲冝冝兮雨霏霏點景狀意色色别水驚波兮翠菅靡白鷺忽兮翻飛君不可兮褰衣山万重兮一雲混天地兮不分樹暗曖兮氛氲猿不見兮空聞忽山西兮夕陽見東臯兮逺村平蕪緑兮千里眇惆悵兮思君宋玉之下淵明之上甚似晉人不知者以為氣短知者以為琴操之餘音也魚山神女祠歌二首迎神曲坎坎繫鼓魚山之下吹洞簘望極浦女巫進紛屢舞陳瑶席湛淸醑風凄凄兮夜雨神之來兮不來使我心兮苦復苦送神曲紛進拜兮堂前目眷眷兮瓊筵來不語兮意不傳作暮雨兮愁空山悲急管思繁絃靈之駕兮􅌂欲旋倐雲收兮雨歇山青青兮水潺湲扶南曲歌詞五首翠羽流蘇帳春眠曙不開羞從面色起嬌逐語聲來早向昭陽殿君王中使催堂上靑絃動堂前綺席陳齊歌盧女曲雙舞洛陽人傾國徒相看寧知心所親用得别香氣傳空滿粧華影箔通歌聞天仗外舞出御樓中日暮歸何處花間長樂宫宫女還金屋將眠復畏明入春輕衣好半夜薄妝成拂曙朝前殿玉墀多珮聲朝日照綺窗佳人坐臨鏡散黛恨猶輕插叉嫌未正同心勿遽遊幸待春粧竟隴頭吟長城少年遊俠客夜上戍樓看大白隴頭明月逈臨關隴上行人夜吹笛關西老將不勝愁駐馬聽之雙淚流身經大小百餘戰麾下偏禆万户侯蘇武才為典屬國莭旄空盡一作零落海西頭次第轉摺恨惋何限又非長萹所及老將行少年十五二十時步行奪取胡馬騎射殺山中白額虎肯數鄴下黃鬚兒一身轉戰三千里一劒曾當百萬師漢兵奮迅如霹靂虜騎崩騰畏蒺藜衛靑不敗由天幸李廣無功緣數竒自從棄置便衰朽丗事蹉跎成白首昔時飛箭無全目今日垂楊生左肘路傍時賣故侯瓜門前學種先生柳茫茫古木連窮巷遼落寒山對虗牗晝出愈有誓令踈勒出飛泉不似頴川空使酒賀蘭山下陳如雲羽檄交馳日夕聞莭使山河募年少詔書五道出將軍試拂鐡衣如雪色聊持寶劒動星文願得燕弓射天將耻令越馬鳴吳軍莫嫌舊日雲中守猶堪一戰立功勳起結嬌嫩復勝老語燕支行漢家天將才且雄來時謁帝明光宫萬乘親推雙闕下千官出餞五陵東誓辝甲第金門裏身作長城玉塞中衛霍才堪一騎將朝廷不數二師功趙魏燕韓多徑卒關西俠少何咆勃報讎只是聞嘗膽飲酒不曾妨刮骨畫戟雕戈白日寒連旗大斾黃塵沒疊鼓遙翻瀚海波鳴笳亂動天山月麒麟錦帶佩吳鉤颯踏青􅌐躍紫騮拔劒已斷天驕臂歸鞍共飲月支頭漢兵大呼一當百虜騎相看哭且愁教戰須令赴湯火終知上將先伐謀從軍行吹角動行人喧喧行人起笳悲馬嘶亂爭渡金河水日暮沙漠垂戰聲煙塵裏盡係名王􅖪歸來報天子桃源行時年十九魚舟逐水愛山春兩岸桃花夾去津坐看紅樹不知逺行盡青溪不見人山口潛行始隈隩山開曠望旋平陸遙看一處攢雲樹近入千家散花竹樵客𥘉傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乘水入𥘉因避地去人間更問成仙遂不還峽裏誰知有人事丗上遙望空雲山不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辝家終擬長遊衍自謂經過舊不迷安知峯壑今來變當時只記入山深青溪幾度到雲林春來遍是桃花水不辨仙源何處尋隴西行十里一走馬五里一揚鞭都護軍書至胸奴圍酒泉關山正飛雪烽戍斷無煙早春行紫梅發𥘉遍黃鳥歌猶澀誰家折楊女弄春如不及愛水看粧坐羞人映花立香畏風吹散衣愁露霑濕玉閨青門裏日落香車入遊衍益相思􅍭啼向綵帷憶君長入夢歸晚更生疑不及紅簷燕雙栖緑草時洛陽女兒行時年十八洛陽女兒對門居才可顔容十五餘良人玉勒乘驄馬侍女金盤膾鯉魚畫閣朱樓盡相望紅桃緑柳垂簷向羅帷送上七香車寶扇迎歸九華帳狂夫富貴在靑春意氣驕奢劇季倫自憐碧玉親教舞不惜珊瑚持與人春窗曙滅九微火九微片片飛花璅戲罷曽無理曲時粧成秪是薰香坐城中相識盡繁華日夜經過趙李家誰憐越女顔如玉貧賤江頭自浣沙少年行四首新豐美酒斗十千咸陽遊俠多少䄵相逢意氣為君飲繫馬髙樓垂柳邊出身仕漢羽林郎𥘉隨驃騎戰漁陽孰知不向邊庭苦縱死猶聞俠骨香好一身能擘兩雕弧虜騎千重只似無偏坐金鞍調白羽紛紛射殺五單于漢家君臣歡宴終髙議雲臺論戰功天子臨軒賜侯印將軍佩出光眀宫皇甫嶽寫真讃有道者古其神則淸雙眸朗暢四氣和平長江月影大華松聲周而不器獨也難名且未婚嫁猶寄簮纓燒丹藥就辟榖將成雲漢之下法本無生裴右丞寫真讃淡爾清德居然素風氣和容衆心靜如空智以窮理才包至公大盜振駭羣臣困蒙忘身徇莭歷險能通仁者之勇義無失忠凝情取像帷雅則同粉繪不及清明在躬麟閣之上其誰比崇白黿渦雜言走筆南山之瀑水兮激石􅘝瀑似雷驚人相對兮不聞語聲翻渦跳沫兮蒼苔􅊜蘚老且厚春草為之不生獸不敢驚動鳥不敢飛鳴白黿渦濤戲瀨兮委身以縱橫主人之仁兮不網不釣得遂性以生成黃雀癡黃雀癡黃雀癡謂言青鷇是我兒一一口銜食飬得成毛衣到大啁啾解遊揚各自東西南北飛薄暮空巢上羇雌獨自歸鳯凰九雛亦如此慎莫愁思憔悴損容輝贈裴迪雜言不相見不相見來久日日泉水頭常憶同携手攜手本同心復歎忽分襟相憶今如此相思深不深榆林群歌山頭松柏林山下泉聲傷客心千里万里春草色黃河東流流不息黃龍戍上遊俠兒愁逢漢使不相識問冦校書雙溪君家少室西為復少室東别來幾日今春風新買雙溪定何似餘生欲寄白雲中寄崇𣑽僧崇𣑽僧崇𣑽僧秋歸覆釡春不還落花啼鳥紛紛亂澗户山窗寂寂間峽裏誰知有人事郡中遙望空雲山宋進馬哀詞并序宋進馬者中書舍人宋公之子也公無弟兄子一而巳文則有種德亦惟肖忽疾倐逝醫不及視宋公哀之他人悲之故為詞曰背春涉夏兮衆木藹以繁隂連金華與玉堂兮宫閣欎其沈沈百官並入兮何語笑之啞啞君獨靜默以傷心草王言兮不得辭我悲減思兮少時僕夫命駕兮出閶闔歷通逵陌上人兮如故識不識兮往來眼中不見兮吾兒驂紫騮兮從青驪低光垂彩兮恍不知其所之闢朱户兮望華軒意斯子兮候門忽思瘞兮城南心瞀亂兮重昏仰訴天之不仁兮家唯一身身止一子何㣧嗣之不繁就單鮮而又死將清白兮遺誰問詩禮兮巳矣哀從中兮不可勝豈暇料餘年兮復幾日黯黯兮頺曄鳥翩翩兮疾飛邈窮天兮不返疑有日兮來歸靜言思兮永絶復驚呌兮沾衣客有弔之者曰觀未始兮有物同委蛻兮胡悲且延陵兮未至况西河兮不知學無生兮庶可幸能聽于吾師須溪先生校本唐王右丞集卷第一
