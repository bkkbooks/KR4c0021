front:
  text: 湏溪先生校本唐王右丞集卷第一
  hash: sha256:b713f1a8759f4bcd3d1e2ec61a951478be826c44bff222132a09a4449a3ec472
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_001-1a}
body:
  text: 唐尚書右丞贈秘書監王維白鸚鵡賦若夫名依西域族本南海同朱喙之清音變緑衣於素彩惟兹鳥之可貴諒其美之斯在尔其入翫於人見珍竒質狎蘭房之妓女去桂林之雲日易喬枝以羅袖代危巢以瓊室慕侣方逺依人永畢託言語而雖通顧形影而非匹經過珠網出入金鋪單鳴無應隻影長孤偶白鷼於池側對皓鶴於庭隅愁混色而難辨願知名而自呼明心有識懷思無極芳樹絶想雕梁撫翼時衘花而不言毎投人以方息慧性孤禀雅容非飾含火徳之明輝𬒳金方之正色至如海燕呈瑞有玉筐之可依山鷄學舞向寳鏡而知歸皆羽毛之偉麗奉日月之光輝豈憐兹鳥地逺形㣲色凌紈質彩奪繒衣深籠乆閉喬木長違儻見借其羽翼與遷鶯而共飛登樓歌聊上君兮髙樓飛甍鱗次兮在下俯十二兮通衢緑槐參差兮車馬却瞻兮龍首前眺兮冝春王畿鬱兮千里山河壯兮咸秦舎人下兮青宫據胡床兮書空執㦸疲於下位老夫好隠兮牆東亦幸有張伯英草聖兮龍騰蚪躍擺長雲兮捩廽凬琥珀酒兮彫胡飯君不御兮日將晚秋凬兮吹衣夕鳥兮争返孤砧發兮東城林薄暮兮蟬聲逺時不可兮再得君何爲兮偃蹇夷門歌七雄雄雌猶未分攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子爲嬴停駟馬執轡逾恭意愈下亥爲屠肆鼔刀人嬴乃夷門抱関者非但慷慨獻良謀意氣兼將身命酬向凬刎頭送公子七十老翁何所求堇許不可易䨇黄鵠歌送别時爲莭度判官在凉府作天路來兮䨇黄鵠雲上飛兮水上宿撫翼和鳴整羽族不得巳忽分飛家在玉京朝紫㣲主人臨水送將歸悲笳嘹唳垂舞衣賔欲散兮復相依幾徃返兮極浦尚徘徊兮落暉岸上火兮相迎將夜入兮邊城鞍馬歸兮佳人散悵離憂兮獨含情新秦郡松樹歌青青山上松數里不見今更逢不見君心相憶此心向君君應識爲君顔色髙且閑亭亭逈出浮雲間青雀歌青雀翅羽短未能逺食玉山禾猶勝黄雀争上下唧唧空倉復若何同盧象啾啾青雀兒飛來飛去仰天池逍遥飲啄安涯分何假扶摇九萬餘同王縉林間青雀兒來徃翩翩繞一枝莫言不解銜環報但問君恩今若爲同崔興宗青扈繞青林翩翾陋體一㣲禽不應長在藩籬下他日凌雲誰見心同裴迪動息自適性不曽妄與鷰雀羣幸忝鴛鸞早相識何時提携致青雲贈徐中書望終南山歌晚下兮紫㣲悵塵事兮多違駐馬兮双樹望青山兮不歸送友人歸山歌二首山寂寂兮無人又蒼蒼兮多木群龍兮滿朝君何爲兮空谷文寡和兮思深道難知兮行獨恱石上兮流泉與松間兮草屋入雲中兮飬鷄上山頭兮抱犢神與棗兮如瓜虎賣杏兮収榖愧不才兮妨賢嫌既老兮貪禄誓解印兮相從何詹尹兮何卜不用楚調自適目前詞少而愈多尚斍盤谷歌意爲凢山中人兮欲歸雲冝冝兮雨霏霏點景状意色色别水驚波兮翠菅靡白鷺忽兮飜飛君不可兮褰衣山万重兮一雲混天地兮不分樹晻暧兮氛氲猿不見兮空聞忽山西兮夕陽見東臯兮逺村平蕪緑兮千里眇惆悵兮思君宋玉之下渊明之上甚似晋人不知者以為氣短知者以為琴操之餘音也魚山神女祠歌二首迎神曲坎坎繫鼔魚山之下吹洞簘望極浦女巫進紛屡舞陳瑶席湛淸醑風凄凄兮夜雨神之來兮不來使我心兮苦復苦送神曲紛進拜兮堂前目眷眷兮瓊筵来不語兮意不傳作暮雨兮愁空山悲急管思䌓絃靈之駕兮􅌂欲旋倐雲収兮雨歇山青青兮水潺湲扶南曲歌詞五首翠羽流蘇帳春眠曙不開羞從面色起嬌逐語聲來早向昭陽殿君王中使催堂上靑絃動堂前綺席陳齊歌盧女曲䨇舞洛陽人傾國徒相㸔寕知心所親用得别香氣傳空滿粧華影箔通歌聞天仗外舞出御楼中日暮帰何處花間長楽宫宫女還金屋將眠復畏明入春輕衣好半夜薄妝成拂曙朝前殿玉墀多珮聲朝日照綺䆫佳人坐臨鏡散黛恨猶輕挿釵嫌未正同心勿遽遊幸待春粧竟隴頭吟長城少秊遊俠客夜上戍樓看大白隴頭明月逈臨関隴上行人夜吹笛関西老將不勝愁駐馬聽之䨇淚流身經大小百餘戦麾下偏禆万户侯蘇武纔爲典属國莭旄空盡一作零落海西頭次第轉摺恨惋何限又非長萹所及老將行少秊十五二十時歩行奪取胡馬騎射殺山中白額虎肯数鄴下黄鬚兒一身轉戦三千里一劒曾當百萬師漢兵奮迅如霹靂虜騎崩騰畏蒺蔾衛靑不敗由天幸李廣無功縁数竒自從棄置便衰朽丗事蹉跎成白首昔時飛箭無全目今日垂楊生左肘路傍時賣故侯瓜門前斈種先生柳茫茫古木連窮巷遼落寒山對虗牗昼出愈有誓令踈勒出飛泉不似頴川空使酒賀蘭山下陣如雲羽檄交馳日夕聞莭使山河募秊少詔書五道出將軍試拂鐡衣如雪色聊持宝劒動星文願得燕弓射天將耻令越馬鳴呉軍莫嫌舊日雲中守猶堪一戦立功勲起結嬌嫰復勝老語燕支行漢家天將才且雄來時謁帝明光宫萬乗親推雙闕下千官出餞五陵東誓辝甲第金門裏身作長城玉塞中衛霍纔堪一騎將朝廷不数貳師功趙魏燕韓多勁卒関西俠少何咆勃報讎只是聞甞膽飲酒不曾妨刮骨畫㦸雕戈白日寒連旗大斾黄塵沒疊鼓遥翻瀚海波鳴笳乱動天山月麒麟錦帯佩呉鉤颯踏青􅌐躍紫騮拔劒已断天驕臂帰鞍共飲月支頭漢兵大呼一當百虜騎相㸔哭且愁教戦湏令赴湯火終知上將先伐謀從軍行吹角動行人喧喧行人起笳悲馬嘶乱争渡金河水日暮沙漠垂戦聲烟塵裏尽係名王􅖪帰来報天子桃源行時年十九魚舟逐水爱山春两岸桃花夾去津坐看紅樹不知逺行盡青溪不見人山口潜行始隈隩山開曠望旋平陸遥㸔一處攅雲樹近入千家散花竹樵客𥘉傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳静日出雲中雞犬喧驚聞俗客争來集競引還家問都邑平明閭巷掃花開薄暮漁樵乗水入𥘉因避地去人間更問成仙遂不還峽裏誰知有人事丗上遥望空雲山不疑靈境難聞見塵心未盡思郷縣出洞無論隔山水辝家終擬長游衍自謂經過舊不迷安知峯壑今來変當時只記入山深青溪㡬度到雲林春來遍是桃花水不辨仙源何處㝷隴西行十里一走馬五里一揚鞭都護軍書至匈奴圍酒泉関山正飛雪烽戍断無烟早春行紫梅發𥘉遍黄鳥歌猶澁誰家折楊女弄春如不及爱水㸔粧坐羞人映花立香畏風吹散衣愁露霑濕玉閨青門裏日落香車入游衍益相思􅍭啼向綵帷憶君長入夣歸晚更生疑不及紅簷鷰双栖緑草時洛陽女兒行時年十八洛陽女兒對門居纔可顔容十五餘良人玉勒乗騘馬侍女金盤膾鯉魚畫閤朱樓尽相望紅桃緑柳垂簷向羅帷送上七香車宝扇迎歸九華帳狂夫富貴在靑春意氣驕奢劇季倫自憐碧玉親教舞不惜珊瑚持與人春䆫曙㓕九微火九微片片飛花璅戯罷曽無理曲時粧成秪是薫香坐城中相識盡繁華日夜經過趙李家誰憐越女顔如玉貧賤江頭自浣沙少秊行四首新豊羙酒斗十千咸陽遊俠多少䄵相逢意氣爲君飲繫馬髙樓垂柳邊出身仕漢羽林郎𥘉隨驃騎戦漁陽孰知不向邊庭苦縱死猶聞俠骨香好一身能擘两彫弧虜騎千重只似無偏坐金鞍調白羽紛紛射殺五單于漢家君臣歡宴終髙議雲臺論戦功天子臨軒賜侯印將軍佩出光眀宫皇甫岳冩真讃有道者古其神則淸䨇眸朗暢四氣和平長江月影大華松聲周而不器獨也難名且未婚嫁猶寄簮纓燒丹薬就辟榖將成雲漢之下法本無生裴右丞冩真讃澹爾清徳居然素風氣和容衆心静如空智以窮理才包至公大盗振駭羣臣困蒙忘身徇莭歴險能通仁者之勇義無失忠凝情取像帷雅則同粉繪不及清明在躬麟閣之上其誰比崇白黿渦雜言走筆南山之瀑水兮激石􅘝瀑似雷驚人相對兮不聞語聲飜渦跳沬兮蒼苔􅊜蘚老且厚春草爲之不生獸不敢驚動鳥不敢飛鳴白黿渦濤戲瀬兮委身以縦横主人之仁兮不網不釣得遂性以生成黄雀癡黄雀癡黄雀癡謂言青鷇是我兒一一口衘食飬得成毛衣到大啁啾解游颺各自東西南北飛薄暮空巢上覉雌獨自歸鳯凰九鶵亦如此慎莫愁思顦顇損容輝贈裴迪雜言不相見不相見來乆日日泉水頭常憶同携手攜手本同心復歎忽分襟相憶今如此相思深不深榆林群歌山頭松栢林山下泉聲傷客心千里万里春草色黄河東流流不息黄龍戍上遊俠兒愁逢漢使不相識問冦校書双溪君家少室西爲復少室東别來㡬日今春風新買双溪定何似餘生欲寄白雲中寄崇𣑽僧崇𣑽僧崇𣑽僧秋帰覆釡春不還落花啼鳥紛紛乱澗户山䆫寂寂閑峽裏誰知有人亊郡中遥望空雲山宋進馬哀詞并序宋進馬者中書舎人宋公之子也公無弟兄子一而巳文則有種徳亦惟肖忽疾倐逝醫不及視宋公哀之他人悲之故爲詞曰背春渉夏兮衆木藹以繁隂連金華與玉堂兮宫閣欎其沈沈百官並入兮何語笑之啞啞君獨静嘿以傷心草王言兮不得辭我悲减思兮少時僕夫命駕兮出閶闔歴通逵陌上人兮如故識不識兮徃來眼中不見兮吾兒驂紫騮兮從青驪低光垂彩兮怳不知其所之闢朱户兮望華軒意斯子兮候門忽思瘞兮城南心瞀亂兮重昬仰訴天之不仁兮家唯一身身止一子何㣧嗣之不繁就單尠而又死將清白兮遺誰問詩礼兮巳矣哀從中兮不可勝豈暇料餘年兮復㡬日黯黯兮頺曄鳥翩翩兮疾飛邈窮天兮不返疑有日兮來歸静言思兮永絶復驚呌兮沾衣客有弔之者曰觀未始兮有物同委蛻兮胡悲且延陵兮未至况西河兮不知學無生兮庶可幸能聽扵吾師湏溪先生校本唐王右丞集卷第一
