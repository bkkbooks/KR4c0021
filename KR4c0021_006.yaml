front:
  text: 須溪先生校本唐王右丞集卷第六
  hash: sha256:60f73d2cf5b3bd29ca1da14e77c059b772eae0fc732e5d2fd51da4c20faa8975
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_006-1a}
body:
  text: 唐尚書右丞贈祕書監王維曉行巴峽際曉投巴峽餘春憶帝京晴江一女浣自然好朝日衆雞鳴水國舟中市山橋樹抄行登髙万井出眺逈二流明人作殊方語鶯為舊國聲賴諳山水趣稍解别離情出塞作時為監察塞上作居延城外獵天驕白草連天野火燒暮雲空磧時驅遼玉靶角弓珠勒馬漢家將賜霍嫖姚自大散巳往深林密竹蹬道盤曲四五十里至黃牛嶺見黃花川危徑幾万轉數里將三休回環見徒侣隱映隔林丘颯颯松上雨潺潺石中流靜言深溪裏長嘨髙山頭望見南山陽白日靄悠悠青皋麗巳淨緑樹欎如浮曾是厭蒙密曠然消人憂𬒳出濟州微官易得罪謫去濟川隂執政方持法明君無此心閭閻河潤上井邑海雲深縱有歸來日各愁年鬢侵休假還舊業便使謝病始告歸依依入桑梓家人皆佇立相候衡門裏時輩皆長年成人舊童子上堂嘉慶畢顧與姻親齒論舊忽餘悲目存且相喜田園轉蕪沒但有寒泉水衰柳日蕭條秋光清邑里入門乍如客休騎非便止中飯顧王程離憂從此始早入榮陽界泛舟入滎澤兹邑乃雄藩河曲閭閻隘川中煙火繁因人見風俗入境聞方言秋田晚疇盛朝光市井喧漁啇波上客雞犬岸傍村前路白雲外孤帆安可論寒食汜上作廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人宿鄭州朝與周人辝暮投鄭人宿他鄉絶儔侶孤客親僮僕宛洛望不見秋霖晦平陸田父草傺歸村童雨中牧主人東皋上時稼繞茅屋蟲思機杼鳴雀喧禾黍熟明當渡京水昨晚猶金谷藹然戀闕之情此去欲何言窮邊徇微一作食祿千塔主人逆旅逢佳莭征帆未可前窗臨汴河水門渡楚人船雞犬散墟落桑榆蔭逺田所居人不見枕席生雲煙使至塞上單車欲問邊屬國過居延征蓬出漢塞歸鴈入湖天大漠孤煙直長河落日圎蕭關逢候吏都護在燕然亦是不用一辝渡河到淸河作泛舟大河裏積水窮天涯天波忽開拆郡邑千万家行復見城市宛然有桑麻回瞻舊鄉國渺漫連雲霞苦熱赤日滿天地火雲成山嶽草木盡樵卷川澤皆竭涸輕紈覺衣重樹密苦隂薄莞簟不可近絺綌再三濯思出宇宙外曠然在寥廓長風万里來江海蕩煩濁却顧身為患始知心未覺忽入甘露門宛然清涼樂納涼喬木方餘株清流貫其中前臨大川口豁逹來長風漣漪含白沙素鮪如遊空偃卧盤石上翻濤沃微躬潄流復濯足前對釣魚翁貪餌凡幾許徒思蓮葉東濟上四賢詠崔録事解印歸田里賢哉此丈夫少年曽任俠晚莭更為儒遁丗東山下因家滄海隅巳聞能狎鳥余欲共乘桴成文學寶劒千金裝登君白玉堂身為平原客家有邯鄲倡使氣公卿座論心遊俠場中年不得志謝病客遊梁鄭霍二山人翩翩繁華子多出金張門幸有先人業早蒙明主恩童年且未學肉食騖華軒豈乏中林士無人獻一作薦至尊鄭公老泉石霍子安丘樊賣藥不二價著書盈萬言息隂無惡木飲水必清源吾賤不及議斯人竟誰論偶然作六首楚國有狂夫茫然無心想散髮不冠帶行歌南陌上孔丘與之言仁義莫能奬未嘗肯問天何事須擊壤復笑採薇人胡為乃長往田舍有老翁垂白衡門裏有時農事間斗酒呼鄰里喧聒茅簷下或坐或復起短褐不為薄園葵固足美動則長子孫不曾向城市五帝與三王古來稱天子干戈將揖讓畢竟何者是得意苟為樂野田安足鄙且當放懷去行行沒餘齒天一作君放一作忘日夕見大行沉吟未能去問君何以然丗網嬰我故小妹日成長兄弟未有娶家貧祿既薄儲蓄非有素幾回欲奮飛踟蹰復相顧孫登長嘨臺松竹有餘處相去詎幾許故人在中路愛染日巳薄禪寂日巳固忽乎吾將行寧俟歲云暮陶潛任天真其性頗耽酒自從棄官來家貧不能有九月九日時菊花空滿手中心竊自思倘有人送否白衣携壷觴果來遺老叟且喜得斟酌安問升與斗但可從此止奮衣野田中今日嗟無負兀傲迷東西蘘苙不能守傾倒強行行酣歌歸五柳生事不曾問肯愧家中婦趙女彈箜篌復能邯鄲舞夫壻輕薄兒閗雞事齊主黃金買歌笑用錢不復數許史相經過髙門盈四牡客舍有儒生昻藏出鄒魯讀書三十年腰下無尺組𬒳服聖人教一生自窮苦老來懶賦詩惟有老相隨宿丗􅍝詞客前身應畫師不能捨餘習偶𬒳丗人知名字本皆是此心還不知西施詠艷色天下重西施寧久微朝為溪越女暮作吳宫妃賤日豈殊衆貴來方悟稀邀人傳脂粉不自著羅衣君寵益嬌態君憐無是非當時浣沙伴莫得同車歸持謝鄰家子斆嚬安可希李陵詠時年十九漢家李將軍三代將門子結髮有竒䇿少年成壯士長驅塞上兒深入單于里旌旗列相向簫鼓悲何巳日暮沙漠陲戰聲煙塵裏將令驕虜滅豈獨名王侍既失大軍援遂嬰穹廬恥少小蒙漢恩何堪坐思此深衷欲有報投軀未能死引領望子卿非君誰相理燕子龕禪師山中燕子龕路劇羊腸惡裂地競盤屈插天多峭崿瀑泉吼而噴怪石看欲落伯雨訪未知五丁愁不鑿上人無生緣生長居紫閣六時自捶磬一飲尚帶索種田燒白雲斫􅃮響丹壑行隨拾栗猿歸對巢松鶴時許山神請偶逢洞仙博救丗多慈悲即心無行作周啇倦積阻蜀物多淹泊巖腹乍旁穿澗唇時外拓橋因倒樹架柵值垂藤縳鳥道悉巳平龍宫為之涸跳波誰揭厲絶壁免捫摸山木日隂隂結跏歸舊林一向石門裏任君春草深息夫人時年二十莫以今時寵能忘舊日恩看花滿眼淚不共楚王言班婕妤三首玉窗螢影度金殿人聲絶秋夜守羅帷孤燈耿明滅宫殿生秋草君王恩幸踈那堪聞鳯吹門外度金輿怪來粧閣閉朝下不相迎揔向春園裏花間語笑聲語昏不刻而近晚春間思新粧可憐色落日卷羅惟爐氣清珍簞墻隂上玉墀春蟲飛網户暮雀隱花枝向晚多愁思間窗桃李時羽林騎閨人秋月臨髙城城中管絃思離人堂上愁稚子階前戲出門復映户望望青絲騎行人過欲盡狂夫終不至左右寂無言相看共垂淚戲題示蕭氏外甥憐爾解臨池渠爺未學詩老夫何足似弊宅倘因之蘆笋穿荷葉菱花罥鴈兒却公不易勝莫著外家欺冬夜書懷冬宵寒且永夜漏宫中發草白靄繁霜木衰澄清月麗服映頺顔朱燈照華髮漢家方尚少顧影慙朝謁秋夜獨坐獨坐悲雙鬢空坣欲二更雨中山果落燈下草蟲鳴白髮終難變黃金不可成欲知除老病唯有學無生不遇詠北闕獻書寢不報南山種田時不登百人會中身不預五侯門前心不能身投河朔飲君酒家在茂陵平安否且共登山復臨水莫問春凮動楊柳今人作一作昨人多自私我心不説君應知濟人然後拂衣去肯作徒爾一男兒待儲光羲不至重門朝巳啓起坐聽車聲要欲聞清佩方將出户迎晚鍾鳴上苑踈雨過春城了自不相顧臨堂復空情聽宫鶯春樹繞宫牆春鶯轉曙光忽驚啼暫斷移處哢還長隱葉棲承露排花出未央遊人未應返為此思故鄉聽百舌鳥上蘭門外草萋萋未央宫中花裏栖亦有相隨過御苑不知若箇向金堤入春解作千般語拂曙能先百鳥啼萬户千門應覺曉建章何必聽鳴雞題友人雲母障子時年十五君家雲母障持向野庭開自有山泉入非因彩畫來賦得清如玉壷冰京兆府試時年十九藏氷玉壷裏氷水類方諸未共銷丹日還同照綺踈抱明中不隱􅍭淨外疑虛氣似庭霜積光言砌月餘曉凌飛鵲鏡宵映聚螢書若向夫君比清心尚不如劇嘲史寰清凮細雨濕梅花驟馬先過碧玉家正值楚王宫裏至門前𥘉下七香車紅牡丹緑艷間且靜紅衣淺復深花心愁欲斷春色豈知心左掖梨花間灑階邊草輕隨箔外凮黃鶯弄不足銜入未央宫同詠丘為冷艷全欺雪餘香乍入衣春凮且莫定吹向玉階飛同詠皇甫冉巧解迎人笑偏能亂蝶飛春凮時入户幾片落朝衣早朝二首皎潔明星髙蒼茫逺天曙槐霧欎不開城鴉鳴稍去始聞髙閣聲莫辨更衣處銀燭巳成行金門儼騶馭柳暗百花明春深五鳯城城烏睥睨曉宫井轆轤聲方朔金門侍班姬玉輦迎仍聞遣方士東海訪蓬瀛菩提寺禁裴迪來相看説逆賊等凝碧池上作音樂供奉人等舉聲便一時淚下私成口號誦示裴迪萬户傷心生野煙百官何日更朝天秋槐葉落空宫裏凝碧池頭奏管絃口號又示裴迪安得捨塵網拂衣辭世喧悠然䇿藜杖歸向桃花源春日直門下省早朝騎省直明光雞鳴謁建章遙聞侍中珮暗識令君香玉漏隨銅史天書拜夕郎旌旗映閶闔歌吹滿朝陽官舍梅𥘉紫宫門柳欲黃願將遲日意同與聖恩長愚公谷青龍寺與黎昕戲題三首愚谷與誰去唯將黎子同非須一處住不郍兩心空寧問春將夏誰論西復東不知吾與子若箇是愚公愚一作吾家愚谷裏此谷本來平雖則行無迹還能響應聲不隨雲色暗只待日光明緣砥名愚谷都由愚所成借問愚公谷與君聊一尋不尋翻到谷此谷不離心行處曾無險看時豈有深寄言塵丗客何處欲歸臨寓言朱紱誰家子無乃金張孫驪駒從白馬出入銅龍門問爾何功德多承明主恩閗雞平樂館射雉上林園曲陌車騎盛髙堂珠翠繁奈何軒冕貴不與布衣言君家御溝上垂柳夾朱門列鼎會中貴鳴珂朝至尊生死在八議窮逹由一言須識苦寒士莫矜狐白溫雜詩五首朝因折楊柳相見洛城隅楚國無如妾秦家自有夫對人傳玉腕映竹解羅𥜗人見東方騎皆言夫壻殊持謝金吾子煩君提玉壷多少疑有誤雙燕𥘉命子五桃𥘉作花王昌是東舍宋玉次西家小小能織綺時時出浣沙親勞使君問南陌駐香車家住孟津河門對孟津口常有江南船寄書家中否與時有汶陽人皆費解説君自故鄉來應知故鄉事來日綺窗前寒梅開花未巳見寒梅發復聞啼鳥聲心心視春草畏向階前生獻始興公時拜右拾遺寧棲野樹林寧飲澗水流不用坐良肉﨑嶇見王侯鄙哉匹夫莭布褐將白頭任智誠則短守仁固其憂側聞大君子安問黨與讎所不賣公器動為蒼生謀賤子跪自陳可為帳下不感激有公議曲私非所求上張令公珥筆趍丹陛垂璫上玉除步簷青瑣闥方幰畫輪車市閲千金字朝開五色書致君光帝典薦士滿公車伏奏廽金駕橫金重石渠從兹罷角抵希復幸儲胥天統知堯後王章笑魯𥘉胸奴遙俯伏漢相􅌂簮𥚑賈生非不遇汲黯自堪踈學易思求我言詩或起豫嘗從大夫後何惜隸人餘崔興宗寫真畫君年少時如今君已老今時新識人知君舊時好山茱茰朱實山下開清香寒更發幸與􅓜桂花窗前向秋月涼州賽神涼州城外少行人百尺峰頭望虜塵健兒擊鼓吹羌笛共賽城東越騎神哭殷遙人生能幾何畢竟歸無形念君等為死萬事傷人情慈母未及葬一女才十齡泱􅐯寒郊外蕭條聞哭聲浮雲為蒼茫飛鳥不能鳴行人何寂寞白日自凄清憶昔君在時問我學無生勸君苦不早令君無所成故人各有贈又不及平生負爾非一途痛哭返柴荆送君返葬石樓山松柏蒼蒼賔馭還埋骨白雲長已矣空餘流水向人間哭孟浩然時為殿中侍御史知南選至襄陽作故人不可見漢水日東流借問襄陽老江山空蔡州哭禇司馬妄識皆心纍浮生定死媒誰言老龍吉未免伯牛災故有求仙藥仍餘遁俗杯山川秋樹苦窗户夜泉哀尚憶青騾去寧知白馬來漢臣修史記莫蔽禇生才過沈居士山居哭之楊朱來此哭桑扈返于真獨自成千古依然舊四鄰間簷喧鳥雀故榻滿埃塵曙月孤鶯囀空山五栁春野花愁對客泉水咽迎人善卷明時隱黔婁在日貧逝川嗟爾命丘井嘆吾身前後徒言隔相悲詎幾晨哭祖六自虛時年十八否極嘗聞泰嗟君獨不然憫凶才稚齒羸疾至中年餘力文章秀生知禮樂全翰留天帳覽詞入帝宫傳國訝終軍少人知賈誼賢公卿盡虛左朋識共推先不恨依窮轍終期濟大川才雄望羔鴈壽促背貂蟬福善聞前録殱良昧上玄何辜鎩鸞翮何事與龍泉鵩起長沙賦麟終曲阜篇城中君道廣海內我情偏乍失疑猶見沉思悟絶緣生前不忍别死後向誰宣為此情難盡彌令憶更纏本家清渭曲歸葬舊塋邉求去長安道徒開京兆阡旌車出郊甸鄉國隱雲天定作無期別寧同舊日旋候門家屬苦竹路國人憐送客哀終進征途哭復前贈言為挽曲奠席是離筵念昔同携手風期不暫捐南山俱隱逸東洛類神仙未省音容間郍堪生死遷花時金谷飲月夜竹林眠滿地傳都賦傾朝看藥船群公咸屬目微物敢齊肩􅍝合同人旨而將玉樹連不期先挂劒長恐後施鞭為善吾無已知音子絶焉琴聲縱不沒終亦斷悲絃歎白髮二首我年一何長鬢髮日已白俯仰天地間能為幾時客惆悵故山雲徘徊空日夕何事與時人東城復南陌宿昔朱顔成暮齒須臾白髮變垂髫一生幾許傷心事不向空門何處銷過秦皇墓時年十五古墓成蒼嶺幽官象𬗋臺星辰七曜隔河漢九泉開有海人寧渡無春鴈不廽更聞松韻切疑是大夫哀故太子太師徐公挽歌四首功德冠群英彌綸有大名軒皇用風后傅説是星精就第優遺老來朝詔不名留侯常辟穀何苦不長生謀猷為相國翊贊奉乘輿劒履升前殿貂蟬託後車齊侯疏土宇漢室賴圖書僻處留田宅仍才十頃餘舊里趍庭日新年置酒晨聞詩鸞渚客獻賦鳳樓人北首辭明主東堂哭大臣猶思御朱輅不惜汗車茵久踐中台座終登上將壇誰言斷車騎空憶盛衣冠風日咸陽慘笳簫渭水寒無人當便闕應罷太師官故西河郡杜太守挽歌三首天上去西征雲中護北平生擒白馬將連破黑雕城忽見芻靈善徒聞竹使榮空留尤氏傳誰繼卜商名返葬金符宇同歸石􅐎棲卷衣悲畫翟持翣待鳴雞容衛都人慘山川駟馬嘶猶聞隴上客相對哭征西塗芻去國門祕器出東園太守留金印夫人罷錦軒旌旄轉衰木簫鼓上寒原墳樹應西靡長思魏闕恩故南陽夫人樊氏挽歌二首錦衣餘翟黻繡轂罷魚軒淑女詩長在夫人法尚存凝笳隨曉斾行哭向秋原歸去將何見誰能返戟門石􅐎恩榮重金吾車騎盛將朝每贈言入室還相敬疊鼓秋城動懸旌寒日映不言長不歸環珮猶將聽送奚侍郎夫人冦氏二首一無此下七首束帶將朝日鳴環映牗辰能令明諫主相勸識賢人遺挂空留壁廽文日覆塵金𧖟將畫栁何處更知春女史悲彤管夫人罷錦軒卜塋占二室行哭度千門秋日光能淡寒川波自翻一朝成萬古松柏暗平原恭懿太子挽歌五首何悟藏環早才知拜壁年翀天王子去對日聖君憐樹轉宫猶出笳悲馬不前雖蒙絶馳道京兆别開阡蘭殿新恩切椒宮夕臨幽白雲隨鳯管明月在龍樓人向青山哭天臨渭水愁雞鳴常問膳今恨玉京留騎吹凌霜發旌旗夾路陳禮容金莭護册命玉符新傅母悲香褓君家擁畫輪射熊今夢帝稱象問何人蒼舒留帝寵子晉有仙才五歲過人智三天使鶴催心悲四祿館目斷望思臺若道長安近何為更不來西望昆池闊東瞻下杜平山朝豫章館樹轉鳯凰城
