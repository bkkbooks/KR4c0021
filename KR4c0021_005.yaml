front:
  text: 湏溪先生校本唐王右丞集卷第五
  hash: sha256:aed611d8a3c666b540f00ffdd8a2cbabbc6b736935214c99b0bb07bbb8189742
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_005-1a}
body:
  text: 送魏郡李太守赴任與君伯氏别又欲与君離君行無㡬日當復隔山陂蒼茫秦川尽日落桃林塞獨樹臨関門黄河向天外前經洛陽陌宛路一作洛故人稀故人離别尽淇上轉驂騑企予悲送逺惆悵睢陽路古木官渡平秋城鄴宫故想君行縣日其出從如雲遥思魏公子復憶李将軍送秘書晁監還日本囯積水不可極安知滄海東九州何処逺万里若乗空向囯唯㸔日帰帆但信風鰲身映天黒魚眼射波紅郷樹扶桑外主人孤島中别離方異域音信若爲通送徐郎中東郊春草色驅馬去悠悠况復郷山外猿啼湘水流㠀夷傳露版江館候鳴騶卉服爲諸吏珠官拜本州孤鸎吟逺墅野杏發山郵早晚方帰奏南中絶忌秋送李判官赴江東聞道皇華使方隨皂盖臣封章通左語冠冕化文身樹色分楊子潮声滿冨春遥知辨璧吏恩到泣珠人送康太守城下滄江水江边黄鶴楼朱欄將粉蝶江水映悠悠鐃吹發夏口使君居上頭郭門隠楓岸候吏趍蘆洲何異臨川郡還來一作劳康楽侯送陸貟外郎署有伊人居然古人風天子頋河北詔書隷征東拜手辝上官緩歩出南宫九河平原外七囯葪門中隂風悲枯桑古塞多飛蓬万里不見虜䔥條胡地空無爲費中囯更欲邀竒功遲遲前相送握手嗟異同行當封侯帰肯訪南山翁送封太守忽解羊頭削聊馳熊軾轓揚舲發夏口按莭向呉門㠶映丹揚郭楓攅赤岸村百城多候吏露冕一何尊送王尊師帰蜀中拜埽大羅天上神僊客濯錦江頭花柳春不爲碧雞稱使者唯令白鶴報郷人送崔五大守長安廐吏來到門朱文露網動行軒黄花縣西九折坂玉樹宫南五丈原褒斜谷中不容幰唯有白雲當露冕子午山裏杜䳌啼嘉陵水頭行客飯劒門忽斷蜀川開萬井䨇流滿眼來霧中逺樹刀州出天際澄江巴字廽使君年㡬三十餘少年白晢專城君欲持畫省郎官草廽與臨卭父老書送宇文大守赴宣城寥落雲外山迢逓舟中賞鐃吹發西江秋空多清響地逈古城蕪月明寒潮廣時賽敬亭神復解罟師網何處寄相思南凮吹一作摇五两送嚴秀才還蜀寕親爲令子似舅即賢甥别路經花縣還郷入錦城山臨青塞斷江向白雲平獻賦何時至明君憶長卿送李睢陽將置酒思悲翁使君去出城東夌漸漸雉子斑槐隂隂到潼關騎連連車遲遲心中悲宋又逺周間之南淮夷東齊兒碎碎織練與素絲遊人賈客信難持五糓前熟方可爲下車閉閤君當思天子當殿儼衣裳大官尚食陳羽觴無倫無義彤庭散綬垂明璫黄𥿄詔書出東廂輕紈疊綺爛生光宗室子弟君最賢分憂當爲百辟先布衣一言相爲死何况聖主恩如天鑾聲噦噦魯侯旗明秊上計朝言師湏憶今日斗酒别慎勿冨貴忘我爲送張判官赴河西單車曾出塞報國敢邀勲見逐張征虜今思霍冠軍沙平連白雪蓬卷入黄雲慷慨倚長劔髙歌一送君送岐州源長史歸同在崔常侍幕時崔常侍巳殁握手一相送心悲安可論秋凬正蕭索客散孟常門故驛通槐里長亭下堇原征西舊旌莭從此向河源送綦母校書棄官還江東明時乆不逹棄置与君同天命無怨色人生有素風念君拂衣去四海将安窮秋天万里静日暮澄江空清夜何悠悠扣舷明月中和光漁鳥際澹尔兼葭叢無庸客昭丗衰鬢日如蓬頑踈暗人事僻陋逺天聦㣲物縱可採其誰爲至公今亦從此去帰耕爲老農送張道士帰山先生何処去王屋訪茅君别婦留丹駃驅雞入白雲人間若剰住苦難天上復離群新意當作遼城鶴仙歌使尔聞送元二使安西渭城朝雨裛輕塵客舎青青柳色春勸君更尽一盃酒西出陽関無故人一作依依楊柳春送六舅帰陸渾伯舅吏淮泗卓鲁方喟然悠哉自不競退耕東皐田條桑臘月下種杏春風前酌醴賦帰去共知陶令賢送方尊師帰嵩山仙官欲徃九龍潭旄莭朱幡倚石龕山壓天中半天上洞穿江厎出江南瀑布杉松常帯雨夕陽彩翠忽成嵐借問迎来双白鶴巳曽衡岳送蘇耽同崔㒷宗送瑗公言從石菌閣新下穆陵関獨向池陽去白雲留故山綻衣秋日裏洗鉢古松間一施傳心法唯将戒足還同前崔㒷宗行苦神亦秀冷然溪上松銅瓶与竹枝来自祝融峰常願入霊岳藏經訪遺蹤南帰見長老且爲説心胷送錢少府還蓝田草色日向好桃源人去稀手持平子賦目送老莱衣每候山櫻發時同海鷰帰今年寒食酒應得返柴扉留别錢起卑棲却得性毎与白雲帰徇禄仍懷橘㸔山免採薇暮禽先去馬新月待開扉霄漢時回首知音青璅闈送丘為徃唐州宛洛有凮塵君行多苦辛四愁連漢水百口寄随人槐色隂清昼楊花惹暮春朝端肯相送天子綉衣臣留别丘爲歸鞍白雲外繚繞出前山今日又明日自知心不閑親劳簮組送欲趂鶯花還一歩一廽首遲遲向近関送元中丞轉運江淮薄税歸天府輕徭頼使臣歡沾賜帛老恩及卷綃人去問珠官俗來經石刼春東南髙亭上莫使有風塵送别下馬飲君酒問君何所之君言不得意歸卧南山陲但去莫復聞白雲無尽時送張五歸山送君盡惆悵復送何人歸㡬日同携手一朝先拂衣東山有茅屋幸爲歸荆扉當亦謝官去豈令心事違齊州送祖三相逢方一笑相送還成泣祖帳巳傷離荒城復愁入只是眼前道不尽者天寒逺山净日暮長河急解䌫君巳遥望君猶佇立送别送君南浦涙如絲君向東州使我悲爲報故人顦顇尽如今不似洛陽時送崔九興宗遊蜀送君從此去轉覺故人稀徒御猶廻首田園方掩扉出門當旅食中路授寒衣江漢凮流地遊人何處歸送熊九赴任洛陽魏囯應刘氏寂寥文雅空漳河如舊日之子継清風阡陌銅䑓下閭閻金虎中送車盈㶚上輕騎出関東相去千餘里西園明月同送崔興宗巳恨親皆逺誰憐友復稀君王未西頋遊䆠尽東歸塞闊山河净天長雲樹微方同菊花莭相待洛陽扉送縉雲苗大守手䟽謝名王腰章爲長吏方從會稽邸更發汝南騎桉莭下松陽清江響鐃吹露冕見三呉方知百城貴送李太守赴上洛啇山包楚鄧積翠藹沈沉驛路飛泉洒関門落照深野花開古戍行客響空林板屋春多雨山城晝欲隂丹泉通􅉑略白羽抵荆岑若見西山爽應知黄綺心送從弟蕃遊淮南讀書復騎射帯劒遊淮隂淮隂少秊軰千里逺相㝷髙義難自隠明時寕陸沈島夷九州外泉館三山深席㠶聊問罪丹服盡成擒歸來見天子拜爵賜黄金忽思鱸魚鱠復有滄洲心天寒蒹葭渚日落雲夢林江城下楓葉淮上聞秋砧送歸青門外車馬去駸駸惆悵新豊樹空餘天際禽送平淡然判官不識陽関路新從定逺侯黄雲斷春色畫角赴邊愁瀚海經年别一作到交河出塞流湏令外國使知飲月支頭送孫秀才帝城風日好况復建平家玉枕雙女簟金盤五色瓜山中無魯酒松下飯胡麻莫厭田家苦歸期逺復賖送韋評事欲逐將軍取右賢沙場走馬向居延遥知漢使蕭関外愁見孤城落日邊送權二髙人不可有清論復何深一見如舊識一言知道心明時當薄䆠解薜去中林芳草空隱處白雲餘故岺韓侯乆擕手河岳共幽㝷悵别千餘里臨堂鳴素琴送髙道弟耽歸臨淮作座上作少年客淮泗落拓居下邳遨遊向燕趙結客過臨淄山東諸侯國迎送紛交馳自尔猒遊俠閉户方垂幃深明戴家禮頗學毛公詩備知經濟道髙卧陶唐時聖主詔天下賢人不得遺公吏奉纁組安車去茅茨君王蒼龍闕九門十二逵群公朝謁罷冠劔下丹墀野鶴終踉蹌威鳯徒参差或問理人術但致還山詞天書䧏北闕賜帛歸東菑都門謝親故行路日逶遲孤帆萬里外渺漫將何之江天海陵郡雲日淮南祠杳冥滄洲上蕩􅐯無人知緯䔥或賣薬出處安能期送劉司直赴安西絶域陽関道胡煙與塞塵三春時有鳫萬里少行人首蓿隨天馬蒲桃逐漢臣當今外國懼不敢覔和親無意之意送别聖代無隠者英靈盡来歸遂令東山客不得頋採薇旣至君門逺孰云吾道非江淮渡寒食京洛縫春衣置酒臨長道同心與我違行當浮桂棹未幾拂荆扉逺樹帯行客孤城當落暉吾謀適不用勿謂知音稀霊雲池送從弟金盃緩酌清歌轉畫舸輕移艶舞廽自嘆鶺鴒臨水别不同鴻鳫向池來送趙都督赴代州得青字天官動將星漢地柳條青萬里鳴刀斗三軍出井陘忘身辭鳯闕報國取龍庭豈學書生軰䆫間着一經臨髙臺遂黎拾遺相送臨髙臺川原杳何極日暮飛鳥還行人去不息送方城韋明府遥思葭菼際寥落楚人行髙鳥長淮水平蕪故郢城使車聽雉乳縣鼔應雞鳴若見州從事無嫌手板迎平平冩到盡送李貟外賢郎少年何處去負米上銅梁借問阿戎父知爲童子郎魚牋請詩賦橦布作衣裳薏苡扶衰病歸来幸可將送梓州李使君萬壑樹参天千山響杜䳌山中一半雨樹抄百重泉漢女輸橦布巴人訟芋田文翁翻教授不敢倚先賢送楊少府貶彬州明到衡山與洞庭若爲秋月聽猿声愁㸔北渚三湘客惡説南凮五两輕青草瘴時過夏口白頭浪裏出湓城長沙不乆留才子賈誼何湏弔屈平送張五諲歸宣城五湖千萬里况復五湖西漁浦南陵郭人家春糓溪欲歸江淼淼未到草凄凄㝡是自得憶想南陵鎮可冝猿更啼送友人南歸萬里春應盡三江鴈亦稀連天漢水廣孤客郢城歸郎國稻苗秀楚人菰米肥懸知倚門望遥識老萊衣送賀遂貟外外甥南國有歸舟荆門泝上流蒼茫葭菼外雲水與昭丘穡帯城烏去江連暮雨愁猿聲不可聽莫待楚山秋送楊長史赴果州褒斜不容幰之子去何之鳥道一千里猿啼十二時官橋祭酒客山水女郎祠别後同明月君應聽子規送張舎人佐江州同薛據束帯趍承明守官唯謁者清晨聽銀虬薄暮辭金馬受辭未甞易當御方知寡清範何凮流髙文有風雅忽佐江上州當自潯陽下逆旅到三湘長途應百舎香爐逺峯出石鏡澄湖㵼熏鳯杏成林陶潜菊盈把范蠡常好之廬山我心也送君思逺道欲以數行洒送韋大夫東京留守人外遺丗慮空端結遐心曽是巢許淺始知堯舜深蒼生詎有物黄屋如喬林上徳撫神運冲和穆衣襟雲雷康迍難江海遂飛沉天工寄人英龍衮澹一作瞻君臨名器苟不假保釐固其任素資貫方領清景照華簮慷慨念王室從容獻官箴雲旗蔽三川畫角發龍吟晨揚天漢聲夕卷大河隂窮人業巳寕逆虜遺之擒然後解金組拂衣東山岑給事黄門省秋光正沉沉功名與身退老病隨年侵君子從相訪重玄其可㝷送邢桂州鐃吹喧京口凮波下洞庭赭圻將赤岸擊汰復揚舲日落江湖白潮来天地青明珠帰合浦應逐使臣星送宇文三赴河西充行軍司馬横吹雜繁笳邊凮卷塞沙還聞田司馬更逐李輕車蒲壘成秦地莎居屬漢家當令犬戎國朝聘學昆耶送别山中相送罷日暮掩柴扉春草明年緑王孫歸不帰今古断腸理不在多資聖寺送丼二浮生信如寄薄䆠夫何有来徃本無帰别離方此受柳色藹春餘槐隂清夏首不斍御溝上衘悲執杯酒送孫二郊外誰相送夫君道術親書生鄒魯客才子洛陽人祖席依寒草行車起暮塵山川何寂寞長望淚沾巾送崔三徃宻州覲省南陌去悠悠東郊不少留同懷扇枕戀獨念倚門愁路遶天山雪家臨海樹秋魯連功未報且莫蹈滄洲送沈子福江東楊柳渡頭行客稀罟師盪漿向臨圻唯有相思似春色江南江北送君歸送丘爲落第歸江東憐君不得意况復柳條春爲客黄金尽還家白髪新五湖三畒宅萬里一歸人知禰一作尔不能薦羞爲獻納臣留别山中温古上人兄并示舎弟縉解薜登天朝去師偶時哲豈唯山中人兼負松上月宿昔同遊止致身雲霞末開軒臨頴陽卧視飛鳥沒好依盤石飯屡對瀑泉歇理齊少狎隱道勝寕外物舎弟官崇髙宗兄此削髪荆扉但洒掃乗閑當過拂觀别者青青楊柳陌陌上别離人愛子遊燕趙髙堂有老親不行無可飬行去百憂新切切委兄弟依依向四鄰都門帳飲畢從此謝賔親揮淚逐前侣含悽動征輪車從望不見時時起行塵余亦辭家乆㸔之淚滿巾别弟縉後登青龍寺望藍田山陌上新别離蒼茫四郊晦登髙不見君故山復雲外逺樹蔽行人長天隱秋塞心悲䆠遊子何處飛征盖别輞川别業依遲動車馬惆悵出松蘿忍别青山去其如渌水何同前山月曉仍在林凮凉不絶慇懃如有情惆悵令人别清􅎈頓挫略不動容别弟妹二首两妹日成長䨇鬟將及人巳能持寳瑟白解掩羅巾念昔别時小未知踈與親今來始離恨拭涙方慇懃小弟更孩㓜歸來不相識同居雖漸慣見人猶未覔宛作越人語殊丼水郷食别此㝡爲難淚尽有餘憶崔九弟欲徃南山馬上口號與别城隅一分手幾日還相見山中有桂花莫待花如霰同前裴迪歸山深淺去湏盡丘壑羙莫斈武陵人暫遊桃源裏留别崔㒷宗駐馬欲分襟清寒御溝上前山景氣佳獨徃還惆悵别綦母潜端笏明光宮歴稔朝雲陛詔㸔延閣書髙議平津邸適意輕偶人虚心削煩礼盛得江左凮弥工建安體髙張多絶絃截河有清済嚴冬爽群木伊洛方清泚渭水氷下流潼関雪中啓荷蓧幾時還塵纓侍君洗新晴晚望新晴原野曠極目無氛垢郭門臨渡頭村樹連溪口白水明田外碧峯岀山後農月無閑人傾家事南畒漢江臨汎楚塞三湘接荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好凮日留醉與山翁登辨覺寺竹逕從𥘉地蓮峯出化城䆫中三楚盡林上九江平敷草承跌坐長松響𣑽聲空居法雲外觀丗得無生凉州郊外遊望野老才三户邊村少四鄰婆娑依里社䔥皷賽田神洒酒澆芻狗焚香拜木人女巫紛屡舞羅襪自生塵觀獵風勁角弓鳴氣槩將軍獵渭城草枯鷹眼疾雪尽馬蹄輕忽過新豊市還歸細柳營廽看射鵬處千里暮雲平遊感化寺翡翠香烟合琉璃寳地平龍宫連棟宇虎穴傍簷楹谷静惟松響山深無鳥聲瓊峰當户拆金澗透林鳴郢路雲端逈秦川雨外晴鴈王衘果獻鹿女踏花行若用礼記鹿女舛抖擞辭貧里歸依宿化城繞籬生野蕨空館發山櫻香飯青菰米嘉𬞞緑芋羮誓陪清𣑽末端坐學無生逰悟貞寺聞道黃金地仍開白玉田擲山移巨石呪嶺出飛泉猛虎同三徑愁猿學四禪買香燃綠桂乞火踏紅蓮草色摇霞上松聲汎月邊山河窮百二世界滿三千梵宇聊憑視王城逐渺然灞陵才岀樹渭水𣣔連天逺縣分諸一作朱郭孤村起白烟望雲思聖主披霧憶群賢薄宦慚尸素終身擬尚玄誰知草庵客曽和栢梁篇寒食城東即事清溪一道穿桃李演漾綠蒲涵白芷溪上人家凡幾家落花共落東流水蹴踘屢過飛鳥上鞦韆競出垂楊裡少年分日作遨逰不用清明兼上已春日上方即事好讀髙僧傳時看辟穀方鳩形將刻杖龜殻用支床柳色春山暎梨花夕鳥藏北窻桃李下閑坐但焚香晦日逰大理韋卿城南别業四聲依次用與世淡無事自然江海人側聞塵外逰解弁託朱輪極野昭喧景上大垂春雲張組共曲阜汎舟過東鄰故鄉信髙㑹牢醴及家臣一本作佳辰幸同擊壤樂心荷堯爲君郊居杜陵下永日同携手人里藹川陽平原見峰首園廬鳴春鳩林薄媚新柳上卿始登席故老前為壽臨當逰南陂約略執杯酒車轍詘微官惆悵心自咎勝選冬中餘雪在墟上春流駛風日暢懐抱山川好天氣彫胡先豐酌一作晨炊庖膾亦雲一作後至髙情浪海岳浮生寄天地君子外簪纓埃塵良不啻所樂衡門中陶然忘其貴髙館臨登陂曠望一作然蕩心目淡蕩動雲天玲瓏暎墟曲鵲巢結空林雉雊響幽谷應接無閑暇徘徊以躑躅紆組上春堤側弁倚喬木弦望忽已晦後期洲應綠冬日逰覽步出城東門試騁千里目青山横蒼林赤日團下字佳平陸渭北走邯鄲闗東出函谷秦地萬方會来朝九州牧平實悲壮古意雅辭樂府所少鷄鳴咸陽中冠盖相追逐丞相過列侯群公餞光祿相如方老病獨㱕茂陵宿更佀不湏語言汎前陂秋空自明逈況復逺人間暢以沙際鶴兼之雲外山澄波淡将夕清月皓方閑此夜任孤棹夷猶殊未還㳺李山人所居因題屋壁世上皆如夢狂来或自歌問年松樹老有地竹林多藥倩韓康賣門容向子過翻嫌枕上席無那白雲何與蘇盧二員外期㳺方丈寺而蘇不至因有是作共仰頭陀行能忘世締情廽看雙鳳闕相去一牛鳴法向空林說心隨寳地平手巾花氎淨香帔稻畦成同道邀同舍相期宿化城安知不来往翻以得一本作得佀無生登河北城樓作井邑傳一作傅巖上客亭雲霧間髙城眺落日極浦映蒼山岸火孤舟宿漁家夕鳥還寂寥天地暮心與廣川閑登裴迪秀才小臺作端居不出户滿目望雲山落日鳥邊下秋原人外閑遥知逺林際不見此簷間好客多乗月應門莫上關湏溪先生校本唐王右丞集卷第五
