front:
  text: 須溪先生校本唐王右丞集卷第五
  hash: sha256:a4966c6cbf8390455fa0e3cdce608c30729263fc7810a135bfb3ad898b433d60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_005-1a}
body:
  text: 送魏郡李太守赴任與君伯氏别又欲與君離君行無幾日當復隔山陂蒼茫秦川盡日落桃林塞獨樹臨關門黃河向天外前經洛陽陌宛路一作洛故人稀故人離别盡淇上轉驂騑企豫悲送逺惆悵睢陽路古木官渡平秋城鄴宫故想君行縣日其出從如雲遙思魏公子復憶李將軍送祕書朝監還日本國積水不可極安知滄海東九州何處逺万里若乘空向國唯看日歸帆但信風鰲身映天黑魚眼射波紅鄉樹扶桑外主人孤島中别離方異域音信若為通送徐郎中東郊春草色驅馬去悠悠况復鄉山外猿啼湘水流島夷傳露版江館候鳴騶卉服為諸吏珠官拜本州孤鶯吟逺墅野杏發山郵早晚方歸奏南中絶忌秋送李判官赴江東聞道皇華使方隨皂蓋臣封章通左語冠冕化文身樹色分楊子潮聲滿冨春遙知辨璧吏恩到泣珠人送康太守城下滄江水江邊黃鶴樓朱欄將粉蝶江水映悠悠鐃吹發夏口使君居上頭郭門隱楓岸候吏趍蘆洲何異臨川郡還來一作勞康樂侯送陸貟外郎署有伊人居然古人風天子顧河北詔書隸征東拜手辝上官緩步出南宫九河平原外七國葪門中隂風悲枯桑古塞多飛蓬万里不見虜蕭條胡地空無為費中國更欲邀竒功遲遲前相送握手嗟異同行當封侯歸肯訪南山翁送封太守忽解羊頭削聊馳熊軾轓揚舲發夏口按莭向吳門帆映丹揚郭楓攢赤岸村百城多候吏露冕一何尊送王尊師歸蜀中拜掃大羅天上神仙客濯錦江頭花柳春不為碧雞稱使者唯令白鶴報鄉人送崔五大守長安廄吏來到門朱文露網動行軒黃花縣西九折坂玉樹宫南五丈原褒斜谷中不容幰唯有白雲當露冕子午山裏杜鵑啼嘉陵水頭行客飯劒門忽斷蜀川開萬井雙流滿眼來霧中逺樹刀州出天際澄江巴字廽使君年幾三十餘少年白晢專城君欲持畫省郎官草廽與臨卭父老書送宇文大守赴宣城寥落雲外山迢遞舟中賞鐃吹發西江秋空多清響地逈古城蕪月明寒潮廣時賽敬亭神復解罟師網何處寄相思南凮吹一作搖五兩送嚴秀才還蜀寧親為令子似舅即賢甥别路經花縣還鄉入錦城山臨青塞斷江向白雲平獻賦何時至明君憶長卿送李睢陽將置酒思悲翁使君去出城東夌漸漸雉子斑槐隂隂到潼關騎連連車遲遲心中悲宋又逺周間之南淮夷東齊兒碎碎織練與素絲遊人賈客信難持五穀前熟方可為下車閉閣君當思天子當殿儼衣裳大官尚食陳羽觴無倫無義彤庭散綬垂明璫黃𥿄詔書出東廂輕紈疊綺爛生光宗室子弟君最賢分憂當為百辟先布衣一言相為死何况聖主恩如天鑾聲噦噦魯侯旗明年上計朝言師須憶今日斗酒别慎勿冨貴忘我為送張判官赴河西單車曾出塞報國敢邀勳見逐張征虜今思霍冠軍沙平連白雪蓬卷入黃雲慷慨倚長劔髙歌一送君送岐州源長史歸同在崔常侍幕時崔常侍巳殁握手一相送心悲安可論秋凬正蕭索客散孟常門故驛通槐里長亭下堇原征西舊旌莭從此向河源送綦母校書棄官還江東明時久不逹棄置與君同天命無怨色人生有素風念君拂衣去四海將安窮秋天万里靜日暮澄江空清夜何悠悠扣舷明月中和光漁鳥際淡爾兼葭叢無庸客昭丗衰鬢日如蓬頑踈暗人事僻陋逺天聰微物縱可採其誰為至公今亦從此去歸耕為老農送張道士歸山先生何處去王屋訪茅君别婦留丹駃驅雞入白雲人間若剩住苦難天上復離群新意當作遼城鶴仙歌使爾聞送元二使安西渭城朝雨裛輕塵客舍青青柳色春勸君更盡一杯酒西出陽關無故人一作依依楊柳春送六舅歸陸渾伯舅吏淮泗卓魯方喟然悠哉自不競退耕東皋田條桑臘月下種杏春風前酌醴賦歸去共知陶令賢送方尊師歸嵩山仙官欲往九龍潭旄莭朱幡倚石龕山壓天中半天上洞穿江砥出江南瀑布杉松常帶雨夕陽彩翠忽成嵐借問迎來雙白鶴巳曽衡嶽送蘇耽同崔興宗送瑗公言從石菌閣新下穆陵關獨向池陽去白雲留故山綻衣秋日裏洗鉢古松間一施傳心法唯將戒足還同前崔興宗行苦神亦秀冷然溪上松銅瓶與竹枝來自祝融峰常願入靈嶽藏經訪遺蹤南歸見長老且為説心胸送錢少府還藍田草色日向好桃源人去稀手持平子賦目送老萊衣每候山櫻發時同海燕歸今年寒食酒應得返柴扉留别錢起卑棲却得性每與白雲歸徇祿仍懷橘看山免採薇暮禽先去馬新月待開扉霄漢時回首知音青璅闈送丘為往唐州宛洛有凮塵君行多苦辛四愁連漢水百口寄隨人槐色隂清晝楊花惹暮春朝端肯相送天子繡衣臣留别丘為歸鞍白雲外繚繞出前山今日又明日自知心不間親勞簮組送欲趂鶯花還一步一廽首遲遲向近關送元中丞轉運江淮薄稅歸天府輕徭賴使臣歡沾賜帛老恩及卷綃人去問珠官俗來經石劫春東南髙亭上莫使有風塵送别下馬飲君酒問君何所之君言不得意歸卧南山陲但去莫復聞白雲無盡時送張五歸山送君盡惆悵復送何人歸幾日同携手一朝先拂衣東山有茅屋幸為歸荆扉當亦謝官去豈令心事違齊州送祖三相逢方一笑相送還成泣祖帳巳傷離荒城復愁入只是眼前道不盡者天寒逺山淨日暮長河急解纜君巳遙望君猶佇立送别送君南浦淚如絲君向東州使我悲為報故人憔悴盡如今不似洛陽時送崔九興宗遊蜀送君從此去轉覺故人稀徒御猶回首田園方掩扉出門當旅食中路授寒衣江漢凮流地遊人何處歸送熊九赴任洛陽魏國應劉氏寂寥文雅空漳河如舊日之子繼清風阡陌銅臺下閭閻金虎中送車盈灞上輕騎出關東相去千餘里西園明月同送崔興宗巳恨親皆逺誰憐友復稀君王未西顧遊宦盡東歸塞闊山河淨天長雲樹微方同菊花莭相待洛陽扉送縉雲苗大守手疏謝名王腰章為長吏方從會稽邸更發汝南騎桉莭下松陽清江響鐃吹露冕見三吳方知百城貴送李太守赴上洛啇山包楚鄧積翠藹沈沉驛路飛泉灑關門落照深野花開古戍行客響空林板屋春多雨山城晝欲隂丹泉通􅉑略白羽抵荆岑若見西山爽應知黃綺心送從弟蕃遊淮南讀書復騎射帶劒遊淮隂淮隂少年輩千里逺相尋髙義難自隱明時寧陸沈島夷九州外泉館三山深席帆聊問罪丹服盡成擒歸來見天子拜爵賜黃金忽思鱸魚鱠復有滄洲心天寒蒹葭渚日落雲夢林江城下楓葉淮上聞秋砧送歸青門外車馬去駸駸惆悵新豐樹空餘天際禽送平淡然判官不識陽關路新從定逺侯黃雲斷春色畫角赴邊愁瀚海經年别一作到交河出塞流須令外國使知飲月支頭送孫秀才帝城風日好况復建平家玉枕雙女簟金盤五色瓜山中無魯酒松下飯胡麻莫厭田家苦歸期逺復賖送韋評事欲逐將軍取右賢沙場走馬向居延遙知漢使蕭關外愁見孤城落日邊送權二髙人不可有清論復何深一見如舊識一言知道心明時當薄宦解薜去中林芳草空隱處白雲餘故岺韓侯久擕手河嶽共幽尋悵别千餘里臨堂鳴素琴送髙道弟耽歸臨淮作座上作少年客淮泗落拓居下邳遨遊向燕趙結客過臨淄山東諸侯國迎送紛交馳自爾猒遊俠閉户方垂幃深明戴家禮頗學毛公詩備知經濟道髙卧陶唐時聖主詔天下賢人不得遺公吏奉纁組安車去茅茨君王蒼龍闕九門十二逵群公朝謁罷冠劔下丹墀野鶴終踉蹌威鳯徒參差或問理人術但致還山詞天書降北闕賜帛歸東災都門謝親故行路日逶遲孤帆萬里外渺漫將何之江天海陵郡雲日淮南祠杳冥滄洲上蕩􅐯無人知緯蕭或賣藥出處安能期送劉司直赴安西絶域陽關道胡煙與塞塵三春時有鳫萬里少行人首蓿隨天馬蒲桃逐漢臣當今外國懼不敢覔和親無意之意送别聖代無隱者英靈盡來歸遂令東山客不得顧採薇既至君門逺孰云吾道非江淮渡寒食京洛縫春衣置酒臨長道同心與我違行當浮桂棹未幾拂荆扉逺樹帶行客孤城當落暉吾謀適不用勿謂知音稀靈雲池送從弟金杯緩酌清歌轉畫舸輕移艷舞廽自嘆鶺鴒臨水别不同鴻鳫向池來送趙都督赴代州得青字天官動將星漢地柳條青萬里鳴刀斗三軍出井陘忘身辭鳯闕報國取龍庭豈學書生輩窗間著一經臨髙臺遂黎拾遺相送臨髙臺川原杳何極日暮飛鳥還行人去不息送方城韋明府遙思葭菼際寥落楚人行髙鳥長淮水平蕪故郢城使車聽雉乳縣鼓應雞鳴若見州從事無嫌手板迎平平寫到盡送李貟外賢郎少年何處去負米上銅梁借問阿戎父知為童子郎魚箋請詩賦橦布作衣裳薏苡扶衰病歸來幸可將送梓州李使君萬壑樹參天千山響杜鵑山中一半雨樹抄百重泉漢女輸橦布巴人訟芋田文翁翻教授不敢倚先賢送楊少府貶彬州明到衡山與洞庭若為秋月聽猿聲愁看北渚三湘客惡説南凮五兩輕青草瘴時過夏口白頭浪裏出湓城長沙不久留才子賈誼何須弔屈平送張五諲歸宣城五湖千萬里况復五湖西漁浦南陵郭人家春穀溪欲歸江渺渺未到草凄凄最是自得憶想南陵鎮可冝猿更啼送友人南歸萬里春應盡三江鴈亦稀連天漢水廣孤客郢城歸郎國稻苗秀楚人菰米肥懸知倚門望遙識老萊衣送賀遂貟外外甥南國有歸舟荆門泝上流蒼茫葭菼外雲水與昭丘穡帶城烏去江連暮雨愁猿聲不可聽莫待楚山秋送楊長史赴果州褒斜不容幰之子去何之鳥道一千里猿啼十二時官橋祭酒客山水女郎祠别後同明月君應聽子規送張舍人佐江州同薛據束帶趍承明守官唯謁者清晨聽銀虬薄暮辭金馬受辭未嘗易當御方知寡清範何凮流髙文有風雅忽佐江上州當自潯陽下逆旅到三湘長途應百舍香爐逺峯出石鏡澄湖㵼熏鳯杏成林陶潛菊盈把范蠡常好之廬山我心也送君思逺道欲以數行灑送韋大夫東京留守人外遺丗慮空端結遐心曽是巢許淺始知堯舜深蒼生詎有物黃屋如喬林上德撫神運沖和穆衣襟雲雷康迍難江海遂飛沉天工寄人英龍衮淡一作瞻君臨名器苟不假保釐固其任素資貫方領清景照華簮慷慨念王室從容獻官針雲旗蔽三川畫角發龍吟晨揚天漢聲夕卷大河隂窮人業巳寧逆虜遺之擒然後解金組拂衣東山岑給事黃門省秋光正沉沉功名與身退老病隨年侵君子從相訪重玄其可尋送邢桂州鐃吹喧京口凮波下洞庭赭圻將赤岸擊汰復揚舲日落江湖白潮來天地青明珠歸合浦應逐使臣星送宇文三赴河西充行軍司馬橫吹雜繁笳邊凮卷塞沙還聞田司馬更逐李輕車蒲壘成秦地莎居屬漢家當令犬戎國朝聘學昆耶送别山中相送罷日暮掩柴扉春草明年緑王孫歸不歸今古斷腸理不在多資聖寺送井二浮生信如寄薄宦夫何有來往本無歸别離方此受柳色藹春餘槐隂清夏首不覺御溝上銜悲執杯酒送孫二郊外誰相送夫君道術親書生鄒魯客才子洛陽人祖席依寒草行車起暮塵山川何寂寞長望淚沾巾送崔三往密州覲省南陌去悠悠東郊不少留同懷扇枕戀獨念倚門愁路繞天山雪家臨海樹秋魯連功未報且莫蹈滄洲送沈子福江東楊柳渡頭行客稀罟師蕩漿向臨圻唯有相思似春色江南江北送君歸送丘為落第歸江東憐君不得意况復柳條春為客黃金盡還家白髮新五湖三畒宅萬里一歸人知禰一作爾不能薦羞為獻納臣留别山中溫古上人兄并示舍弟縉解薜登天朝去師偶時哲豈唯山中人兼負松上月宿昔同遊止致身雲霞末開軒臨頴陽卧視飛鳥沒好依盤石飯屢對瀑泉歇理齊少狎隱道勝寧外物舍弟官崇髙宗兄此削髮荆扉但灑掃乘間當過拂觀别者青青楊柳陌陌上别離人愛子遊燕趙髙堂有老親不行無可飬行去百憂新切切委兄弟依依向四鄰都門帳飲畢從此謝賔親揮淚逐前侣含悽動征輪車從望不見時時起行塵余亦辭家久看之淚滿巾别弟縉後登青龍寺望藍田山陌上新别離蒼茫四郊晦登髙不見君故山復雲外逺樹蔽行人長天隱秋塞心悲宦遊子何處飛征蓋别輞川别業依遲動車馬惆悵出松蘿忍别青山去其如渌水何同前山月曉仍在林凮涼不絶殷勤如有情惆悵令人别清􅎈頓挫略不動容别弟妹二首兩妹日成長雙鬟將及人巳能持寶瑟白解掩羅巾念昔别時小未知踈與親今來始離恨拭淚方殷勤小弟更孩幼歸來不相識同居雖漸慣見人猶未覔宛作越人語殊井水鄉食别此最為難淚盡有餘憶崔九弟欲往南山馬上口號與别城隅一分手幾日還相見山中有桂花莫待花如霰同前裴迪歸山深淺去須盡丘壑美莫學武陵人暫遊桃源裏留别崔興宗駐馬欲分襟清寒御溝上前山景氣佳獨往還惆悵别綦母潛端笏明光宮歷稔朝雲陛詔看延閣書髙議平津邸適意輕偶人虛心削煩禮盛得江左凮彌工建安體髙張多絶絃截河有清濟嚴冬爽群木伊洛方清泚渭水氷下流潼關雪中啓荷蓧幾時還塵纓侍君洗新晴晚望新晴原野曠極目無氛垢郭門臨渡頭村樹連溪口白水明田外碧峯出山後農月無間人傾家事南畒漢江臨泛楚塞三湘接荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好凮日留醉與山翁登辨覺寺竹徑從𥘉地蓮峯出化城窗中三楚盡林上九江平敷草承跌坐長松響𣑽聲空居法雲外觀丗得無生涼州郊外遊望野老才三户邊村少四鄰婆娑依里社蕭鼓賽田神灑酒澆芻狗焚香拜木人女巫紛屢舞羅襪自生塵觀獵風徑角弓鳴氣槩將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新豐市還歸細柳營廽看射鵬處千里暮雲平遊感化寺翡翠香煙合琉璃寶地平龍宫連棟宇虎穴傍簷楹谷靜惟松響山深無鳥聲瓊峰當户拆金澗透林鳴郢路雲端逈秦川雨外晴鴈王銜果獻鹿女踏花行若用禮記鹿女舛抖擻辭貧里歸依宿化城繞籬生野蕨空館發山櫻香飯青菰米嘉𬞞緑芋羮誓陪清𣑽末端坐學無生逰悟貞寺聞道黃金地仍開白玉田擲山移巨石呪嶺出飛泉猛虎同三徑愁猿學四禪買香燃緑桂乞火踏紅蓮草色搖霞上松聲泛月邊山河窮百二世界滿三千梵宇聊憑視王城逐渺然灞陵才出樹渭水𣣔連天逺縣分諸一作朱郭孤村起白煙望雲思聖主披霧憶群賢薄宦慚尸素終身擬尚玄誰知草庵客曽和柏梁篇寒食城東即事清溪一道穿桃李演漾緑蒲涵白芷溪上人家凡幾家落花共落東流水蹴踘屢過飛鳥上鞦韆競出垂楊裡少年分日作遨逰不用清明兼上已春日上方即事好讀髙僧傳時看辟穀方鳩形將刻杖龜殼用支床柳色春山映梨花夕鳥藏北窗桃李下間坐但焚香晦日逰大理韋卿城南别業四聲依次用與世淡無事自然江海人側聞塵外逰解辨託朱輪極野昭喧景上大垂春雲張組共曲阜泛舟過東鄰故鄉信髙會牢醴及家臣一本作佳辰幸同擊壤樂心荷堯為君郊居杜陵下永日同携手人里藹川陽平原見峰首園廬鳴春鳩林薄媚新柳上卿始登席故老前為壽臨當逰南陂約略執杯酒車轍詘微官惆悵心自咎勝選冬中餘雪在墟上春流駛風日暢懷抱山川好天氣雕胡先豐酌一作晨炊庖膾亦雲一作後至髙情浪海嶽浮生寄天地君子外簪纓埃塵良不啻所樂衡門中陶然忘其貴髙館臨登陂曠望一作然蕩心目淡蕩動雲天玲瓏映墟曲鵲巢結空林雉雊響幽谷應接無間暇徘徊以躑躅紆組上春堤側辨倚喬木弦望忽已晦後期洲應緑冬日逰覽步出城東門試騁千里目青山橫蒼林赤日團下字佳平陸渭北走邯鄲關東出函谷秦地萬方會來朝九州牧平實悲壯古意雅辭樂府所少雞鳴咸陽中冠蓋相追逐丞相過列侯群公餞光祿相如方老病獨歸茂陵宿更似不須語言泛前陂秋空自明逈況復逺人間暢以沙際鶴兼之雲外山澄波淡將夕清月皓方間此夜任孤棹夷猶殊未還遊李山人所居因題屋壁世上皆如夢狂來或自歌問年松樹老有地竹林多藥倩韓康賣門容向子過翻嫌枕上席無那白雲何與蘇盧二員外期遊方丈寺而蘇不至因有是作共仰頭陀行能忘世締情廽看雙鳳闕相去一牛鳴法向空林説心隨寶地平手巾花氎淨香帔稻畦成同道邀同舍相期宿化城安知不來往翻以得一本作得似無生登河北城樓作井邑傳一作傅巖上客亭雲霧間髙城眺落日極浦映蒼山岸火孤舟宿漁家夕鳥還寂寥天地暮心與廣川間登裴迪秀才小臺作端居不出户滿目望雲山落日鳥邊下秋原人外間遙知逺林際不見此簷間好客多乘月應門莫上關須溪先生校本唐王右丞集卷第五
