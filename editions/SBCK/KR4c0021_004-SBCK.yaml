front:
  text: 須溪先生校本唐王右丞集卷第四
  hash: sha256:f8e618980a15668a060197100169f06fe9eb6c59ba0be5cbe91e9fac17791379
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_004-1a}
body:
  text: 唐尚書右丞贈秘書􅁥王維輞川集并序余别業在輞川山谷其遊止有孟城􅉾華子岡文杏館斤竹嶺鹿柴去声茱茰沜潘上官槐陌臨湖亭􅀯垞茶欹湖柳浪欒家瀬金屑泉白石灘北垞竹里館辛夷塢􅃮園椒園等與裴迪閑暇各賦絶句云爾孟城􅉾新家孟城口古木餘衰柳來者復爲誰空悲昔人有復欲两語如此俯仰曠逹不可得同前裴迪結廬古城下時登古城上古城非疇昔今人自來徃未為不佳相去甚逺華子崗飛鳥去不窮連山復秋色上下華子崗惆悵情何極䔥然更欲無言同前落日松凮起還家草露稀雲光侵履跡費力山翠拂人衣文杏館文杏裁爲梁香茅結爲宇不知棟裏雲去作人間雨同前迢迢文杏館躋攀日巳屢􅀯嶺與北湖亦使得前看復廽頋斤竹嶺檀欒映空曲青翠􅃞漣漪暗入啇山路樵人不可知同前明流紆且直緑篠宻復深一逕通山路行歌望舊岑鹿柴空山不見人但聞人語響返景入􅀷林復照青苔上無言而有􅀞意同前日夕見寒山便爲獨徃客不知松林事但有麏麚跡木蘭柴秋山歛餘照飛鳥逐前侣彩翠時分明夕嵐無處所猶是鹿柴之餘同前蒼蒼落日時鳥聲亂溪水縁溪路轉深幽興何時已茱茰沜結實紅且緑復如花更開山中儻留客置此茱茰丕自木在同前飄香亂椒桂布葉間檀欒雲日雖廽照森沉猶自寒宫槐陌􅁅逕䕃宫槐幽隂多緑苔膺門但迎掃畏有山僧來同前門前宫槐陌是向欹湖道好秋來山雨多落葉無人掃臨湖亭輕舸迎上客悠悠湖上來當軒對撙酒四面芙蓉開同前當軒弥滉漾􅀌月正徘􅆦谷口猿聲發凮傳入户來􅀯垞輕舟􅀯垞去北垞淼難即隔浦望人家遥遥不相識同前􅀌舟信凮泊􅀯垞湖水岸落日下崦嵫清波殊淼漫欹湖吹簫凌極浦日暮送夫君湖上一廽㸔山青卷白雲同前空闊湖水廣青熒天色同艤舟一長嘨四面來清凮柳浪分行接綺樹倒影入清漪不學御溝上春凮傷别離同前映池同一色逐吹散如絲結隂既得地何謝陶家時欒家瀬颯颯秋雨中淺淺石溜㵼跳波自相濺白鷺驚復下同前瀬聲喧極浦㳂渉向􅀯津汎汎鳬鷗渡時時欲近人金屑泉日飲金屑泉少當千餘􅀊翠鳯翔文螭羽莭朝玉帝同前瀠渟澹不流金碧如可拾迎晨含素華獨徃亊朝汲白石灘清淺白石灘緑蒲向堪把家住水東西浣紗明月下同前􅉥石復臨水弄波情未極日下川上寒浮雲澹秋色北垞比垞湖水北離樹映朱欄逶迤􅀯川水明㓕青林端同前􅀯上北垞下結宇臨欹湖毎欲採樵去扁舟出菰蒲竹里館獨坐幽篁裏弹琴復長嘨深林人不知明月來相照同前來過竹里館日與道相親出入惟山鳥幽深無丗人辛夷塢木末美蓉花山中發紅蕚澗户寂無人絲絲開且落其意亦欲不着一字漸可語禅同前縁堤春草合王孫自留翫况有辛夷花色與芙蓉乱􅃮園古人非傲吏自闕經丗務偶􅀉一微官婆娑数枝樹使在謝東山軰口語皆成髙韵同前好閑早成性果此諧􅀫諾今日􅃮園遊還同莊叟楽椒園桂尊迎帝子杜若贈佳人椒漿奠瑶席欲下雲中身首首素净同前丹刺􅇢人衣芳香留過客幸堪調鼎用願君垂採摘壞尽一鍋羮歸嵩山作清川帯長薄車馬去閑閑流水如有意暮禽相與還荒城臨古渡落日滿秋山已近自然迢遞嵩髙下歸來且閉􅀜歸輞川作谷口踈鍾動漁樵稍欲稀悠然逺山暮獨向白雲歸菱蔓弱難定楊花輕易飛東皐春草色惆悵掩柴扉􅄬師蘭􅀂􅀫一公栖大白髙頂出雲煙􅆊流諸壑遍花雨一峯偏迹爲無心隱名因立教傳鳥來還語法客去更安禪晝渉松路盡暮􅄬蘭若邊洞房隱深竹清夜聞遥泉向是雲霞裏今成枕席前豈唯暫留􅀫服事將窮年􅅊給事山居幽㝷得此地詎有一人曽大壑隨堦轉羣山入户登庖􅌮出深竹印綬隔垂藤即事辭軒冕誰云病未能輞川别業不到東山向一年歸來纔及種春田雨中草色緑堪染水上桃花紅亦然優婁比丘經論學傴僂丈人郷里賢披衣倒屣且相見相歡語􅀏衡門前山中示弟等山林吾喪我冠帯爾成人别是一種莫學嵇康􅂴且安原憲貧山隂多是户泉水在東鄰縁合妄相有性空無所親安知廣成子不是老夫身戯題輞川别業柳條拂地不湏折松樹梢雲從更長藤花欲闇藏猱子栢葉􅀄齊飬麝香實景李處士山居君子􅄹天階小人􅅴自免方隨錬金客城上家絶巘背嶺花未開入雲樹深淺清晝猶自眠山鳥時一囀􅅊侍􅀰山居幸忝君子頋遂陪塵外蹤閑花滿巖谷瀑水映杉松啼鳥忽臨澗歸雲時抱峰良遊盛替紱繼跡多夔龍詎枉青門道故聞長樂鍾清晨去朝謁事一作安馬何從容山居即事寂寞掩柴扉蒼茫對落暉鶴巢松樹遍人訪蓽門稀嫩竹含新粉紅蓮落故衣渡頭煙火起處處採菱歸自是維詩早秋山中作無才不敢累眀時思向東溪守故籬不一作豈猒尚平㛰嫁早却嫌陶令去官遲草間蛩響臨秋急山裏蝉聲薄暮悲寂寞柴門人不到空牀獨與白雲期戯題盤石可憐盤石臨泉水復有垂楊拂酒盃􅀂道春凮不解意何因吹送落花來終南山太一近天都連山到海隅白雲廻望合青藹入㸔無分野中峰變隂晴衆壑殊欲投人處􅀫隔水問樵夫田園樂七首出入千門萬户經過北里􅀯鄰􅉜蹀鳴珂有底崆峒散髪何人無一語可俗􅂯見封侯萬户立談賜璧一􅀟詎勝耦耕南畒何如髙卧東䆫採菱渡頭凮急䇿杖村西日斜杏樹壇邊漁父桃花源裏人家急一作起萋萋春草秋緑落落長松夏寒牛羊自歸村巷童稚不識衣冠山下􅀌煙逺村天邊獨樹髙原一瓢顔回陋巷五柳先生對門桃紅復􅍭􅀫雨柳緑更帯春煙花落家僮未掃鸎啼山客猶眠酌湭㑹臨泉水抱琴好􅀝長松􅀯園露葵朝折東谷黄梁夜舂田家舊穀行將盡良苗未可希老年方愛粥卒歳且無衣雀乳青苔井雞鳴白板扉柴車駕羸牸草屩牧豪豨多雨紅榴拆新秋緑芋肥餉田桑下憩旁舎草中歸住處名愚谷何煩問是非豪杭本膏丁㝢田家有贈君心尚棲隱乆欲傍歸路在朝每爲言解印果成趣晨雞鳴鄰里群動從所務農夫行餉田閨婦起縫素開軒御衣服散帙理章句時吟招隱詩或製閑居賦新晴望郊郭曰映桑榆暮隂盡一作晝小苑城㣲明渭川樹楑子宅閭井幽賞何由屢道存終不忘迹異難相遇此時惜離別􅂯來芳菲度輞川閑居一從歸白杜不復到青門時􅀝簷前樹逺㸔原上村青菰臨水映白鳥向山翻寂寞於陵子桔槹方灌園積雨輞川庄作積雨空林煙火遲蒸藜炊􅁰餉東菑漠漠水田飛白鷺隂隂夏木囀黄鸝山中習静觀朝槿松下清齋折露葵野老與人争席罷海鷗何處更相疑春園即事宿雨乗輕屐春寒着弊􅂁開畦分白水間柳發紅桃草際成碁局林端舉桔槹上句更好還持鹿皮机日暮隱蓬蒿渭川田家斜光照墟落窮巷牛羊歸野老念牧童􅀝仗候荆扉雉鴝麥苗秀􅅙眠桑葉稀田夫荷鋤立一作至相見語依依即此羡閑逸悵然歌式㣲春中田園作屋上春鳩鳴村邊杏花白好持斧伐逺楊荷鋤覘泉脉歸一作新燕識故一作舊巢舊人看新暦臨觴忽不御惆悵逺行客卷耳之後得此吟調淇上即事田園屏居淇水上東野曠無山日隱一作白日桑柘外河明閭井間牧童望村去田犬隨人還静者亦何事荆扉乗晝􅀜過盧貟外宅看飯僧共題三賢異七聖青眼慕青蓮乞飯從香積裁衣學水田上人飛􅃬杖檀越施金錢跌坐簷前日焚香竹下煙寒空法雲地秋色净居天身逐因縁法心過次第禪不須愁日暮自有一燈燃過李揖宅閉門秋草色終日無車馬客來深巷中犬吠寒林下散髮時未簮道書行尚把與我同心人樂道安貧者一罷宜城酌還歸洛陽社與盧貟外象過崔處士興宗林亭緑樹重隂盖四鄰青苔日厚自無塵科頭箕踞長松下白眼看他一作君世上人謂白眼亦如鍾㑹於嵇康同前盧象映竹時聞轉轆轤當牎只見網蜘蛛主人非病常髙卧環堵􅂪籠一老儒同前縉身名不問十秊餘老大誰能更讀書林中獨酌鄰家酒門外時聞長者車同前裴迪喬柯門裏自成隂散髪空一作䆫中曽不簮逍遥且喜從吾事榮寵從來非我心詶前崔興宗窮巷空林常閉關悠悠一作然獨卧與前山今朝忽枉嵇生駕倒屣開門遥解顔濟州過趙叟家宴雖與人境接閉門成隱居道言莊叟事儒行魯人餘深巷斜暉静閑門髙柳踈荷鋤修藥圃散帙曝農書上客摇芳翰中厨饋野􅂼夫君第髙飲景晏出林閭與盧象集朱家主人能愛客終日有逢迎貰得新豊酒復聞秦女筝柳條踈客舎槐葉下秋城語􅀏且爲樂吾將逹此生過福禅師蘭􅀂巖壑傳㣲逺雲林隱法堂羽人飛奏楽天女跪焚香竹外峯偏􅍼藤隂水更凉欲知禪坐乆行路長春芳飯覆釡山僧晚知清净理日與人羣踈將候逺山僧先期掃弊廬果從雲峰裏頋我蓬蒿居藉草飯松屑焚香看道書燃燈晝欲盡鳴磬夜方􅀄一悟寂爲樂此生閑有餘思歸何必深身丗猶空虚謁璿上人并序上人外人内天不定不亂捨法而淵泊無心而雲動色空無得不物物也黙語無際不言言也故吾徒得神交焉玄関大啓徳海群泳時雨既䧏春物具羙序於詩者人百其言少年不足言識道年巳長事徃安可悔餘生幸能飬誓從断葷血不復嬰丗網浮名􅀉纓佩空性無覊鞅夙承大導師焚香此瞻仰頺然居一室覆載紛萬象髙柳早鸎啼長廊春雨響牀下阮家屐䆫前笻竹杖方將見身雲陋彼示天壌一心在法要願以無生􅅄青龍寺曇壁上人兄院集并序吾兄大開䕃中明一作朝徹物外一作独以定力勝敵以恵用觧嚴深居僧坊傍俯人里髙原陸地下映美蓉之池竹林果園中秀菩提之樹八極氣霽萬彚塵息太虚寥廓􅀯山爲之端倪皇州蒼茫渭水貫於天地經行之後趺坐而閑昇坣􅆊筵餌客香飯不起而遊覧不凮而清凉得丗界於蓮花記文章於貝葉時寕江大兄持片石命維序之詩五韵坐上成髙處敞招提虗空詎有倪坐㸔􅀯陌􅀐下聽秦城雞渺渺􅀌煙起芊芊逺樹齊青山萬井外落日五陵西甚壯非招提本色眼界今無染心空安可迷同前王縉林中空寂舎階下終􅀯山髙卧一床上廽㸔六合間浮雲㡬處㓕飛鳥何時還問義天人接無心丗界閑誰知大隱客兄弟自追攀好同前王昌齡本來清净所竹樹引幽隂簷外含山翠人間出丗心圎通無有象聖境不能侵真是吾兄法何妨友弟深天香自然㑹靈異識鍾音同前裴迪靈境信爲絶法堂出塵氛自然成髙致向不看浮雲逶迤峯岫列參差閭井分林端逺堞見凬末踈鍾聞吾師乆禪寂在丗超人群􅀺拾遺昕裴迪見過秋夜對雨之作促織鳴巳急輕衣行尚重寒燈坐髙館秋雨聞踈鍾白法調狂象玄言問老龍何人顧蓬逕空愧求羊蹤晚春嚴少尹與諸公見過松菊荒三逕圗書共五車烹葵邀上客看竹到貧家鵲乳先春草鸎啼過落花自憐黄髪暮一信惜年華過乗如禪師蕭居士嵩丘蘭􅀂無着天親弟與兄嵩丘蘭􅀂一峯晴食隨鳴磬巢烏下行踏空林落葉聲迸水定侵香案濕雨花應共石床平深洞長松何所有儼然天笁古先生過感化寺曇興上人山院暮持笻竹杖相待虎溪頭催客聞山響歸房逐水流野花叢發好谷鳥一聲幽夜坐空村寂松凮直似秋畧不用思同前裴迪不逺㶚陵邊安居向十年入門穿竹逕留客畎山泉鳥囀深林裏心閑落照前浮名竟何益從此願栖禪夏日過青龍寺謁操禪師龍鍾一老翁徐歩謁禪宫欲問義心義遥知空病空山河天眼裏丗界法身中莫恠銷炎热能生大地凮同前裴迪安禪一室内左右竹亭幽有法知不染無言誰敢酬鳥飛争向夕蟬噪巳先秋煩暑自兹退清凉何所求鄭果州相過斜日照殘春􅀄晴草木新牀前磨鏡客林裏灌園人五馬驚窮巷䨇童逐老身中厨辦麄飯當恕阮家貧春日與裴迪過新昌里訪吕逸人不遇桃源一向絶凮塵柳市􅀯頭訪隱淪到門不敢題凡鳥㸔竹何湏問主人城外青山如屋裏東家流水入西鄰自在閉户著書多歳月種松皆作老龍鱗同前裴迪恨不逢君出荷蘘青松白屋更無他陶令五男曾不有蔣生三逕任相過芙蓉曲沼春流滿薜荔成帷晚靄多聞説桃源好迷客不如髙枕一作卧眄庭柯春過賀遂貟外藥園前年種籬外今作藥欄成香草爲君子名花是長卿水穿盤石透藤繫古松生􅀞畏開厨走來䝉倒屣迎蔗漿菰米飯蒟醬露葵羮頗識灌園意於陵不自輕過香積寺不知香積寺數里入雲峯古木無人逕深山何處鍾泉聲咽危石日色冷青松薄暮空潭曲安禪制毒龍過崔駙馬山池􅀞樓吹笛妓金椀酒家胡錦石􅁛貞女青松學大夫脱貂貰桂酌射鴈與山厨聞道髙陽㑹愚公谷正愚河􅀯嚴尹弟見宿弊廬訪别人賦十韻上客能論道吾生學飬蒙貧交丗情外才子古人中冠上方簮一作安象車邊巳􅀞熊拂衣迎五馬垂手慿䨇童花醥一作醴和松屑茶香透竹叢薄霜澄夜月殘雪帯春凮古壁蒼苔黒寒山逺燒紅眼㸔東候别心事北山同爲學輕先軰何能訪老翁欲知今日後不樂爲車公湏溪先生校本王右丞集卷第四
