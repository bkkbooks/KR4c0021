front:
  text: 湏溪先生校本唐王右丞集卷第六
  hash: sha256:497ad4378c754d8132c85972fd8315d745868301d311eb6dcb7efd56c5677ab2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_006-1a}
body:
  text: 唐尚書右丞贈秘書監王維曉行巴峽際曉投巴峡餘春憶帝京晴江一女浣自然好朝日衆雞鳴水囯舟中市山橋樹抄行登髙万井出眺逈二流明人作殊方語鸎爲舊囯声頼諳山水􅃐稍解别離情出塞作時爲监察塞上作居延城外獵天驕白草連天野火燒暮雲空磧時驅遼玉靶角弓珠勒馬漢家將賜霍嫖姚自大散巳徃深林宻竹蹬道盤曲四五十里至黄牛嶺見黄花川危逕㡬万轉数里將三休廻環見徒侣隠映隔林丘颯颯松上雨潺潺石中流静言深溪裏長嘨髙山頭望見􅀯山陽白日靄悠悠青皐䴡巳净緑樹欎如浮曾是厭􅂪宻曠然消人􅁨􅀍出濟州㣲官易得罪謫去濟川隂執政方持法明君無此心閭閻河潤上井邑海雲􅀷縱有歸来日各愁秊鬢侵休假還舊業便使謝病始告歸依依入桑梓家人皆佇立相候衡門裏時軰皆長秊成人舊童子上堂嘉慶畢頋與姻親齒論舊忽餘悲目存且相喜田園轉蕪􅃿但有寒泉水衰柳日䔥條秋光清邑里入門乍如客休􅀐非便止中飯頋王程離􅁨從此始早入榮陽界汎舟入滎澤兹邑乃雄藩河曲閭閻隘川中煙火䌓因人見風俗入境聞方言秋田晚疇盛朝光市井喧漁啇波上客雞犬岸傍村前路白雲外􅀌帆安可論寒食汜上作廣武城边逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人宿鄭州朝与周人辝暮投鄭人宿他郷絶儔侶􅀌客親僮僕宛洛望不見秋霖晦平陸田父草傺帰村童雨中牧主人東皐上時稼遶茅屋蟲思機杼鳴雀喧禾􅁰熟明當渡京水昨晚猶金谷藹然恋闕之情此去欲何言窮边徇㣲一作食禄千塔主人逆旅逢佳莭征㠶未可前䆫臨汴河水門渡楚人舩雞犬散􅇕落桑榆䕃逺田所居人不見枕蓆生雲烟使至塞上单車欲問邊属國過居延征蓬出漢塞帰鴈入湖天大漠􅀌煙直長河落日圎䔥関逢候吏都護在燕然亦是不用一辝渡河到淸河作汎舟大河裏積水窮天涯天波忽開拆郡邑千万家行復見城市宛然有桑麻廻瞻舊郷囯淼漫連雲霞苦􅀬赤日滿天地火雲成山岳草木尽樵卷川澤皆竭涸輕紈斍衣重樹宻苦隂薄莞簟不可近絺綌􅂯三濯思出宇宙外曠然在寥廓長風万里来江海蕩煩濁却頋身爲患始知心未斍忽入甘露門宛然清凉楽納凉喬木方餘株清流貫其中前臨大川口豁逹来長風漣漪含白沙素鮪如遊空偃卧盤石上飜濤沃㣲躬潄流復濯足前對釣魚翁貪餌凡㡬許徒思蓮葉東済上四䝨詠崔録亊解印帰田里䝨哉此丈夫少秊曽任俠晚莭更為儒遁丗東山下因家滄海隅巳聞能狎鳥余欲共乗桴成文斈宝劒千金装登君白玉堂身為平原客家有邯郸倡使氣公卿座論心遊俠場中秊不得志謝病客遊梁鄭霍二山人翩翩䌓華子多出金張門幸有先人業早䝉明主恩童年且未學肉食騖華軒豈乏中林士無人獻一作薦至尊鄭公老泉石霍子安丘樊賣薬不二價著書􅄹萬言息隂無􅁖木飲水必清源吾賤不及議斯人竟誰論偶然作六首楚國有狂夫茫然無心想散髪不冠帯行歌􅀯陌上孔丘與之言仁義莫能奬未甞肯問天何亊湏擊壌復􅀏採􅅔人胡爲乃長徃田舎有老翁垂白衡門裏有時農亊閑斗酒呼鄰里喧聒茅簷下或坐或復起短􅄄不為薄園葵固足羙動則長子孫不曾向城市五帝與三王古來􅁛天子干戈將揖譲畢竟何者是得意苟為楽野田安足鄙且當放懷去行行􅃿餘齒天一作君放一作忘日夕見大行沉吟未能去問君何以然丗網嬰我故小妹日成長兄弟未有娶家貧祿既薄儲蓄非有素㡬回欲奮飛踟蹰復相頋孫登長嘨臺松竹有餘處相去詎㡬許故人在中路爱染日巳薄禪寂日巳固忽乎吾將行寕俟歳云暮陶潜任天真其性頗躭酒自從棄官來家貧不能有九月九日時菊花空滿手中心􅀼自思倘有人送否白衣携壷觴果來遺老叟且喜得斟酌安問升與斗但可従此止奮衣野田中今日嗟無􅀒兀傲迷東西蘘苙不能守傾倒強行行酣􅁔歸五柳生亊不曾問肯媿家中婦趙女弹箜篌復能邯郸舞夫壻輕薄兒閗雞亊齊主黄金買􅁔􅀏用錢不復数許史相經過髙門􅄹四牡客舎有儒生昻藏出鄒魯讀書三十年腰下無尺組􅀍服聖人教一生自窮苦老來􅈸賦詩惟有老相隨宿丗􅍝詞客前身應畫師不能捨餘習偶􅀍丗人知名字本皆是此心還不知西施詠艶色天下重西施寕乆㣲朝爲溪越女暮作呉宫妃賤日豈殊衆貴來方悟稀邀人􅀓脂粉不自着羅衣君寵益嬌態君憐無是非當時浣沙伴莫得同車歸持謝隣家子斆嚬安可希李陵詠時秊十九漢家李將軍三代將門子結髮有竒䇿少秊成壯士長驅塞上兒深入單于里旌旗列相向簫鼔悲何巳日暮沙漠陲􅀾聲煙塵裏將令驕虜㓕豈獨名王侍既失大軍援遂嬰穹廬恥少小􅂪漢恩何堪坐思此深􅂨欲有報􅄬軀未能死引領望子卿非君誰相理鷰子龕禅師山中燕子龕路劇羊腸惡裂地競盤屈揷天多峭􅔌瀑泉吼而噴恠石看欲落伯雨訪未知五丁愁不鑿上人無生縁生長居紫閣六時自搥磬一飲尚帯索種田燒白雲斫􅃮響丹壑行隨拾栗猿歸對巢松鶴時許山神請偶逢洞仙􅀶救丗多慈悲即心無行作周啇倦積阻蜀物多淹泊巖腹乍旁穿澗唇時外拓橋因倒樹架柵值垂籐縳鳥道悉巳平龍宫爲之涸跳波誰掲厲絶壁免捫摸山木日隂隂結跏歸舊林一向石門裏任君春草深息夫人時年二十莫以今時寵能忘舊日恩㸔花滿眼淚不共楚王言班婕妤三首玉䆫螢影度金殿人聲絶秋夜守羅帷􅀌燈耿明㓕宫殿生秋草君王恩幸踈那堪聞鳯吹門外度金輿恠來粧閤閉朝下不相迎揔向春園裏花間語􅀏聲語昏不刻而近晚春閑思新粧可憐色落日卷羅惟鑪氣清珍箪墻隂上玉墀春蟲飛網户暮雀隱花枝向晚多愁思閑牎桃李時羽林􅀐閨人秋月臨髙城城中管絃思離人堂上愁稚子堦前戯出門復映户望望青絲􅀐行人過欲盡狂夫終不至左右寂無言相㸔共垂淚戯題示䔥氏外甥怜爾解臨池渠爺未學詩老夫何足似􅁦宅倘因之蘆笋穿荷葉菱花􅇢鴈兒㕁公不易勝莫着外家欺冬夜書懷冬宵寒且永夜漏宫中發草白靄繁霜木衰澄清月麗服映頺顔朱燈照華髮漢家方尚少頋影慙朝謁秋夜獨坐獨坐悲双鬢空坣欲二更雨中山果落灯下草虫鳴白髮終難変黄金不可成欲知除老病唯有斈無生不遇詠北闕獻書寢不報􅀯山種田時不登百人㑹中身不預五侯門前心不能身􅄬河朔飲君酒家在茂陵平安否且共登山復臨水莫問春凮動楊柳今人作一作昨人多自􅀻我心不說君應知濟人然後拂衣去肯作徒爾一男兒待儲光羲不至重門朝巳啓起坐听車声要欲聞清佩方將出户迎晚鍾鳴上苑踈雨過春城了自不相頋臨堂復空情聽宫鸎春樹遶宫牆春鶯轉曙光忽驚啼蹔断移處哢還長隠葉棲承露排花出未央遊人未應返爲此思故郷聽百舌鳥上蘭門外草萋萋未央宫中花裏栖亦有相隨過御苑不知􅀂箇向金堤入春解作千般語拂曙􅀎先百鳥啼萬户千門應斍暁建章何必听鳴雞題友人雲母障子時年十五君家雲母障持向野庭開自有山泉入非因彩畫來賦得清如玉壷冰京兆府試時年十九藏氷玉壷裏氷水􅀋方諸未共銷丹日還同照綺踈抱明中不隱􅍭净外疑虚氣似庭霜積光言砌月餘曉凌飛鵲鏡宵映聚螢書􅀂向夫君比清心尚不如劇嘲史寰清凮細雨濕梅花驟馬先過碧玉家正值楚王宫裏至門前􅀄下七香車紅牡丹緑艶閑且静紅衣淺復深花心愁欲斷春色豈知心左掖梨花閑灑堦邊草輕隨箔外凮黄鸎弄不足銜入未央宫同詠丘爲冷艶全欺雪餘香乍入衣春凮且莫定吹向玉階飛同詠皇甫冉巧解迎人􅀏偏􅀎亂蝶飛春凮時入户幾片落朝衣早朝二首皎㓗明星髙蒼茫逺天曙槐霧欎不開城鴉鳴稍去始聞髙閣聲莫辨更衣處銀燭巳成行金門儼騶馭柳暗百花明春深五鳯城城烏睥睨曉宫井轆轤聲方朔金門侍班􅁎玉輦迎仍聞遣方士東海訪蓬瀛菩提寺禁裴迪來相看説逆賊等凝碧池上作音樂供奉人等舉聲便一時淚下私成口號誦示裴迪萬户傷心生野煙百官何日更朝天秋槐葉落空宫裏凝碧池頭奏管絃口號又示裴迪安得捨塵網拂衣辭世喧悠然䇿藜杖歸向桃花源春日直門下省早朝􅀐省直明光雞鳴謁建章遥聞侍中珮闇識令君香玉漏隨銅史天書拜夕郎旌旗映閶闔歌吹滿朝陽官舎梅􅀄紫宫門柳欲黄願將遲日意同與聖恩長愚公谷青龍寺與􅀺昕戲題三首愚谷與誰去唯將􅀺子同非湏一處住不郍两心空寕問春將夏誰論西復東不知吾與子􅀂箇是愚公愚一作吾家愚谷裏此谷本來平雖則行無跡還能響應聲不随雲色暗只待日光明縁厎名愚谷都由愚所成借問愚公谷與君聊一㝷不㝷翻到谷此谷不離心行處曾無険看時豈有深􅀉言塵丗客何處欲歸臨寓言朱紱誰家子無乃金張孫驪駒從白馬出入銅龍門問爾何功徳多承明主恩閗雞平楽館射雉上林園曲陌車􅀐盛髙堂珠翠䌓奈何軒冕貴不與布衣言君家御溝上垂柳夾朱門列鼎㑹中貴鳴珂朝至尊生死在八議窮逹由一言湏識苦寒士莫矜狐白温雜詩五首朝因折楊柳相見洛城隅楚國無如妾秦家自有夫對人傳玉腕映竹解羅􅃭人見東方􅀐皆言夫壻殊持謝金吾子煩君提玉壷多少疑有誤双燕􅀄命子五桃􅀄作花王昌是東舎宋玉次西家小小能織綺時時出浣沙親勞使君問􅀯陌駐香車家住孟津河門對孟津口常有江􅀯舡􅀉書家中否与時有汶陽人皆費解說君自故郷來應知故郷事來日綺䆫前寒梅開花未巳見寒梅發復聞啼鳥聲心心視春草畏向階前生獻始興公时拜右拾遺寕棲野樹林寕飲澗水流不用坐良􅁏﨑嶇見王侯鄙㦲疋夫莭布􅄄將白頭任智誠則短守仁固其􅁨側聞大君子安問黨與讎所不賣公器動為蒼生謀賤子跪自陳可爲帳下不感激有公議曲􅀻非所求上張令公珥筆趍丹陛垂璫上玉除歩簷青瑣闥方幰畫輪車市閱千金字朝開五色書致君光帝典薦士滿公車伏奏廽金駕横金重石渠從兹罷角抵希復幸儲胥天統知堯後王章􅀏魯􅀄匈奴遥俯伏漢相􅌂簮􅅂賈生非不遇汲黯自堪踈學易思求我言詩或起予甞從大夫後何惜􅈻人餘崔興宗寫真畫君年少時如今君已老今時新識人知君舊時好山茱茰朱實山下開清香寒更發幸與􅓜桂花牎前向秋月涼州賽神涼州城外少行人百尺峰頭望虜塵徤児擊鼔吹羗笛共賽城東越騎神哭殷遥人生􅀎㡬何畢竟㱕無形念君等為死萬事傷人情慈母未及葬一女􅅻十齡泱􅐯寒郊外蕭條聞哭聲浮雲為蒼茫飛鳥不􅀎鳴行人何􅄫寞白日自凄清憶昔君在時問我學無生勸君苦不早令君無􅀁成故人各有贈又不及平生負爾非一途痛哭返柴荆送君返葬石樓山松柏蒼蒼賔馭還埋骨白雲長已矣空餘流水向人間哭孟浩然時為殿中侍御史知􅀯選至襄陽作故人不可見漢水日東流借問襄陽老江山空蔡州哭禇司馬妄識皆心累浮生定死媒誰言老龍吉未免伯牛灾故有求仙藥仍餘遁俗杯山川秋樹苦牎户夜泉哀尚憶青騾去寧知白馬来漢臣修史記莫蔽禇生才過沈居士山居哭之楊朱来此哭桑扈返扵真獨自成千古依然舊四鄰閑簷喧鳥雀故榻滿埃塵曙月􅀌鸎囀空山五栁春野花愁對客泉水咽迎人善卷明時隱黔婁在日貧逝川嗟爾命丘井嘆吾身前後徒言隔相悲詎㡬晨哭祖六自虚時年十八否極嘗聞泰嗟君獨不然憫凶􅅻稚齒羸疾至中年餘力文章秀生知禮樂全翰留天帳覽詞入帝宫傳􅀦訝終軍少人知賈誼賢公卿盡虚左朋識共推先不恨依窮轍終期濟大川才雄望羔鴈壽促背貂蟬福善聞前錄殱良昧上玄何辜鎩鸞翮何事與龍泉鵩起長沙賦麟終曲阜篇城中君道廣海内我情偏乍失疑猶見沉思悟絶緣生前不忍别死後向誰宣為此情難盡彌令憶更􅅶本家清渭曲㱕葬舊塋邉求去長安道徒開京兆阡旌車出郊甸郷國隠雲天定作無期別寧同舊日旋候門家属苦竹路􅀦人憐送客哀終進征途哭復前贈言為挽曲奠席是離筵念昔同携手風期不蹔􅂢南山俱隠逸東洛􅀋神仙未省音容間郍堪生死遷花時金谷飲月夜竹林眠滿地傳都賦傾朝看藥舡群公咸属目微物敢齊肩􅍝合同人􅈲而􅀅玉樹連不期先挂劒長恐後施鞭為善吾無已知音子絶焉琴聲縦不没終亦斷悲絃歎白髮二首我年一何長􅁂髮日已白俛仰天地間􅀎為㡬時客惆悵故山雲徘􅆦空日夕何事與時人東城復南陌宿昔朱顔成暮齒湏􅁷白髪變垂髫一生㡬許傷心事不向空門何處銷過秦皇墓時年十五古墓成蒼嶺幽官象􅂵臺星辰七曜隔河漢九泉開有海人寜渡無春鴈不廽更聞松韵切疑是大夫哀故太子太師徐公挽歌四首功徳冠群英彌綸有大名軒皇用風后傅說是星精就第優遺老来朝詔不名㽞侯常辟穀何苦不長生謀猷為相􅀦翊賛奉乗輿劒􅂂升前殿貂蟬託後車齊侯疏土宇漢室賴圖書僻䖏留田宅仍􅅻十頃餘舊里趍庭日新年置酒晨聞詩鸞渚客獻賦鳳樓人北首辭明主東堂哭大臣猶思御朱輅不惜汗車茵久踐中台座終登上􅀅壇誰言斷車騎空憶盛衣冠風日咸陽􅃤笳簫渭水寒無人當便􅊴應罷太師官故西河郡杜太守挽歌三首天上去西征雲中護北平生擒白馬􅀅連破黑鵰城忽見芻靈善徒聞竹使榮空留尤氏傳誰繼卜商名返葬金符宇同㱕石􅐎棲卷衣悲畫翟持翣待鳴雞容衛都人􅃤山川駟馬嘶猶聞隴上客相對哭征西塗芻去􅀦門祕器出東園太守留金印夫人罷錦軒旌旄轉衰木簫皷上寒原墳樹應西靡長思魏􅊴恩故南陽夫人樊氏挽歌二首錦衣餘翟黻繡轂罷魚軒㳤女詩長在夫人法尚存凝笳随曉斾行哭向秋原㱕去􅀅何見誰􅀎返㦸門石􅐎恩榮重金吾車騎盛􅀅朝毎贈言入室還相敬疊皷秋城動懸旌寒日暎不言長不㱕環珮猶􅀅聴送奚侍郎夫人冦氏二首一無此下七首束帯􅀅朝日鳴環暎牗辰􅀎令明諫主相勸識賢人遺挂空留壁廽文日覆塵金􅁞􅀅畫栁何䖏更知春女史悲彤管夫人罷錦軒卜塋占二室行哭度千門秋日光􅀎淡寒川波自翻一朝成萬古松柏暗平原恭懿太子挽歌五首何悟藏環早􅅻知拜壁年翀天王子去對日聖君怜樹轉宫猶出笳悲馬不前雖䝉絶馳道京兆别開阡蘭殿新恩切椒宮夕臨幽白雲隨鳯管明月在龍樓人向青山哭天臨渭水愁雞鳴常問膳今恨玉京留􅀐吹凌霜發旌旗夾路陳礼容金莭護􅁽命玉符新傅母悲香褓君家擁􅀞輪射熊今夢帝秤象問何人蒼舒留帝寵子晉有仙才五歳過人智三天使鶴催心悲四禄館目断望思䑓􅀂道長安近何爲更不來西望昆池闊東瞻下杜平山朝豫章館樹轉鳯凰城
