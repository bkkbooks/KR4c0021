front:
  text: 須溪先生校本唐右丞王維集卷第二
  hash: sha256:0e599f37acfa4e5d6aff1cb53b5d0acf1b81e5b8aa7826b732e090303fdbb23e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_002-1a}
body:
  text: 唐尚書右丞贈秘書􅁥王維奉和聖製􅂟玄元皇帝王像之作應制明君夢帝先寳命上齊天秦后徒聞樂周王耻卜年玉京移大像金籙㑹羣仙承露調天供臨空敞御筵斗廻迎壽酒山近起爐煙願奉無爲化齊心學自然奉和聖製從蓬莱向興􅂟閣道中留春雨中春望之作應制渭水自縈秦塞曲黄山舊遶漢宫斜鑾輿逈出仙門柳閣道廻㸔上􅁐花雲裏帝城䨇鳯闕雨中春樹万人家爲乗陽􅂔行時令不是宸遊重物華奉和聖製與太子諸王三月三日龍池春禊應制故事修春禊新宫展豫遊明君移鳯輦太子出龍樓賦掩陳王作盃如洛水流金人來捧劒􅀞鷁去廻舟􅁐樹浮宫闕天池照冕旒宸章在雲漢垂象滿皇州奉和聖製上巳於望春亭觀禊飲應制長樂青門外冝春小􅁐東樓開万户上輦過百花中􅀞鷁移仙妓金貂列上公清􅁔邀日落妙舞向春風渭水明秦甸黄山入漢宫君王來祓禊㶚滻亦朝宗奉和聖製幸玉宵公主山㽵因題石壁十韵之作應制碧落風煙外瑶臺道路賖如何連帝菀别自有仙家北地廻銮駕縁溪轉翠華洞中開日月牎裏發雲霞庭飬冲天鶴溪留上漢查種田生白玉􅅺竈化丹砂谷静泉逾響山􅀷日易斜御羹和石髓香飯進胡麻大道今無外長生詎有涯還瞻九霄上來徃五雲車奉和聖製登降聖􅀚與宰臣等同望應制鳯扆朝碧落龍圗耀金鏡維岳降二臣戴天臨万姓山川八校滿井邑三農竟比屋皆可封誰家不相􅂟林踈逺村出野曠寒山静帝城雲裏􅀷渭水天邊映喜􅂔􅍭風景頌聲溢歌詠端拱能任賢弥彰聖君聖奉和聖製御春明楼臨右相園亭賦楽賢詩應制􅃨道通長楽青門臨上路遥聞鳯吹喧闇識龍輿度褰旒明四目伏槛紆三顧小菀接侯家飛甍映宫樹啇山原上碧滻水林端素銀漢下天章瓊筵承湛露將非冨氏寵信以平戎故從来簡帝心詎得廻天歩奉和聖製暮春送朝集使帰郡應制萬囯仰宗周衣冠拜冕旒玉乗迎大客金莭送諸侯祖席傾三省褰帷向九州楊花飛上路槐色䕃通溝来預鈞天楽帰分漢主􅁨宸章􅀋河漢垂象滿中州奉和聖製送不蒙都護兼鴻臚卿帰安西應制上卿増命服都護􅀭帰斾雜虜尽朝周諸胡皆自鄶鳴笳澣海曲按莭陽関外落日下河源寒山静秋塞万方氛祲息六合乾坤大無􅀾是天心天心同覆載三月三日曲江侍宴應制万乗親斉􅀕千官喜豫遊奉迎從上􅁐祓禊向中流祖席傾三省褰帷向九州楊花飛上路槐色䕃通溝来預鈞天楽帰分漢主􅁨宸章􅀋河漢垂象滿中州奉和聖製送不蒙都護兼鴻臚卿帰安西應制上卿増命服都護􅀭帰斾雜虜尽朝周諸胡皆自鄶鳴笳澣海曲按莭陽関外落日下河源寒山静秋塞万方氛祲息六合乾坤大無􅀾是天心天心同覆載三月三日曲江侍宴應制万乗親斉􅀕千官喜豫遊奉迎從上􅁐祓禊向中流四海方無事三秋大有秊百生逢此日万壽願斉天芍薬和金鼎茱茰挿玳筵玉堂開右个天楽動宫懸御柳踈秋景城鴉拂曙煙無窮菊花莭長奉栢梁萹奉和聖製賜史供奉曲江宴應制侍從有鄒枚瓊筵就水開言陪栢梁宴新下建章来對酒山河滿移舟草樹廻天文同䴡日駐景惜行盃三月三日勤政樓侍宴應制綵仗連宵合瓊楼拂曙通年光三月裏宫殿百花中不數秦王日誰將洛水同酒筵嫌落絮舞䄂怯春風天保無爲徳人歡不戰功仍臨九衢宴更逹四門聦大同殿生玉芝龍池上有慶雲百官共覩聖恩便賜宴樂敢書即事欲􅀏周文歌宴鎬遥輕漢武樂横汾豈如玉殿生三秀詎有銅池出五雲陌上堯樽傾北斗樓前舜樂動南薫共歡天意同人意萬歳千秋奉聖君勑贈百官櫻桃時爲文部郎中美蓉闕下㑹千官紫禁朱櫻出上蘭緫是寢園春薦後非􅀜御苑鳥衘殘歸鞍競帶青絲籠中使頻傾赤玉盤飽食不湏愁内􅀬大官還有䉀漿寒和右􅀘闕崔興宗未央朝謁正逶迤天上櫻桃􅃬此時朱實􅀄傳九華殿䌓花舊雜萬年枝未勝晏子江􅀯橘莫比潘家大谷梨聞道令人好顔色神農本草自應知奉和聖製天長莭賜宰臣歌應制大陽升􅀆照萬方開閶闔􅀆臨玉堂儼冕旒􅀆垂衣裳金天净􅀆麗三光彤庭曙􅀆延八荒徳合天􅀆禮神遍靈芝生􅀆慶雲見唐堯后􅀆稷卨臣匝宇宙􅀆華胥人盡九服􅀆皆四鄰乾降瑞􅀆坤獻珍奉和聖製聖札賜宰臣連珠詞五首應制時爲庫部貟外臣聞大明馭㝢天地同符間氣佐時君臣恊徳故千秊聖主唐帝撫其寳圗七徳諸侯周公爲之元老臣聞有其才者効其職重其任者竭其能故樂播大凮乃能調四氣身􅀐列􅀫於是運三光臣聞先天不違徳合於上事君盡力功濟於下故君臣同體扵大道庻人以康億兆宅心扵至仁萬􅀖乃固臣聞形之端者影必隨焉聲之善者響必應焉故偃武修文皇天降之善氣薄賦省􅃥后􅁟報以豐年臣聞宣至理者文懸於日月表聖言者字動之以煙雲故虞舜作歌徒施於典筞伏羲畫卦未􅀋於昭囬勑借岐王九成宫避暑應教帝子逺辭丹鳯闕天書遥借翠微宫隔䆫雲霧生衣上卷慢山泉入鏡中林下水聲喧語􅀏巖間樹色隠房櫳仙家未必能勝此何事吹笙向碧空從岐王過楊氏别業應教楊子談經所淮王載酒過興䦨啼鳥換坐乆落花多逕轉廽銀燭林開散玉珂嚴城時未啓前路擁笙歌從岐王夜讌衞家山池應教座客香貂滿宮娃綺幔張澗花輕粉色山月少燈光積翠紗䆫暗飛泉繡户凉還將歌舞出歸路莫愁長和尹諌議史舘山池雲舘接天居霓裳侍玉除春池百子外芳樹萬年餘洞有仙人籙山藏大史書君恩深漢帝且莫上空虚和陳􅁥四􅀰秋雨中思從弟據嫋嫋秋凬動凄凄煙雨䌓聲連鳷鵲觀色暗鳯凰原細柳踈髙閣輕槐落洞門九衢行欲斷萬井寂無喧忽有愁霖唱更陳多露言平原思令弟康樂謝賢昆逸興方三接衰顔強七奔相如今老病歸守茂陵園和僕射晉公扈從温湯時爲右􅀘闕天子幸新豐旌旗渭水東寒山天仗裏温谷慢城中奠玉羣仙坐焚香大一宫出遊逢牧馬罷獵有非雄上宰無為化明時大古同靈芝三秀紫陳粟萬箱紅王禮尊儒教天兵小戰功謀猷歸哲匠詞賦属文宗司諌方無闕陳詩且未工長吟吉甫頌朝夕仰清凮和宋中丞夏日遊福賢觀天長寺即陳左相所施之作巳相殷王國空餘尚父溪釣磯開月殿築道出雲梯積水浮香象深山鳴白鷄虚空陳妓樂衣服製虹霓墨􅀧三千界丹飛六一泥桃源勿遽返􅂯訪恐君迷和賈舎人早朝大明宫之作綘幘雞人送曉籌尚衣方進翠雲裘九天閶闔開宫殿萬國衣冠拜冕旒日色􅂊臨仙掌動香煙欲傍衮龍浮朝罷湏裁五色詔珮聲歸向鳯池頭􅀲園詩并序維􅀲園髙齋俯視􅀯山形勝二三時輩同賦是詩兼命詞英數公同用園字為韵住多少時大子司議􅀰薛璩發此題遂同諸公云余適欲鋤􅀲􅀝鋤聽四門鳴騶導騘馬常從夾朱軒窮巷正傳呼故人儻相存􅂝手追凉凮放心望乾坤藹藹帝王州宫觀一何繁林端出綺道殿頂摇華幡素懷在青山􅀂值白雲屯廽凮城西雨返景原上村前酌􅄹樽酒徃徃間清言黄鸝轉深木朱槿照中園猶羡松下客石上聞清猿同崔傅荅賢弟洛陽才子姑蘇客杜宛殊非故郷陌九江楓樹幾回青一片楊州五湖白楊州時有下江兵蘭陵鎮前吹笛聲夜火人歸冨春郭秋凮鶴唳石頭城周郎陸弟爲儔侶對舞前溪歌白紵曲机書留小史家草堂碁賭山隂墅衣冠若話外臺臣先數夫君席上珍更聞臺閣求三語遥想凮流第一人同崔貟外秋宵寓直建禮髙秋夜承明候曉過九門寒漏徹萬井曙鐘多月㢠藏珠斗雲消出綘河更慙衰朽質􅀯陌共鳴珂同比部楊貟外十五夜遊有懐静者季雜言承明少休沐建禮省文書夜漏行人息歸鞍落日餘懸知三五夕萬户千門闢夜出曙翻歸傾城滿南陌陌頭馳騁盡䌓華王孫公子五侯家由來月明如白日共道春燈勝百花聊㸔侍中千餘􅀐強識小婦七香車香車寳馬共喧闐箇裏多情俠少秊競向長楊柳市北肯過精舎竹林前獨有仙郎心寂寞却將宴坐為行樂儻覔忘懷共徃來幸霑同舎甘藜藿沈十四拾遺新竹生讀經處同諸公之作閑居日清静脩竹自檀欒嫩莭留餘籜新叢出舊䦨細枝凮響亂踈影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂仙壇同盧拾遺􅅊給事東山别業二十韵給事首春休沐維巳陪遊及乎是行亦預聞命㑹無車馬不果斯諾託身侍雲陛昧早趍華軒遂陪鵷鴻侶霄漢同飛飜君子垂恵顧期我於田園側聞景龍際親䧏􅀯面尊萬乗駐山外順凮祈一言髙陽多夔龍荆山積璵璠盛徳啓前烈大賢鍾後昆侍郎文昌宫給事東掖垣謁帝俱來下冠盖盈丘樊閨凮首􅀖族庭訓延郷村菜地包山河樹共竟川原巖端廽綺檻谷口開朱門階下羣峯首雲中瀑水源鳴玉滿春山列筵先朝暾㑹舞何颯踏擊鍾弥朝昏是時陽和莭清晝猶未暄藹藹樹色深嚶嚶鳥聲繁顧巳􅀒􅀫諾延頸慙芳蓀蹇歩守窮巷髙駕難攀援素是獨徃客脫冠情弥敦和使君五􅀰西樓望逺思歸髙樓望所思目極情未畢枕上見千里牎中窺萬室悠悠長路人曖曖逺郊日惆悵極浦外迢遞􅀌煙出能賦属上才思歸同下秩故郷不可見雲水空如一和大常􅅊主簿五郎温湯寓目漢主離宮接露臺秦川一半夕陽開青山盡是朱旗繞碧磵翻從玉殿來新豐樹裏行人度小苑城邊獵􅀐廽聞道甘泉能獻賦懸知獨有子雲才奉和楊駙馬六郎秋夜即事髙樓月似霜秋夜鬱金堂對坐彈盧女同看舞鳯凰少兒多送酒小玉更焚香結束平陽􅀐明朝入建章酬諸公見過四言時官出在輞川㽵嗟余末喪哀此􅀌生屏居藍田薄地躬耕歳晏輸稅以奉粢盛晨徃東臯草露未晞暮看煙火􅀒檐來歸我聞有客足掃荆扉簞食伊何副􅀲􅎲􅀥仰厠群賢皤然一老媿無筦簟班荆席藁汎汎登陂折彼荷花净觀素鮪俯映白沙山鳥群飛日隱輕霞登車上馬倐忽雨散雀噪荒村雞鳴空館還復幽獨重欷累歎酬虞部蘇貟外過藍田别業不見留之作貧居依谷口喬木帯荒村石路枉廽駕山家誰侯門漁舟膠凍浦獵火燒寒原唯有白雲外踈鍾聞夜猿詶比部楊貟外暮􅀫琴臺朝躋書閣率爾見贈之作舊簡拂塵看鳴琴候月彈桃源迷漢姓松樹有秦官空谷歸人少青山背日寒羡君棲隠處遥望白雲端苑舎人能書􅆊字兼逹􅆊音皆曲盡其妙戯爲之贈名儒待詔滿公車才子爲􅀰典石渠蓮花法藏心懸悟貝葉經丈手自書楚詞共許勝楊馬􅆊字何人辯魯魚故舊相望在三事願君莫厭承明廬苑咸荅并序王元外兄以予甞學天竺書有戯題見贈然王兄當代詩匠又精禪理枉採知音形於雅作輙走筆以詶焉且乆未遷因而嘲及蓮花􅆊字本從天華省仙郎早悟禪三􅀧成伊猶有想一觀如妄自忘筌爲文巳變當時體入用還推間氣賢應同羅漢無名欲故作馮唐老歳秊重詶苑郎中并序時爲庫部貟外須輙奉贈忽枉見詶叙末云且乆不遷因而嘲及詩落句云應同羅漢無名欲故作馮唐老歳秊亦解嘲之􅀋也何幸含香奉至尊多慙未報主人恩草木豈能酬雨露榮枯安敢問乾坤仙郎有意憐同舎丞相無私斷掃門楊子解嘲徒自遣馮唐巳老復何論詶郭給事洞門髙閣靄餘輝桃李隂隂柳絮飛禁裏踈鍾官舎晚省中啼鳥吏人稀晨揺玉珮趍金殿夕奉天書拜􅃈闈強欲從君無郍老將因卧病解朝衣詶嚴少尹徐舎人見過不遇公門暇日少窮巷故人稀偶值乗藍轝非􅀜避白衣不知炊􅁰否誰解掃荆扉君但傾茶椀無妨􅀐馬歸慕容承携素饌見過紗帽烏皮几閑居􅂴賦詩門看五柳識年筭六身知靈壽君王賜彫胡弟子炊空劳酒食饌特底解人頥詶慕容上行行西陌返駐爐問車公挾轂双官􅀐應門五尺僮老年如塞北強起離牆東爲報壷丘子来人道姓蒙詶張少府晚年唯好静万亊不関心自顧無長䇿空知返舊林松風吹解帯山月照弹琴君問窮通理漁􅁔入浦􅀷喜祖三至留􅀫門前洛陽客下馬拂征衣不枉故人駕平生多掩扉行人返􅀷巷積雪帯餘暉早歳同􅂁者髙車何処帰荅祖詠四秊不相見相見復何爲握手言未畢却令傷别離升坣還駐馬酌醴便呼兒語嘿自相對安用傍人知詶􅀺居士浙川作曇壁上人院走筆成儂家真箇去公定隨儂否着處是蓮花無心変楊柳松龕藏薬裹石唇安茶􅍫􅂔味當共知那能不􅂝手詶賀四贈􅁑巾之作野巾傳恵好兹貺重兼金嘉此幽栖物能斉隠吏心早朝方暫挂晚沐復来簮坐斍嚻塵逺思君共入林故人張諲工詩善易卜兼能丹青草􅀠頃以詩見贈聊􅀗詶之不逐城東遊俠兒隱嚢紗帽坐弹碁蜀中夫子時開卦洛下書生解詠詩薬欄花逕衡門裏時復據梧聊隱几屏風誤􅀧惑孫郎團扇草書輕内史故園高枕度三春永日垂帷絶四隣自想蔡邕今巳老更將書籍與何人荅張五弟雜言終􅀯有茅屋前對終􅀯山終年無客長閉関終日無心長自閑不妨飲酒復垂釣君但能来相徃還輞口遇雨憶終􅀯山因獻絶句裴迪積雨晦空曲平沙㓕浮彩輞水去悠悠􅀯山復何在荅裴迪淼淼寒流廣蒼蒼秋雨晦君問終􅀯山心知白雲外須溪先生校本唐王右丞集卷第二
