front:
  text: 須溪先生校本唐王右丞集卷第三
  hash: sha256:95a2a1176bdd14768b9e49f8d150ca01162f0671a591856fd7bf83c5c422cc35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_003-1a}
body:
  text: 唐尚書右丞贈秘書監王維奉􅀉􅅊大守歩荒城自䔥索萬里山河空天高秋日逈嘹唳聞帰鴻寒塘映衰草高館落踈桐臨此歳方晏顧景問悲翁故人不可見寂寞平林東林園即事􅀉舎弟紞寓目一䔥散消􅁨兾俄頃青草粛澄波白雲移翠嶺後浦通河渭前山包鄢郢松含風裏聲花對池中影地多齊后瘧人帯荆州癭徒思赤筆書詎有丹砂井心悲常欲絶髮乱不能整青簞日何長閑門晝方静頺思茅簷下弥傷好風景􅀉河上段十六與君相見即相親聞道君家在孟津爲見行舟試借問客中時有洛陽人容易尽情舊未有此􅀉荆州張丞相所思竟何在悵望深荆門㪯丗無相識終身思舊恩方將与農圃藝植老丘園目盡􅀯飛鳥何由􅀉一言山中􅀉諸弟妹山中多法侣禅誦自爲群城郭遥相望唯應見白雲聞裴秀才迪吟詩因戯贈猿吟一何苦愁朝復悲夕莫作巫峽声腸断秋江客既蒙宥罪旋復拜官伏感聖恩􅀼書鄙意兼奉簡新除使君䒭諸公忽􅂪漢詔還冠冕始斍殷王解網羅日比星明猶自暗俳天齊聖壽未云多花迎喜􅂔猶能􅀏鳥識􅂬心亦解􅁔聞道百城新佩印還来双闕共鳴珂贈從弟司庫貟外絿少秊識亊淺強斈干名利徒聞躍馬年苦無出人智即亊豈徒言累官非不試既寡遂性􅂬恐招􅀒時累清冬見逺山積雪凝蒼翠皓然出東林發我遺丗意恵連素淸賞夙語塵外亊欲緩􅂝手期流年一何駃座上走筆贈薛璩慕容損希丗無髙符絶跡有卑棲君徒視人文吾固和天倪􅃡然萬物始及與群物齊分地依后稷用天信重􅀺春凬何豫人令我思東溪草色有佳意花枝稍􅍭荑更待凬景好與君藉萋萋贈李頎聞君餌丹砂甚有好顔色不知從今去㡬時生羽翼王母翳華芝望尔崑崙側文螭從赤豹萬里方一息悲㦲丗上人甘此膻腥食贈劉藍田籬中犬迎吠岀屋候柴扉歳晏輸井䅋山村人夜歸晚田始家食餘布成我衣詎肯無公事煩君問是非贈房盧氏琯逹人無不可忘已爱蒼生豈復小千室絃歌在两楹浮人日巳歸但坐事農耕桑榆欎相望邑里多雞鳴秋山一何净蒼翠臨寒城視亊兼偃卧對書不簮纓䔥條人吏踈鳥雀下空庭鄙夫心所向晚莭異平生將從海岳居守静解天刑或可累安邑茅茨君試營贈祖三詠濟州官舎作蠨蛸挂虗牗蟋蟀鳴前除歳晏凉凬至君子復何如髙館閴無人離居不可道閑門寂巳閉落日照秋草雖有近音信千里阻河関中復客汝潁去年歸舊山結交二十載不得一日展貧病子既􅀷契闊余不淺仲秋雖未歸暮秋以爲期良㑹詎㡬日終自長相思輞川閑居贈裴秀才迪寒山轉蒼翠秋水日潺湲􅀝仗柴門外臨凬聽暮蟬渡頭餘落日墟里上􅀌煙復值接輿醉狂歌五柳前􅀋以無情之景述無情之意復非作者所有春夜竹亭贈錢少府歸藍田夜静群動息時聞隔林犬却憶山中時人家澗西逺羡君明發去采蕨輕軒冕詶前錢起山月隨客來主人興下淺今宵竹林下誰覺花源逺惆悵曙鶯啼􅀌雲還絶巘甚不相紹贈東岳焦練師先生千歳餘五岳遍曾居遥識齊侯鼎新過王母廬不能師孔墨何事問長沮玉管時來鳯銅盤即釣魚竦身空裏語明目夜中書自有還丹術時論大素􅀄頻􅂪露版詔時降軟輪車山静泉逾響松髙枝轉踈攴頥問樵客丗上復何如贈􅅊穆十八與君青眼客共有白雲心不向東山去日令春草深淡淡有情戯贈張五弟諲三首吾弟東山時心尚一何逺日髙猶自卧鍾動始能飯不必其人直自輸冩領上髮未梳牀頭書不卷清川與悠悠空林對偃蹇青苔石上净細草松下軟䆫外鳥聲閑階前虎心善徒然萬像多澹尔大虗緬一知與物平自顧爲人淺對君忽自得浮念不煩遣張弟五車書讀書仍隱居染翰過草聖賦詩輕子虚閉門二室下隱居十年餘宛是野人也時從漁父魚秋凬日蕭索五柳髙且踈望此去人丗渡水向吾廬歳晏同􅂝手只應君與予設􅆯守毚兎垂鈎伺游鱗此是安口腹非􅀜慕隱淪吾生好清静􅂼食去情塵今子方豪蕩思爲鼎食人我家􅀯山下動息自遺身入鳥不相亂見獸皆相親雲霞成伴侣虚白侍衣巾何事湏夫子邀予谷口真贈裴旻將軍腰間寳劒七星文臂上琱弓百戰勲見􅀃雲中擒􅃛虜始知天上有將軍贈焦道士海上遊三島淮􅀯預八公坐知千里外跳向一壷中毎作清素可貴縮地朝珠闕行天使玉童飲人聊割酒送客乍分凬竒天老能行氣吾師不飬空有誤謝君徒雀躍無可問鴻􅄥好贈呉官長安客舎􅀬如煑無箇茗糜難御暑空摇白團其諦苦欲向縹囊還歸旅江郷鯖鮓不􅀉來秦人湯餅那堪許不如儂家任挑逹草屩蟧蝦冨春渚冬晚對雪憶胡居士水寒更傳曉碧清鏡覧衰顔隔牗凮驚竹開門雪滿山洒空深巷静積素廣庭閑借問􅀽安舎翛然尚閉関至滑州隔河望􅀺陽憶丁三㝢隔河見桑柘藹藹􅀺陽川望望行漸逺􅀌峯􅃿雲煙故人不可見河水復悠然頼有政聲逺時聞行路􅀓秋夜獨坐懷内弟崔興宗夜静群動息蟪蛄聲悠悠庭槐北凮響日夕方髙秋思子整羽翮及時當雲浮吾生將白首歳晏思滄洲髙足在旦暮肯爲􅀯敏儔雪中憶季揖雜言積雪滿阡陌故人不可期長安千門復萬户何處躞􅰭黄金覊胡居士卧病遺米因贈了觀四大因根性何所有妄計苟不生是身孰休咎色聲何謂客隂界復誰守徒言蓮花目豈惡楊枝肘既飽香積飯不醉聲聞酒有無断常見生㓕幻夢受即病即實相趍空定狂走無有一法真無有一法垢居士素通逹隨冝善斗擞牀上無氊卧鎘中有粥否齋時不乞食定應空􅎳口聊持数斗米且救浮生取贈裴卜迪凮景日夕佳與君賦新詩澹然望逺空如意方支頥春凮動百草蘭􅈍生我籬曖曖日暖閨田家來致詞欣欣春還皐淡淡水生陂桃李雖未開荑蕚滿其枝請君理還策敢告將農時酌酒與裴迪酌酒與君君自寛人情翻覆似波瀾白首相知猶按劒朱門先逹􅀏彈冠草色全經細雨濕花枝欲動春凮寒丗事浮雲何足問不如髙卧且加飡與胡居士皆病􅀉此詩兼示學人二首􅆊志躰一興㣲塵念横有朝露身如是覩䕃界何方置我人礙有固爲主趣空寕捨賔洗心詎懸解悟道正迷津因愛果生病從貪始斍貧色聲非彼妄浮幻即吾真四逹竟何遣方殊安可塵胡生但髙枕寂寞與誰憐戰勝不謀食理齊甘􅀒薪子若未始異詎論踈與親浮空徒漫漫汎有定悠悠無乗及乗者所謂智人舟詎捨貧病域不疲生死流無煩君喻馬任以我爲牛植福祠迦葉求仁􅀏孔丘何津不鼔棹何路不摧輈念此聞思者胡爲多阻脩空虚花聚散煩惱樹稀稠㓕想成無記生心坐有求䧏呉復歸蜀不到莫相尤九月九日憶山東兄弟時年十七獨在異郷爲異客每逢嘉莭倍思親遥知兄弟登高處遍揷茱茰少一人華岳西岳出浮雲積翠在大清連天疑黛色百里遥青􅁳白日爲之寒森沈華隂城昔聞乾坤閉造化生巨靈右足踏方止左手推削成天地忽開拆大河注東􅈚遂爲西峙岳雄雄鎮秦京大君包覆載至徳􅀍群生上帝佇昭告金天思奉迎人祗望幸乆何獨禪云亭藍田山石門精舎落日山水好􅃞舟信歸凮玩竒不覺逺因以縁源窮遥愛雲木秀􅀄疑路不同安知清流轉偶與前山通捨舟理輕䇿果然愜所適老僧四五人逍遥䕃松栢朝􅆊林未曙夜禪山更寂道心及牧童丗事問樵客瞑􅀫長林下焚香卧瑶席澗芳襲人衣山月映石壁􅂯㝷畏迷誤明發更登厯􅀏謝桃源人花紅復來覿山居秋􅊕空山新雨後天氣晚來秋明月松問照清泉石上流竹喧歸浣女蓮動下漁舟隨意春芳歇王孫自可留總無可􅀧自是好青溪言入黄花川毎逐青溪水隨山將萬轉趣途無百里聲喧亂石中色静深松裏演􅃞汎菱荇澄澄映葭葦我心素巳閑清川澹如此請留盤石上垂釣將巳矣崔濮陽兄季重前山興山西去亦對維門秋色有佳興況君池上閑悠悠西林下自識門前山又别又别有道之言千里横黛色數峰出雲間嵳峩對秦國合沓藏荆􅀜殘雨斜日照夕嵐飛鳥還故人今尚爾歎息此頺顔終􅀯别業中歳頗好道晚家􅀯山陲興來每獨徃勝事空自知行到水窮處坐㸔雲起時偶然值林叟談􅀏無還期其資如此故自難及皇甫岳雲溪雜題五首鳥鳴磵人閑桂花落夜静春山空月出驚山鳥時鳴春澗中蓮花塢日日採蓮去洲長多暮歸弄蒿莫濺水畏濕紅蓮衣鸕鷀堰乍向紅蓮􅃿復出清浦颺可哂獨立何䙰褷㗸魚古查上上平田朝耕上平田暮耕上平田借問問津者寕知沮溺賢語調并髙萍池春池深且廣㑹待輕舟廽靡靡緑萍合垂楊掃復開毎毎静意得之偶然湏溪先生校本唐王右丞集卷第三
