front:
  text: 湏溪先生校本唐王右丞集卷第一
  hash: sha256:b713f1a8759f4bcd3d1e2ec61a951478be826c44bff222132a09a4449a3ec472
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_001-1a}
body:
  text: 唐尚書右丞贈秘書監王維白鸚鵡賦若夫名依西域族本􅀯海同朱喙之清音變緑衣於素彩惟兹鳥之可貴諒其美之斯在尔其入翫於人見珍竒質狎蘭房之妓女去桂林之雲日易喬枝以羅袖代危巢以瓊室慕侣方逺依人永畢託言語而雖通顧形影而非匹經過珠網出入金鋪單鳴無應隻影長􅀌偶白鷼於池側對皓鶴於庭隅愁混色而難辨願知名而自呼明心有識懷思無極芳樹絶想雕梁撫翼時衘花而不言毎􅄬人以方息慧性􅀌禀雅容非飾含火徳之明輝􅀍金方之正色至如海燕呈瑞有玉筐之可依山鷄學舞向寳鏡而知歸皆羽毛之偉麗奉日月之光輝豈憐兹鳥地逺形㣲色凌紈質彩奪繒衣深籠乆閉喬木長違儻見借其羽翼與遷鶯而共飛登樓歌聊上君􅀆髙樓飛甍鱗次􅀆在下俯十二􅀆通衢緑槐參差􅀆車馬却瞻􅀆龍首前眺􅀆冝春王畿鬱􅀆千里山河壯􅀆咸秦舎人下􅀆青宫據胡床􅀆書空執㦸疲於下位老夫好隠􅀆牆東亦幸有張伯英草聖􅀆龍騰蚪躍擺長雲􅀆捩廽凬琥珀酒􅀆彫胡飯君不御􅀆日將晚秋凬􅀆吹衣夕鳥􅀆争返􅀌砧發􅀆東城林薄暮􅀆蟬聲逺時不可􅀆􅂯得君何爲􅀆偃蹇夷門歌七雄雄雌猶未分攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子爲嬴停駟馬執轡逾恭意愈下亥爲屠肆鼔刀人嬴乃夷門􅈽関者非但慷慨獻良謀意􅂔兼將身命酬向凬刎頭送公子七十老翁何所求堇許不可易䨇黄鵠歌送别時爲莭度判官在凉府作天路來􅀆䨇黄鵠雲上飛􅀆水上􅀫撫翼和鳴整羽族不得巳忽分飛家在玉京朝紫㣲主人臨水送將歸悲笳嘹唳垂舞衣賔欲散􅀆復相依幾徃返􅀆極浦尚徘􅆦􅀆落暉岸上火􅀆相迎將夜入􅀆邊城鞍馬歸􅀆佳人散悵離􅁨􅀆獨含情新秦郡松樹歌青青山上松數里不見今更逢不見君心相憶此心向君君應識爲君顔色髙且閑亭亭逈出浮雲間青雀歌青雀翅羽短未􅀎逺食玉山禾猶勝黄雀争上下唧唧空倉復若何同盧象啾啾青雀兒飛來飛去仰天池逍遥飲啄安涯分何假扶摇九萬餘同王縉林間青雀兒來徃翩翩繞一枝莫言不解銜環報但問君恩今若爲同崔興宗青扈繞青林翩翾陋體一㣲禽不應長在藩籬下他日凌雲誰見心同裴迪動息自適性不曽妄與鷰雀羣幸忝鴛鸞早相識何時提携致青雲贈徐中書望終􅀯山歌晚下􅀆紫㣲悵塵事􅀆多違駐馬􅀆双樹望青山􅀆不歸送友人歸山歌二首山寂寂􅀆無人又蒼蒼􅀆多木群龍􅀆滿朝君何爲􅀆空谷文寡和􅀆思深道難知􅀆行獨恱石上􅀆流泉與松間􅀆草屋入雲中􅀆飬鷄上山頭􅀆􅈽犢神與􅀥􅀆如􅀲虎賣杏􅀆収榖愧不才􅀆妨賢嫌既老􅀆貪禄誓解印􅀆相從何詹尹􅀆何卜不用楚調自適目前詞少而愈多尚斍盤谷􅁔意爲凢山中人􅀆欲歸雲冝冝􅀆雨霏霏􅀧景状意色色别水驚波􅀆翠菅靡白鷺忽􅀆飜飛君不可􅀆褰衣山万重􅀆一雲混天地􅀆不分樹晻暧􅀆氛氲猿不見􅀆空聞忽山西􅀆夕陽見東臯􅀆逺村平蕪緑􅀆千里眇惆悵􅀆思君宋玉之下渊明之上甚似晋人不知者以為氣短知者以為琴操之餘音也魚山神女祠􅁔二首迎神曲坎坎繫鼔魚山之下吹洞簘望極浦女巫進紛屡舞陳瑶席湛淸醑風凄凄􅀆夜雨神之來􅀆不來使我心􅀆苦復苦送神曲紛進拜􅀆堂前目眷眷􅀆瓊筵来不語􅀆意不傳作暮雨􅀆愁空山悲急管思䌓絃靈之駕􅀆􅌂欲旋倐雲収􅀆雨歇山青青􅀆水潺湲扶􅀯曲􅁔詞五首翠羽流蘇帳春眠􅍼不開羞從面色起嬌逐語聲來早向昭陽殿君王中使催堂上靑絃動堂前綺席陳齊􅁔盧女曲䨇舞洛陽人傾國徒相㸔寕知心所親用得别香􅂔傳空滿粧華影箔通􅁔聞天仗外舞出御楼中日暮帰何處花間長楽宫宫女還金屋將眠復畏明入春輕衣好半夜薄妝成拂曙朝前殿玉墀多珮聲朝日照綺䆫佳人坐臨鏡散黛恨猶輕挿􅁫嫌未正同心勿遽遊幸待春粧竟隴頭吟長城少秊遊俠客夜上戍樓看大白隴頭明月逈臨関隴上行人夜吹笛関西老將不勝愁駐馬聽之䨇淚流身經大小百餘􅀾麾下偏禆万户侯蘇武􅅻爲典属國莭旄空盡一作零落海西頭次第轉摺恨惋何限又非長萹所及老將行少秊十五二十時歩行奪取胡馬􅀐射殺山中白額虎肯数鄴下黄鬚兒一身轉􅀾三千里一劒曾當百萬師漢兵奮迅如霹􅆮虜􅀐崩騰畏蒺蔾衛靑不敗由天幸李廣無功縁数竒自從棄置便衰朽丗事蹉􅋸成白首昔時飛箭無全目今日垂楊生左肘路傍時賣故侯􅀲門前斈種先生柳茫茫古木連窮巷遼落寒山對虗牗昼出愈有誓令踈勒出飛泉不似頴川空使酒賀蘭山下陣如雲羽檄交馳日夕聞莭使山河募秊少詔書五道出將軍試拂鐡衣如雪色聊持宝劒動星文願得燕弓射天將耻令越馬鳴呉軍莫嫌舊日雲中守猶堪一􅀾立功勲起結嬌嫰復勝老語燕支行漢家天將才且雄來時謁帝明光宫萬乗親推􅀟闕下千官出餞五陵東誓辝甲第金門裏身作長城玉塞中衛霍􅅻堪一􅀐將朝廷不数貳師功趙魏燕韓多勁卒関西俠少何咆􅣋報讎只是聞甞膽飲酒不曾妨刮骨􅀞㦸雕戈白日寒連旗大斾黄塵􅃿疊鼓遥翻瀚海波鳴笳乱動天山月麒麟錦帯佩呉鉤颯踏青􅌐躍紫騮拔劒已断天驕臂帰鞍共飲月支頭漢兵大呼一當百虜􅀐相㸔哭且愁教􅀾湏令赴湯火終知上將先伐謀從軍行吹角動行人喧喧行人起笳悲馬嘶乱争渡金河水日暮沙漠垂􅀾聲烟塵裏尽係名王􅖪帰来報天子桃源行時年十九魚舟逐水爱山春两岸桃花夾去津坐看紅樹不知逺行盡青溪不見人山口潜行始隈隩山開曠望旋平陸遥㸔一處攅雲樹近入千家散花竹樵客􅀄傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳静日出雲中雞犬喧驚聞俗客争來集競引還家問都邑平明閭巷掃花開薄暮漁樵乗水入􅀄因避地去人間更問成仙遂不還峽裏誰知有人事丗上遥望空雲山不疑靈境難聞見塵心未盡思郷縣出洞無論隔山水辝家終擬長游􅄛自謂經過舊不迷安知峯壑今來変當時只記入山深青溪㡬度到雲林春來遍是桃花水不辨仙源何處㝷隴西行十里一走馬五里一􅀭鞭都護軍書至匈奴圍酒泉関山正飛雪烽戍断無烟早春行紫梅發􅀄遍黄鳥􅁔猶澁誰家折楊女弄春如不及爱水㸔粧坐羞人映花立香畏風吹散衣愁露霑濕玉閨青門裏日落香車入游􅄛益相思􅍭啼向綵帷憶君長入夣歸晚更生疑不及紅簷鷰双栖緑草時洛陽女兒行時年十八洛陽女兒對門居􅂊可顔容十五餘良人玉勒乗騘馬侍女金盤膾鯉魚􅀞閤朱樓尽相望紅桃緑柳垂簷向羅帷送上七香車宝扇迎歸九華帳狂夫富貴在靑春意􅂔驕奢劇季倫自憐碧玉親教舞不惜􅃢瑚持與人春䆫􅍼㓕九微火九微片片飛花璅戯罷曽無理曲時粧成秪是薫香坐城中相識盡繁華日夜經過趙李家誰憐越女顔如玉貧賤江頭自浣沙少秊行四首新豊羙酒斗十千咸陽遊俠多少䄵相逢意􅂔爲君飲繫馬髙樓垂柳邊出身仕漢羽林􅀰􅀄隨驃􅀐􅀾漁陽孰知不向邊庭苦縱死猶聞俠骨香好一身能擘两彫弧虜􅀐千重只似無偏坐金鞍調白羽紛紛射殺五單于漢家君臣歡宴終髙議雲臺論􅀾功天子臨軒賜侯印將軍佩出光眀宫皇甫岳冩真讃有道者古其神則淸䨇眸朗暢四􅂔和平長江月影大華松聲周而不器獨也難名且未婚嫁猶􅀉簮纓燒丹薬就辟榖將成雲漢之下法本無生裴右丞冩真讃澹爾清徳居然素風氣和容衆心静如空智以窮理才包至公大盗振駭羣臣困􅂪忘身徇莭歴險能通仁者之勇義無失忠凝情取像帷雅則同粉繪不及清明在躬麟閣之上其誰比崇白黿渦雜言走筆􅀯山之瀑水􅀆激石􅘝瀑似雷驚人相對􅀆不聞語聲飜渦跳沬􅀆蒼苔􅊜蘚老且厚春草爲之不生獸不敢驚動鳥不敢飛鳴白黿渦濤戲瀬􅀆委身以縦横主人之仁􅀆不網不釣得遂性以生成黄雀癡黄雀癡黄雀癡謂言青鷇是我兒一一口衘食飬得成毛衣到大啁啾解游颺各自東西􅀯北飛薄暮空巢上覉雌獨自歸鳯凰九鶵亦如此慎莫愁思顦顇損容輝贈裴迪雜言不相見不相見來乆日日泉水頭常憶同携手􅂝手本同心復歎忽分􅁭相憶今如此相思深不深榆林群歌山頭松栢林山下泉聲傷客心千里万里春草色黄河東流流不息黄龍戍上遊俠兒愁逢漢使不相識問冦校書双溪君家少室西爲復少室東别來㡬日今春風新買双溪定何似餘生欲􅀉白雲中􅀉崇􅆊僧崇􅆊僧崇􅆊僧秋帰覆釡春不還落花啼鳥紛紛乱澗户山䆫寂寂閑峽裏誰知有人亊郡中遥望空雲山宋進馬哀詞并序宋進馬者中書舎人宋公之子也公無弟兄子一而巳文則有種徳亦惟肖忽疾倐逝醫不及視宋公哀之他人悲之故爲詞曰背春渉夏􅀆衆木藹以繁隂連金華與玉堂􅀆宫閣欎其沈沈百官並入􅀆何語􅀏之啞啞君獨静嘿以傷心草王言􅀆不得辭我悲减思􅀆少時僕夫命駕􅀆出閶闔歴通逵陌上人􅀆如故識不識􅀆徃來眼中不見􅀆吾兒􅆖紫騮􅀆從青驪低光垂彩􅀆怳不知其所之闢朱户􅀆望華軒意斯子􅀆候門忽思瘞􅀆城􅀯心瞀亂􅀆重昬仰訴天之不仁􅀆家唯一身身止一子何㣧嗣之不繁就單尠而又死將清白􅀆遺誰問詩礼􅀆巳矣哀從中􅀆不可勝豈暇料餘年􅀆復㡬日黯黯􅀆頺曄鳥翩翩􅀆疾飛邈窮天􅀆不返疑有日􅀆來歸静言思􅀆永絶復驚呌􅀆沾衣客有弔之者曰􅀚未始􅀆有物同委蛻􅀆胡悲且延陵􅀆未至况西河􅀆不知學無生􅀆庶可幸能聽扵吾師湏溪先生校本唐王右丞集卷第一
