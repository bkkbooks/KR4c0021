front:
  text: 須溪先生校本唐王右丞集卷第四
  hash: sha256:f8e618980a15668a060197100169f06fe9eb6c59ba0be5cbe91e9fac17791379
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_004-1a}
body:
  text: 唐尚書右丞贈祕書監王維輞川集并序余别業在輞川山谷其遊止有孟城拗華子岡文杏館斤竹嶺鹿柴去聲茱茰沜潘上官槐陌臨湖亭南垞茶欹湖柳浪欒家瀨金屑泉白石灘北垞竹里館辛夷塢􅃮園椒園等與裴迪間暇各賦絶句云爾孟城拗新家孟城口古木餘衰柳來者復為誰空悲昔人有復欲兩語如此俯仰曠逹不可得同前裴迪結廬古城下時登古城上古城非疇昔今人自來往未為不佳相去甚逺華子岡飛鳥去不窮連山復秋色上下華子岡惆悵情何極蕭然更欲無言同前落日松凮起還家草露稀雲光侵履迹費力山翠拂人衣文杏館文杏裁為梁香茅結為宇不知棟裏雲去作人間雨同前迢迢文杏館躋攀日巳屢南嶺與北湖亦使得前看復廽顧斤竹嶺檀欒映空曲青翠漾漣漪暗入啇山路樵人不可知同前明流紆且直緑篠密復深一徑通山路行歌望舊岑鹿柴空山不見人但聞人語響返景入深林復照青苔上無言而有畫意同前日夕見寒山便為獨往客不知松林事但有麏麚迹木蘭柴秋山斂餘照飛鳥逐前侣彩翠時分明夕嵐無處所猶是鹿柴之餘同前蒼蒼落日時鳥聲亂溪水緣溪路轉深幽興何時已茱茰沜結實紅且緑復如花更開山中儻留客置此茱茰丕自木在同前飄香亂椒桂布葉間檀欒雲日雖廽照森沉猶自寒宫槐陌灰徑蔭宫槐幽隂多緑苔膺門但迎掃畏有山僧來同前門前宫槐陌是向欹湖道好秋來山雨多落葉無人掃臨湖亭輕舸迎上客悠悠湖上來當軒對撙酒四面芙蓉開同前當軒彌滉漾孤月正徘徊谷口猿聲發凮傳入户來南垞輕舟南垞去北垞渺難即隔浦望人家遙遙不相識同前孤舟信凮泊南垞湖水岸落日下崦嵫清波殊渺漫欹湖吹簫凌極浦日暮送夫君湖上一廽看山青卷白雲同前空闊湖水廣青熒天色同艤舟一長嘨四面來清凮柳浪分行接綺樹倒影入清漪不學御溝上春凮傷别離同前映池同一色逐吹散如絲結隂既得地何謝陶家時欒家瀨颯颯秋雨中淺淺石溜㵼跳波自相濺白鷺驚復下同前瀨聲喧極浦沿涉向南津泛泛鳬鷗渡時時欲近人金屑泉日飲金屑泉少當千餘歲翠鳯翔文螭羽莭朝玉帝同前瀠渟淡不流金碧如可拾迎晨含素華獨往事朝汲白石灘清淺白石灘緑蒲向堪把家住水東西浣紗明月下同前跋石復臨水弄波情未極日下川上寒浮雲淡秋色北垞比垞湖水北離樹映朱欄逶迤南川水明滅青林端同前南上北垞下結宇臨欹湖每欲採樵去扁舟出菰蒲竹里館獨坐幽篁裏彈琴復長嘨深林人不知明月來相照同前來過竹里館日與道相親出入惟山鳥幽深無丗人辛夷塢木末美蓉花山中發紅蕚澗户寂無人絲絲開且落其意亦欲不著一字漸可語禪同前緣堤春草合王孫自留玩况有辛夷花色與芙蓉亂􅃮園古人非傲吏自闕經丗務偶寄一微官婆娑數枝樹使在謝東山輩口語皆成髙韻同前好間早成性果此諧宿諾今日􅃮園遊還同莊叟樂椒園桂尊迎帝子杜若贈佳人椒漿奠瑶席欲下雲中身首首素淨同前丹刺罥人衣芳香留過客幸堪調鼎用願君垂採摘壞盡一鍋羮歸嵩山作清川帶長薄車馬去間間流水如有意暮禽相與還荒城臨古渡落日滿秋山已近自然迢遞嵩髙下歸來且閉關歸輞川作谷口踈鍾動漁樵稍欲稀悠然逺山暮獨向白雲歸菱蔓弱難定楊花輕易飛東皋春草色惆悵掩柴扉投師蘭若宿一公栖大白髙頂出雲煙𣑽流諸壑遍花雨一峯偏迹為無心隱名因立教傳鳥來還語法客去更安禪晝涉松路盡暮投蘭若邊洞房隱深竹清夜聞遙泉向是雲霞裏今成枕席前豈唯暫留宿服事將窮年韋給事山居幽尋得此地詎有一人曽大壑隨階轉羣山入户登庖厨出深竹印綬隔垂藤即事辭軒冕誰云病未能輞川别業不到東山向一年歸來才及種春田雨中草色緑堪染水上桃花紅亦然優婁比丘經論學傴僂丈人鄉里賢披衣倒屣且相見相歡語笑衡門前山中示弟等山林吾喪我冠帶爾成人别是一種莫學嵇康懶且安原憲貧山隂多是户泉水在東鄰緣合妄相有性空無所親安知廣成子不是老夫身戲題輞川别業柳條拂地不須折松樹梢雲從更長藤花欲暗藏猱子柏葉𥘉齊飬麝香實景李處士山居君子盈天階小人井自免方隨錬金客城上家絶巘背嶺花未開入雲樹深淺清晝猶自眠山鳥時一囀韋侍郎山居幸忝君子顧遂陪塵外蹤間花滿巖谷瀑水映杉松啼鳥忽臨澗歸雲時抱峰良遊盛替紱繼迹多夔龍詎枉青門道故聞長樂鍾清晨去朝謁事一作安馬何從容山居即事寂寞掩柴扉蒼茫對落暉鶴巢松樹遍人訪蓽門稀嫩竹含新粉紅蓮落故衣渡頭煙火起處處採菱歸自是維詩早秋山中作無才不敢纍眀時思向東溪守故籬不一作豈猒尚平婚嫁早却嫌陶令去官遲草間蛩響臨秋急山裏蟬聲薄暮悲寂寞柴門人不到空牀獨與白雲期戲題盤石可憐盤石臨泉水復有垂楊拂酒杯若道春凮不解意何因吹送落花來終南山太一近天都連山到海隅白雲回望合青藹入看無分野中峰變隂晴衆壑殊欲投人處宿隔水問樵夫田園樂七首出入千門萬户經過北里南鄰躞蹀鳴珂有底崆洞散髮何人無一語可俗再見封侯萬户立談賜璧一雙詎勝耦耕南畒何如髙卧東窗採菱渡頭凮急䇿杖村西日斜杏樹壇邊漁父桃花源裏人家急一作起萋萋春草秋緑落落長松夏寒牛羊自歸村巷童稚不識衣冠山下孤煙逺村天邊獨樹髙原一瓢顔回陋巷五柳先生對門桃紅復􅍭宿雨柳緑更帶春煙花落家僮未掃鶯啼山客猶眠酌湭會臨泉水抱琴好倚長松南園露葵朝折東谷黃梁夜舂田家舊穀行將盡良苗未可希老年方愛粥卒歲且無衣雀乳青苔井雞鳴白板扉柴車駕羸牸草屩牧豪豨多雨紅榴拆新秋緑芋肥餉田桑下憩旁舍草中歸住處名愚谷何煩問是非豪杭本膏丁宇田家有贈君心尚棲隱久欲傍歸路在朝每為言解印果成趣晨雞鳴鄰里群動從所務農夫行餉田閨婦起縫素開軒御衣服散帙理章句時吟招隱詩或製間居賦新晴望郊郭曰映桑榆暮隂盡一作晝小苑城微明渭川樹楑子宅閭井幽賞何由屢道存終不忘迹異難相遇此時惜離別再來芳菲度輞川間居一從歸白杜不復到青門時倚簷前樹逺看原上村青菰臨水映白鳥向山翻寂寞於陵子桔槹方灌園積雨輞川莊作積雨空林煙火遲蒸藜炊黍餉東災漠漠水田飛白鷺隂隂夏木囀黃鸝山中習靜觀朝槿松下清齋折露葵野老與人爭席罷海鷗何處更相疑春園即事宿雨乘輕屐春寒著弊𫀆開畦分白水間柳發紅桃草際成碁局林端舉桔槹上句更好還持鹿皮機日暮隱蓬蒿渭川田家斜光照墟落窮巷牛羊歸野老念牧童倚仗候荆扉雉鴝麥苗秀蠶眠桑葉稀田夫荷鋤立一作至相見語依依即此羡間逸悵然歌式微春中田園作屋上春鳩鳴村邊杏花白好持斧伐逺楊荷鋤覘泉脈歸一作新燕識故一作舊巢舊人看新曆臨觴忽不御惆悵逺行客卷耳之後得此吟調淇上即事田園屏居淇水上東野曠無山日隱一作白日桑柘外河明閭井間牧童望村去田犬隨人還靜者亦何事荆扉乘晝關過盧貟外宅看飯僧共題三賢異七聖青眼慕青蓮乞飯從香積裁衣學水田上人飛錫杖檀越施金錢跌坐簷前日焚香竹下煙寒空法雲地秋色淨居天身逐因緣法心過次第禪不須愁日暮自有一燈燃過李揖宅閉門秋草色終日無車馬客來深巷中犬吠寒林下散髮時未簮道書行尚把與我同心人樂道安貧者一罷宜城酌還歸洛陽社與盧貟外象過崔處士興宗林亭緑樹重隂蓋四鄰青苔日厚自無塵科頭箕踞長松下白眼看他一作君世上人謂白眼亦如鍾會於嵇康同前盧象映竹時聞轉轆轤當窗只見網蜘蛛主人非病常髙卧環堵蒙籠一老儒同前縉身名不問十年餘老大誰能更讀書林中獨酌鄰家酒門外時聞長者車同前裴迪喬柯門裏自成隂散髮空一作窗中曽不簮逍遙且喜從吾事榮寵從來非我心酬前崔興宗窮巷空林常閉關悠悠一作然獨卧與前山今朝忽枉嵇生駕倒屣開門遙解顔濟州過趙叟家宴雖與人境接閉門成隱居道言莊叟事儒行魯人餘深巷斜暉靜間門髙柳踈荷鋤修藥圃散帙曝農書上客搖芳翰中厨饋野𬞞夫君第髙飲景晏出林閭與盧象集朱家主人能愛客終日有逢迎貰得新豐酒復聞秦女筝柳條踈客舍槐葉下秋城語笑且為樂吾將逹此生過福禪師蘭若巖壑傳微逺雲林隱法堂羽人飛奏樂天女跪焚香竹外峯偏曙藤隂水更涼欲知禪坐久行路長春芳飯覆釡山僧晚知清淨理日與人羣踈將候逺山僧先期掃弊廬果從雲峰裏顧我蓬蒿居藉草飯松屑焚香看道書燃燈晝欲盡鳴磬夜方𥘉一悟寂為樂此生間有餘思歸何必深身丗猶空虛謁璿上人并序上人外人內天不定不亂捨法而淵泊無心而雲動色空無得不物物也默語無際不言言也故吾徒得神交焉玄關大啓德海群泳時雨既降春物具美序於詩者人百其言少年不足言識道年巳長事往安可悔餘生幸能飬誓從斷葷血不復嬰丗網浮名寄纓佩空性無羈鞅夙承大導師焚香此瞻仰頺然居一室覆載紛萬象髙柳早鶯啼長廊春雨響牀下阮家屐窗前笻竹杖方將見身雲陋彼示天壤一心在法要願以無生獎青龍寺曇壁上人兄院集并序吾兄大開蔭中明一作朝徹物外一作獨以定力勝敵以惠用解嚴深居僧坊傍俯人里髙原陸地下映美蓉之池竹林果園中秀菩提之樹八極氣霽萬彚塵息太虛寥廓南山為之端倪皇州蒼茫渭水貫於天地經行之後趺坐而間升坣𣑽筵餌客香飯不起而遊覽不凮而清涼得丗界於蓮花記文章於貝葉時寧江大兄持片石命維序之詩五韻坐上成髙處敞招提虗空詎有倪坐看南陌騎下聽秦城雞渺渺孤煙起芊芊逺樹齊青山萬井外落日五陵西甚壯非招提本色眼界今無染心空安可迷同前王縉林中空寂舍階下終南山髙卧一床上廽看六合間浮雲幾處滅飛鳥何時還問義天人接無心丗界間誰知大隱客兄弟自追攀好同前王昌齡本來清淨所竹樹引幽隂簷外含山翠人間出丗心圎通無有象聖境不能侵真是吾兄法何妨友弟深天香自然會靈異識鍾音同前裴迪靈境信為絶法堂出塵氛自然成髙致向不看浮雲逶迤峯岫列參差閭井分林端逺堞見凬末踈鍾聞吾師久禪寂在丗超人群黎拾遺昕裴迪見過秋夜對雨之作促織鳴巳急輕衣行尚重寒燈坐髙館秋雨聞踈鍾白法調狂象玄言問老龍何人顧蓬徑空愧求羊蹤晚春嚴少尹與諸公見過松菊荒三徑圗書共五車烹葵邀上客看竹到貧家鵲乳先春草鶯啼過落花自憐黃髮暮一信惜年華過乘如禪師蕭居士嵩丘蘭若無著天親弟與兄嵩丘蘭若一峯晴食隨鳴磬巢烏下行踏空林落葉聲迸水定侵香案濕雨花應共石床平深洞長松何所有儼然天笁古先生過感化寺曇興上人山院暮持笻竹杖相待虎溪頭催客聞山響歸房逐水流野花叢發好谷鳥一聲幽夜坐空村寂松凮直似秋略不用思同前裴迪不逺灞陵邊安居向十年入門穿竹徑留客畎山泉鳥囀深林裏心間落照前浮名竟何益從此願栖禪夏日過青龍寺謁操禪師龍鍾一老翁徐步謁禪宫欲問義心義遙知空病空山河天眼裏丗界法身中莫怪銷炎熱能生大地凮同前裴迪安禪一室內左右竹亭幽有法知不染無言誰敢酬鳥飛爭向夕蟬噪巳先秋煩暑自兹退清涼何所求鄭果州相過斜日照殘春𥘉晴草木新牀前磨鏡客林裏灌園人五馬驚窮巷雙童逐老身中厨辦粗飯當恕阮家貧春日與裴迪過新昌里訪吕逸人不遇桃源一向絶凮塵柳市南頭訪隱淪到門不敢題凡鳥看竹何須問主人城外青山如屋裏東家流水入西鄰自在閉户著書多歲月種松皆作老龍鱗同前裴迪恨不逢君出荷蘘青松白屋更無他陶令五男曾不有蔣生三徑任相過芙蓉曲沼春流滿薜荔成帷晚靄多聞説桃源好迷客不如髙枕一作卧眄庭柯春過賀遂貟外藥園前年種籬外今作藥欄成香草為君子名花是長卿水穿盤石透藤繫古松生畫畏開厨走來蒙倒屣迎蔗漿菰米飯蒟醬露葵羮頗識灌園意於陵不自輕過香積寺不知香積寺數里入雲峯古木無人徑深山何處鍾泉聲咽危石日色冷青松薄暮空潭曲安禪制毒龍過崔駙馬山池畫樓吹笛妓金碗酒家胡錦石稱貞女青松學大夫脫貂貰桂酌射鴈與山厨聞道髙陽會愚公谷正愚河南嚴尹弟見宿弊廬訪别人賦十韻上客能論道吾生學飬蒙貧交丗情外才子古人中冠上方簮一作安象車邊巳畫熊拂衣迎五馬垂手慿雙童花醥一作醴和松屑茶香透竹叢薄霜澄夜月殘雪帶春凮古壁蒼苔黑寒山逺燒紅眼看東候别心事北山同為學輕先輩何能訪老翁欲知今日後不樂為車公須溪先生校本王右丞集卷第四
