front:
  text: 須溪先生校本唐王右丞集卷第三
  hash: sha256:95a2a1176bdd14768b9e49f8d150ca01162f0671a591856fd7bf83c5c422cc35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0021_SBCK_003-1a}
body:
  text: 唐尚書右丞贈祕書監王維奉寄韋大守步荒城自蕭索萬里山河空天高秋日逈嘹唳聞歸鴻寒塘映衰草高館落踈桐臨此歲方晏顧景問悲翁故人不可見寂寞平林東林園即事寄舍弟紞寓目一蕭散消憂兾俄頃青草肅澄波白雲移翠嶺後浦通河渭前山包鄢郢松含風裏聲花對池中影地多齊后瘧人帶荆州癭徒思赤筆書詎有丹砂井心悲常欲絶髮亂不能整青簞日何長間門晝方靜頺思茅簷下彌傷好風景寄河上段十六與君相見即相親聞道君家在孟津為見行舟試借問客中時有洛陽人容易盡情舊未有此寄荆州張丞相所思竟何在悵望深荆門舉丗無相識終身思舊恩方將與農圃藝植老丘園目盡南飛鳥何由寄一言山中寄諸弟妹山中多法侣禪誦自為群城郭遙相望唯應見白雲聞裴秀才迪吟詩因戲贈猿吟一何苦愁朝復悲夕莫作巫峽聲腸斷秋江客既蒙宥罪旋復拜官伏感聖恩竊書鄙意兼奉簡新除使君等諸公忽蒙漢詔還冠冕始覺殷王解網羅日比星明猶自暗俳天齊聖壽未云多花迎喜氣猶能笑鳥識歡心亦解歌聞道百城新佩印還來雙闕共鳴珂贈從弟司庫貟外絿少年識事淺強學干名利徒聞躍馬年苦無出人智即事豈徒言纍官非不試既寡遂性歡恐招負時纍清冬見逺山積雪凝蒼翠皓然出東林發我遺丗意惠連素淸賞夙語塵外事欲緩攜手期流年一何駃座上走筆贈薛璩慕容損希丗無髙符絶迹有卑棲君徒視人文吾固和天倪𬗟然萬物始及與群物齊分地依后稷用天信重黎春凬何豫人令我思東溪草色有佳意花枝稍􅍭荑更待凬景好與君藉萋萋贈李頎聞君餌丹砂甚有好顔色不知從今去幾時生羽翼王母翳華芝望爾崑崙側文螭從赤豹萬里方一息悲哉丗上人甘此膻腥食贈劉藍田籬中犬迎吠出屋候柴扉歲晏輸井䅋山村人夜歸晚田始家食餘布成我衣詎肯無公事煩君問是非贈房盧氏琯逹人無不可忘已愛蒼生豈復小千室絃歌在兩楹浮人日巳歸但坐事農耕桑榆欎相望邑里多雞鳴秋山一何淨蒼翠臨寒城視事兼偃卧對書不簮纓蕭條人吏踈鳥雀下空庭鄙夫心所向晚莭異平生將從海嶽居守靜解天刑或可纍安邑茅茨君試營贈祖三詠濟州官舍作蠨蛸挂虗牗蟋蟀鳴前除歲晏涼凬至君子復何如髙館閴無人離居不可道間門寂巳閉落日照秋草雖有近音信千里阻河關中復客汝潁去年歸舊山結交二十載不得一日展貧病子既深契闊余不淺仲秋雖未歸暮秋以為期良會詎幾日終自長相思輞川間居贈裴秀才迪寒山轉蒼翠秋水日潺湲倚仗柴門外臨凬聽暮蟬渡頭餘落日墟里上孤煙復值接輿醉狂歌五柳前類以無情之景述無情之意復非作者所有春夜竹亭贈錢少府歸藍田夜靜群動息時聞隔林犬却憶山中時人家澗西逺羡君明發去采蕨輕軒冕酬前錢起山月隨客來主人興下淺今宵竹林下誰覺花源逺惆悵曙鶯啼孤雲還絶巘甚不相紹贈東嶽焦練師先生千歲餘五嶽遍曾居遙識齊侯鼎新過王母廬不能師孔墨何事問長沮玉管時來鳯銅盤即釣魚竦身空裏語明目夜中書自有還丹術時論大素𥘉頻蒙露版詔時降軟輪車山靜泉逾響松髙枝轉踈攴頥問樵客丗上復何如贈韋穆十八與君青眼客共有白雲心不向東山去日令春草深淡淡有情戲贈張五弟諲三首吾弟東山時心尚一何逺日髙猶自卧鍾動始能飯不必其人直自輸寫領上髮未梳牀頭書不卷清川與悠悠空林對偃蹇青苔石上淨細草松下軟窗外鳥聲間階前虎心善徒然萬像多淡爾大虗緬一知與物平自顧為人淺對君忽自得浮念不煩遣張弟五車書讀書仍隱居染翰過草聖賦詩輕子虛閉門二室下隱居十年餘宛是野人也時從漁父魚秋凬日蕭索五柳髙且踈望此去人丗渡水向吾廬歲晏同攜手只應君與豫設罝守毚兔垂鈎伺遊鱗此是安口腹非關慕隱淪吾生好清靜𬞞食去情塵今子方豪蕩思為鼎食人我家南山下動息自遺身入鳥不相亂見獸皆相親雲霞成伴侣虛白侍衣巾何事須夫子邀豫谷口真贈裴旻將軍腰間寶劒七星文臂上雕弓百戰勳見説雲中擒黠虜始知天上有將軍贈焦道士海上遊三島淮南預八公坐知千里外跳向一壷中每作清素可貴縮地朝珠闕行天使玉童飲人聊割酒送客乍分凬竒天老能行氣吾師不飬空有誤謝君徒雀躍無可問鴻𪷟好贈吳官長安客舍熱如煮無箇茗糜難御暑空搖白團其諦苦欲向縹囊還歸旅江鄉鯖鮓不寄來秦人湯餅那堪許不如儂家任挑逹草屩蟧蝦冨春渚冬晚對雪憶胡居士水寒更傳曉碧清鏡覽衰顔隔牗凮驚竹開門雪滿山灑空深巷靜積素廣庭間借問袁安舍翛然尚閉關至滑州隔河望黎陽憶丁三宇隔河見桑柘藹藹黎陽川望望行漸逺孤峯沒雲煙故人不可見河水復悠然賴有政聲逺時聞行路傳秋夜獨坐懷內弟崔興宗夜靜群動息蟪蛄聲悠悠庭槐北凮響日夕方髙秋思子整羽翮及時當雲浮吾生將白首歲晏思滄洲髙足在旦暮肯為南敏儔雪中憶季揖雜言積雪滿阡陌故人不可期長安千門復萬户何處躞􅰭黃金羈胡居士卧病遺米因贈了觀四大因根性何所有妄計苟不生是身孰休咎色聲何謂客隂界復誰守徒言蓮花目豈惡楊枝肘既飽香積飯不醉聲聞酒有無斷常見生滅幻夢受即病即實相趍空定狂走無有一法真無有一法垢居士素通逹隨冝善斗擻牀上無氊卧鎘中有粥否齋時不乞食定應空嗽口聊持數斗米且救浮生取贈裴卜迪凮景日夕佳與君賦新詩淡然望逺空如意方支頥春凮動百草蘭蕙生我籬曖曖日暖閨田家來致詞欣欣春還皋淡淡水生陂桃李雖未開荑蕚滿其枝請君理還策敢告將農時酌酒與裴迪酌酒與君君自寬人情翻覆似波瀾白首相知猶按劒朱門先逹笑彈冠草色全經細雨濕花枝欲動春凮寒丗事浮雲何足問不如髙卧且加餐與胡居士皆病寄此詩兼示學人二首𣑽志躰一興微塵念橫有朝露身如是覩蔭界何方置我人礙有固為主趣空寧捨賔洗心詎懸解悟道正迷津因愛果生病從貪始覺貧色聲非彼妄浮幻即吾真四逹竟何遣方殊安可塵胡生但髙枕寂寞與誰憐戰勝不謀食理齊甘負薪子若未始異詎論踈與親浮空徒漫漫泛有定悠悠無乘及乘者所謂智人舟詎捨貧病域不疲生死流無煩君喻馬任以我為牛植福祠迦葉求仁笑孔丘何津不鼓棹何路不摧輈念此聞思者胡為多阻修空虛花聚散煩惱樹稀稠滅想成無記生心坐有求降吳復歸蜀不到莫相尤九月九日憶山東兄弟時年十七獨在異鄉為異客每逢嘉莭倍思親遙知兄弟登高處遍插茱茰少一人華嶽西嶽出浮雲積翠在大清連天疑黛色百里遙青冥白日為之寒森沈華隂城昔聞乾坤閉造化生巨靈右足踏方止左手推削成天地忽開拆大河注東𬈑遂為西峙嶽雄雄鎮秦京大君包覆載至德𬒳群生上帝佇昭告金天思奉迎人祗望幸久何獨禪云亭藍田山石門精舍落日山水好漾舟信歸凮玩竒不覺逺因以緣源窮遙愛雲木秀𥘉疑路不同安知清流轉偶與前山通捨舟理輕䇿果然愜所適老僧四五人逍遙蔭松柏朝𣑽林未曙夜禪山更寂道心及牧童丗事問樵客瞑宿長林下焚香卧瑶席澗芳襲人衣山月映石壁再尋畏迷誤明發更登厯笑謝桃源人花紅復來覿山居秋暝空山新雨後天氣晚來秋明月松問照清泉石上流竹喧歸浣女蓮動下漁舟隨意春芳歇王孫自可留總無可點自是好青溪言入黃花川每逐青溪水隨山將萬轉趣途無百里聲喧亂石中色靜深松裏演漾泛菱荇澄澄映葭葦我心素巳間清川淡如此請留盤石上垂釣將巳矣崔濮陽兄季重前山興山西去亦對維門秋色有佳興況君池上間悠悠西林下自識門前山又别又别有道之言千里橫黛色數峰出雲間嵳峩對秦國合沓藏荆關殘雨斜日照夕嵐飛鳥還故人今尚爾歎息此頺顔終南别業中歲頗好道晚家南山陲興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無還期其資如此故自難及皇甫嶽雲溪雜題五首鳥鳴澗人間桂花落夜靜春山空月出驚山鳥時鳴春澗中蓮花塢日日採蓮去洲長多暮歸弄蒿莫濺水畏濕紅蓮衣鸕鷀堰乍向紅蓮沒復出清浦揚可哂獨立何褵褷㗸魚古查上上平田朝耕上平田暮耕上平田借問問津者寧知沮溺賢語調并髙萍池春池深且廣會待輕舟廽靡靡緑萍合垂楊掃復開每每靜意得之偶然須溪先生校本唐王右丞集卷第三
